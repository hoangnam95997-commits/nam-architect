<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nam Arch App - Online Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main-color: #00c853; --bg-panel: rgba(255, 255, 255, 0.9); }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .app-ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--bg-panel); padding: 25px; border-radius: 12px;
            width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); border: 1px solid #ddd;
        }
        h1 { margin: 0 0 10px; font-size: 18px; color: #333; text-transform: uppercase; letter-spacing: 1px; }
        .note { font-size: 11px; color: #666; margin-bottom: 20px; line-height: 1.4; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: var(--main-color); color: white; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 14px;
            box-shadow: 0 4px 0 #009624;
        }
        button:hover { background: #00e676; transform: translateY(-2px); }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #009624; }
        #status { margin-top: 15px; font-size: 12px; text-align: center; font-weight: 600; color: #f57c00; }
    </style>
</head>
<body>

<div class="app-ui">
    <h1>NAM ARCH APP 3D</h1>
    <div class="note">
        • Phóng to vùng cần lấy trước khi xuất.<br>
        • Phân lớp: Buildings (3D), Roads (2D), Water (2D).<br>
        • Định dạng: .OBJ (Import vào SketchUp/Rhino).
    </div>
    <button id="btnExport" onclick="startProcess()">XUẤT MÔ HÌNH 3D</button>
    <div id="status">Sẵn sàng kết nối...</div>
</div>

<div id="map"></div>

<script>
    // Tọa độ mặc định tại TP.HCM
    var map = L.map('map').setView([10.7933, 106.6800], 17);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    async function startProcess() {
        const status = document.getElementById('status');
        const btn = document.getElementById('btnExport');
        const zoom = map.getZoom();

        if (zoom < 16) {
            status.innerText = "⚠️ Hãy phóng to thêm để lấy dữ liệu!";
            status.style.color = "red";
            return;
        }

        btn.disabled = true;
        status.innerText = "⏳ Đang kết nối server dữ liệu...";
        
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json][timeout:60];(way["building"](${bbox});way["highway"](${bbox});way["natural"="water"](${bbox});relation["building"](${bbox}););out body;>;out skel qt;`;
        
        // Proxy mạnh để chạy online
        const url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));

        try {
            const res = await fetch(url);
            const json = await res.json();
            const data = JSON.parse(json.contents);

            if (!data.elements || data.elements.length < 5) throw new Error("Vùng trống");

            status.innerText = "🏗️ Đang xử lý Mesh 3D...";
            exportToObj(data);
            status.innerText = "✅ ĐÃ TẢI FILE THÀNH CÔNG!";
            status.style.color = "green";
        } catch (e) {
            status.innerText = "❌ Lỗi: Server bận. Hãy thử lại!";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }

    function exportToObj(data) {
        let obj = "# Online Map Export\n";
        let vIdx = 1;
        const origin = map.getCenter();
        const scale = 111319; 

        const layers = { 'Buildings': 'building', 'Roads': 'highway', 'Water': 'natural' };

        for (let key in layers) {
            obj += `g ${key}\n`;
            data.elements.filter(el => el.tags && el.tags[layers[key]]).forEach(el => {
                if (el.type !== "way") return;
                let h = (key === 'Buildings') ? (parseFloat(el.tags["building:levels"]) || 3) * 3.8 : 0;
                let z = (el.tags.bridge) ? 6 : 0;
                let points = [];

                el.nodes.forEach(nid => {
                    let n = data.elements.find(node => node.id === nid);
                    if (n) {
                        let x = (n.lon - origin.lng) * scale * Math.cos(origin.lat * Math.PI / 180);
                        let y = (n.lat - origin.lat) * scale;
                        obj += `v ${x.toFixed(2)} ${z.toFixed(2)} ${(-y).toFixed(2)}\n`;
                        if (h > 0) obj += `v ${x.toFixed(2)} ${(z+h).toFixed(2)} ${(-y).toFixed(2)}\n`;
                        points.push(vIdx);
                        vIdx += (h > 0) ? 2 : 1;
                    }
                });

                if (points.length > 2) {
                    if (h > 0) {
                        for (let i = 0; i < points.length - 1; i++) {
                            obj += `f ${points[i]} ${points[i]+1} ${points[i+1]+1} ${points[i+1]}\n`;
                        }
                        obj += "f " + points.map(i => i + 1).reverse().join(" ") + "\n";
                        obj += "f " + points.join(" ") + "\n";
                    } else {
                        obj += "f " + points.join(" ") + "\n";
                    }
                }
            });
        }

        const blob = new Blob([obj], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Map3D_Nam_Export.obj";
        a.click();
    }
</script>
</body>
</html>
