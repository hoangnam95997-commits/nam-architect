<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán 3D Glass Icon - Sandbox V6</title>
    <style>
        /* Nền sáng để đối chiếu chuẩn xác với ảnh gốc */
        body {
            background-color: #f2f5f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
        }

        /* KHỐI KÍNH TÍM HỒNG (The Tinted Glass Body) */
        .glass-icon {
            width: 250px;
            height: 250px;
            border-radius: 60px; /* Bo tròn chuẩn Squircle */
            position: relative;
            cursor: pointer;
            
            /* MÀU KÍNH (Tint): Tím than -> Hồng rực -> Cam sáng */
            /* Dùng Alpha 0.8 để tạo độ xuyên thấu nhưng không bị loãng màu */
            background: linear-gradient(135deg, rgba(60, 10, 120, 0.8) 0%, rgba(220, 20, 100, 0.8) 50%, rgba(255, 100, 0, 0.85) 100%);
            
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* KHỐI LƯỢNG 3D & KHÚC XẠ (Volume & Refraction Shadows) */
            box-shadow: 
                /* 1. Highlight viền trong góc Trên-Trái (Bắt sáng) */
                inset 3px 3px 6px rgba(255, 255, 255, 0.6),
                inset 1px 1px 15px rgba(255, 255, 255, 0.3),

                /* 2. Vách kính tối góc Dưới-Phải (Tạo độ dày) */
                inset -6px -6px 20px rgba(0, 0, 0, 0.6),

                /* 3. Viền khúc xạ sáng rực ở đáy (Bắt sáng môi trường) */
                inset -1.5px -3px 8px rgba(255, 200, 50, 0.8),

                /* 4. Bóng vật lý hắt xuống nền (Ambient Occlusion) */
                10px 20px 30px rgba(0, 0, 0, 0.15),

                /* 5. Ánh sáng xuyên thấu (Caustic Glow) toả màu hồng/cam ra ngoài */
                -5px 25px 40px rgba(233, 30, 99, 0.5);
            
            /* Outer Rim (Viền ngoài cùng) */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom-color: rgba(255, 255, 255, 0.05);
            border-right-color: rgba(255, 255, 255, 0.05);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* VỆT SÁNG BÓNG GƯƠNG (The Hard-Stop Glossy Cut) */
        /* Đã xóa lệnh mask lỗi. Chuyển sang cắt màu trực tiếp! */
        .glass-icon::before {
            content: '';
            position: absolute;
            inset: 2px; /* Thụt vào một chút so với border ngoài */
            border-radius: 56px; 
            
            /* BÍ QUYẾT: Gradient chuyển từ Trắng sang Trong suốt đột ngột tại 48% */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.6) 0%, 
                rgba(255, 255, 255, 0.1) 48%, 
                rgba(255, 255, 255, 0) 48.1%, 
                rgba(255, 255, 255, 0) 100%
            );
            pointer-events: none;
        }

        /* Đốm sáng nhỏ (Glints) phản quang ở bề mặt (Tuỳ chọn thêm cho sinh động) */
        .glass-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255,255,255,0.4) 0%, transparent 10%),
                radial-gradient(circle at 85% 85%, rgba(255,255,255,0.2) 0%, transparent 8%);
            pointer-events: none;
        }

        .glass-icon:active {
            transform: scale(0.96) translateY(4px);
            box-shadow: 
                inset 3px 3px 8px rgba(255, 255, 255, 0.8),
                inset -8px -8px 25px rgba(0, 0, 0, 0.7),
                inset -1.5px -3px 8px rgba(255, 200, 50, 1),
                5px 10px 15px rgba(0, 0, 0, 0.1),
                -2px 15px 25px rgba(233, 30, 99, 0.6);
        }

    </style>
</head>
<body>

    <div class="glass-icon"></div>

</body>
</html>
