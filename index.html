<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - SUPER CLEAN v13</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1e272e; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(255,255,255,0.95); padding: 20px; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 260px; 
        }
        button { 
            width: 100%; padding: 12px; background: #0984e3; color: white; 
            border: none; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
        .progress-container { width: 100%; height: 12px; background: #dfe6e9; border-radius: 10px; margin-top: 15px; display:none; overflow:hidden;}
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #74b9ff, #a29bfe); transition: 0.3s; }
        #stt { font-size: 12px; text-align: center; margin-top: 8px; color: #2d3436; }
    </style>
</head>
<body>
    <div class="ui">
        <h3 style="margin:0 0 10px;">NAM ARCH v13</h3>
        <button onclick="exportClean()">XUẤT CAD SIÊU SẠCH</button>
        <div class="progress-container" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="stt"></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

        async function exportClean() {
            const pBar = document.getElementById('p-bar');
            const pFill = document.getElementById('p-fill');
            const stt = document.getElementById('stt');
            
            pBar.style.display = 'block';
            pFill.style.width = '20%';
            stt.innerText = "Đang lấy dữ liệu...";

            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                pFill.style.width = '50%';
                stt.innerText = "Đang tối ưu hóa nét vẽ...";

                let dxf = "  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n  0\nENDSEC\n  0\nSECTION\n  2\nENTITIES\n";
                const center = map.getCenter();
                const nodeMap = new Map();
                data.elements.forEach(el => { if(el.type==='node') nodeMap.set(el.id, el); });

                data.elements.filter(e => e.type === "way").forEach(e => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                    if (nodes.length < 2) return;

                    const isBuilding = !!e.tags?.building;
                    const highway = e.tags?.highway;

                    if (isBuilding) {
                        // Vẽ nhà: Polyline khép kín, màu đỏ (1)
                        dxf += `  0\nPOLYLINE\n  8\nNHA\n 62\n1\n 66\n1\n 70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * 111319 * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * 111319;
                            dxf += `  0\nVERTEX\n  8\nNHA\n 10\n${x.toFixed(3)}\n 20\n${y.toFixed(3)}\n`;
                        });
                        dxf += `  0\nSEQEND\n`;
                    } else if (highway) {
                        // Vẽ đường: Dùng Tim đường + Độ dày (Width) để sạch ngã tư
                        let width = 4.0; // Mặc định đường rộng 4m
                        if(["primary", "trunk"].includes(highway)) width = 15.0;
                        else if(highway === "secondary") width = 10.0;

                        dxf += `  0\nPOLYLINE\n  8\nDUONG\n 62\n7\n 66\n1\n 40\n${width}\n 41\n${width}\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * 111319 * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * 111319;
                            dxf += `  0\nVERTEX\n  8\nDUONG\n 10\n${x.toFixed(3)}\n 20\n${y.toFixed(3)}\n 40\n${width}\n 41\n${width}\n`;
                        });
                        dxf += `  0\nSEQEND\n`;
                    }
                });

                dxf += "  0\nENDSEC\n  0\nEOF\n";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_Architect_v13_SuperClean.dxf";
                a.click();

                pFill.style.width = '100%';
                stt.innerText = "Xong! Gõ Z -> E trong CAD.";
            } catch (e) { stt.innerText = "Lỗi kết nối!"; }
        }
    </script>
</body>
</html>
