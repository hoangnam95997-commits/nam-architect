<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Nguyên Khối - V12 (The Reset)</title>
    <style>
        /* Nền xám sáng để tôn khối 3D */
        body {
            background-color: #eef2f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: sans-serif;
        }

        /* KHỐI KÍNH NGUYÊN BẢN (1 THẺ DUY NHẤT) */
        .glass-icon {
            width: 250px;
            height: 250px;
            border-radius: 64px; /* Bo góc Squircle */
            position: relative;
            cursor: pointer;
            
            /* 1. MÀU NỀN CƠ BẢN (Gradient Tím -> Hồng -> Cam) */
            /* Dùng màu đậm và đặc để không bị bợt trên nền trắng */
            background: linear-gradient(135deg, #370b6d 0%, #d31862 50%, #ff6b15 100%);
            
            /* 2. KHỐI LƯỢNG VÀ CHIỀU SÂU (Volume & Depth) */
            box-shadow: 
                /* Viền sáng Trắng góc Trên-Trái (Bắt sáng mép ngoài) */
                inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                inset 1px 1px 1px rgba(255, 255, 255, 0.8),
                
                /* BÓNG ĐEN CHÌM: Đây là chìa khóa tạo độ sâu (Đánh lừa thị giác) */
                inset -15px -15px 35px rgba(0, 0, 0, 0.5),
                inset -5px -5px 15px rgba(0, 0, 0, 0.7),
                
                /* TỤ QUANG ĐÁY: Mép viền dưới rực sáng màu Cam/Vàng */
                inset -2px -4px 10px rgba(255, 180, 0, 0.8),
                
                /* BÓNG VẬT LÝ NGOÀI CÙNG (Ghim xuống nền) */
                15px 25px 35px rgba(0, 0, 0, 0.25),
                
                /* BÓNG CAUSTICS: Ánh sáng hồng hắt xuyên qua kính xuống nền */
                5px 20px 40px rgba(230, 20, 100, 0.4);

            /* Viền quang học cực mỏng bên ngoài */
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.4);
            border-left-color: rgba(255, 255, 255, 0.3);
            
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-icon:active {
            transform: scale(0.96);
        }

        /* 3. VỆT BÓNG GƯƠNG (The Gloss Overlay) */
        /* Đã khắc phục lỗi sọc trắng. Phủ trọn nửa trên của nút */
        .glass-icon::before {
            content: '';
            position: absolute;
            inset: 2px; /* Không đè lên viền */
            border-radius: 60px;
            
            /* Chuyển từ Trắng nhẹ -> Mờ dần -> Dừng Đột Ngột ở 45% */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.4) 0%, 
                rgba(255, 255, 255, 0.05) 45%, 
                transparent 45.2%, /* Vết cắt hoàn hảo, không để lại sọc */
                transparent 100%
            );
            pointer-events: none;
        }

        /* 4. CHẤM SÁNG PHẢN QUANG ĐÁY TẠO ĐIỂM NHẤN */
        .glass-icon::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            right: 20%;
            height: 6px;
            border-radius: 50%;
            /* Quầng sáng trắng/cam nằm đúng ở mép đáy */
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.8) 0%, rgba(255, 180, 0, 0.5) 40%, transparent 70%);
            filter: blur(2px);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="glass-icon"></div>

</body>
</html>
