<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V21 TURF BOOLEAN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(0, 20, 10, 0.9); padding: 25px; border-radius: 12px; width: 280px;
            border: 1px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); color: white;
        }
        h2 { color: #00ffcc; margin: 0 0 5px; font-size: 22px; text-align: center; }
        p { text-align:center; font-size:11px; margin-top:0; color:#aaa; margin-bottom: 15px;}
        button { 
            width: 100%; padding: 15px; background: #00ffcc; color: #000; 
            border: none; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 10px #00ffcc; }
        .progress-container { width: 100%; height: 8px; background: #222; margin-top: 15px; display: none; overflow: hidden; border-radius: 4px; }
        .progress-fill { width: 0%; height: 100%; background: #00ffcc; transition: 0.2s; }
        #stt { text-align: center; font-size: 12px; margin-top: 10px; color: #00ffcc; font-family: monospace;}
    </style>
</head>
<body>
    <div class="ui">
        <h2>NAM ARCH v21</h2>
        <p>BOOLEAN UNION TURF.JS</p>
        <button id="btn" onclick="exportV21()">XUẤT CAD (HÀN NGÃ TƯ)</button>
        <div class="progress-container" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="stt">Trạng thái: Sẵn sàng</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

        async function exportV21() {
            const stt = document.getElementById('stt');
            const pFill = document.getElementById('p-fill');
            document.getElementById('p-bar').style.display = 'block';
            document.getElementById('btn').disabled = true;
            
            stt.innerText = "1/3: Đang tải dữ liệu...";
            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                pFill.style.width = "40%";
                stt.innerText = "2/3: Dựng hình khối học...";

                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;
                
                let roadPolygons = []; // Mảng chứa các mặt phẳng đường

                // XỬ LÝ DỮ LIỆU
                data.elements.filter(e => e.type === "way").forEach(e => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n && b.contains([n.lat, n.lon]));
                    if (nodes.length < 2) return;

                    // 1. NẾU LÀ NHÀ
                    if (e.tags?.building) {
                        dxf += `0\nPOLYLINE\n8\nNHA\n62\n1\n66\n1\n70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nNHA\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    } 
                    // 2. NẾU LÀ ĐƯỜNG
                    else if (e.tags?.highway) {
                        let widthMeters = (e.tags.highway === 'primary' || e.tags.highway === 'trunk') ? 8 : 4;
                        let coords = nodes.map(n => [n.lon, n.lat]);
                        
                        // Tạo đối tượng LineString của Turf
                        let line = turf.lineString(coords);
                        
                        // Buffer (Tạo độ dày) cho con đường tính bằng mét
                        try {
                            let poly = turf.buffer(line, widthMeters / 2, {units: 'meters', steps: 2});
                            if (poly) roadPolygons.push(poly);
                        } catch(err) {}
                    }
                });

                pFill.style.width = "70%";
                stt.innerText = "3/3: Boolean Gộp Ngã Tư...";

                // THUẬT TOÁN BOOLEAN UNION (Nung chảy các con đường thành 1 khối)
                if (roadPolygons.length > 0) {
                    // Để tránh lag trình duyệt, mình gom từng khối vào nhau
                    let mergedRoads = roadPolygons[0];
                    for(let i = 1; i < roadPolygons.length; i++) {
                        try {
                            mergedRoads = turf.union(mergedRoads, roadPolygons[i]);
                        } catch(err) {} // Bỏ qua nếu có lỗi hình học cục bộ
                    }

                    // Rút trích đường viền viền bao (Outline) từ khối đã gộp
                    let rings = [];
                    if (mergedRoads.geometry.type === 'Polygon') {
                        rings = mergedRoads.geometry.coordinates;
                    } else if (mergedRoads.geometry.type === 'MultiPolygon') {
                        mergedRoads.geometry.coordinates.forEach(polyCoords => rings.push(...polyCoords));
                    }

                    // Vẽ đường viền đó vào CAD
                    rings.forEach(ring => {
                        dxf += `0\nPOLYLINE\n8\nDUONG\n62\n7\n66\n1\n70\n1\n`;
                        ring.forEach(pt => {
                            let lon = pt[0], lat = pt[1];
                            let x = (lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nDUONG\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    });
                }

                pFill.style.width = "100%";
                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_V21_Turf_Boolean.dxf";
                a.click();
                
                stt.innerText = "HOÀN TẤT! Z -> E";
                document.getElementById('btn').disabled = false;
            } catch (err) { 
                stt.innerText = "LỖI: Rất có thể do mạng!"; 
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
