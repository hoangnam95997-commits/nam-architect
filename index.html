<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH PRO v62 - Cyber Progress Stable</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <style>
        :root { 
            --primary: #00e5ff; --secondary: #0077ff;
            --bg-dark: #111827; --panel-bg: rgba(31, 41, 55, 0.95);
            --box-bg: rgba(17, 24, 39, 0.6); 
            --text-main: #f9fafb; --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); }
        
        .search-box { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .search-box input { background: transparent; border: none; padding: 12px 15px; width: 250px; color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box button { background: var(--box-bg); border: none; border-left: 1px solid var(--border); padding: 0 15px; cursor: pointer; color: var(--primary); transition: 0.2s; font-weight: bold;}
        .search-box button:hover { background: rgba(0, 229, 255, 0.1); }

        .sidebar-container { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; align-items: flex-start; }
        .sidebar { width: 350px; background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }

        .toggle-btn { background: var(--panel-bg); border: 1px solid var(--border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 10px; }
        .toggle-btn:hover { background: var(--box-bg); transform: scale(1.05); }

        h1 { margin: 0; font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; text-align: center; }
        .tagline { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; text-align: center; display: block; margin-bottom: 20px; margin-top: 4px;}

        .ctrl-box { background: var(--box-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .val-hl { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;}
        
        .layer-label { cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 12px;}
        .layer-label input[type="checkbox"] { cursor: pointer; accent-color: var(--primary); }

        .zoom-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; outline: none; margin-top: 5px; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
        
        .btn-glow { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 229, 255, 0.25); transition: all 0.3s ease; margin-bottom: 12px; margin-top: 5px; }
        .btn-glow:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4); }
        
        .btn-outline { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-main); font-weight: 700; font-size: 11px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-outline:hover { background: rgba(128,128,128,0.15); }

        /* =========================================
           THANH TIẾN TRÌNH CYBER FIX LỖI ĐỨNG IM
           ========================================= */
        .prog-container { margin: 15px 0; }
        .prog-wrap { 
            height: 8px; background: rgba(0,0,0,0.4); border-radius: 4px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        
        #progress { 
            width: 0%; height: 100%; 
            /* Gradient y hệt ảnh bạn gửi */
            background: linear-gradient(90deg, #00e5ff, #ff00ff, #ffcc00, #00e5ff); 
            background-size: 200% 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        /* Hiệu ứng sọc chạy ngang khi đang kích hoạt */
        .prog-wrap.active #progress { animation: progressFlow 2s linear infinite; }
        @keyframes progressFlow { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        #stt { font-size: 10px; text-align: center; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; text-transform: uppercase; margin-top: 8px;}

        /* HUD & BADGE (Giữ nguyên v60) */
        .hud-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; display: flex; gap: 25px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .hud-item { display: flex; align-items: center; gap: 8px; }
        .hud-val { color: var(--text-main); font-weight: 700; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; z-index: 999; pointer-events: none; opacity: 0.5; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: 0; width: 30px; height: 2px; background: var(--primary); }
        .crosshair::after { content: ''; position: absolute; top: 0; left: 14px; width: 2px; height: 30px; background: var(--primary); }
        .leaflet-interactive { pointer-events: none; }
        
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }

        .core-badge { display: flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; transition: all 0.3s ease; }
        .core-badge.loading { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        .cyber-spinner { width: 14px; height: 14px; border-radius: 50%; background: conic-gradient(#00e5ff, #ff00ff, #ffcc00, #00e5ff); animation: spin 1s linear infinite; -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff 0); }
        .core-badge.loading .stt-text { background: linear-gradient(90deg, #00e5ff, #ff00ff, #ffcc00, #00e5ff); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientText 2s linear infinite; }
        .core-badge.online { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); text-shadow: 0 0 5px #10b981; }
        .core-badge.online .cyber-spinner { display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes gradientText { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm địa điểm..." onkeypress="if(event.key === 'Enter') searchLocation()">
    <button onclick="searchLocation()" title="Tìm kiếm">Tìm</button>
</div>

<div class="sidebar-container">
    <div class="sidebar" id="sidebar">
        <h1>NAM ARCH <span>PRO</span></h1>
        <span class="tagline">V62 - CYBER PROGRESS STABLE</span>

        <div class="ctrl-box">
            <div class="row"><span>Cấp độ Zoom</span><span class="val-hl" id="z-val">16.0</span></div>
            <input type="range" id="zoomSlider" min="1" max="100" step="0.5" value="16" class="zoom-slider">
        </div>

        <div class="ctrl-box">
            <div class="row" style="border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px;">
                <span style="color: var(--primary); text-transform: uppercase; font-size: 11px;">⚙️ TRÍCH XUẤT LAYER CAD</span>
            </div>
            <button id="mapThemeBtn" class="btn-outline" style="margin-bottom: 15px; width: 100%;" onclick="toggleMapTheme()">🗺️ NỀN BẢN ĐỒ: TỐI (DARK)</button>

            <div class="row" style="justify-content: flex-start; gap: 20px;">
                <label class="layer-label"><input type="checkbox" id="showNha" checked onchange="toggleLayer('nha')"> <span class="color-dot" id="dot-nha" style="background:#ff3366;"></span> 🏢 Tòa Nhà</label>
            </div>
            <div class="row" style="justify-content: flex-start; gap: 20px;">
                <label class="layer-label"><input type="checkbox" id="showDuong" checked onchange="toggleLayer('duong')"> <span class="color-dot" id="dot-duong" style="background:#ffffff;"></span> 🛣️ Lòng Đường</label>
            </div>
            <div class="row" style="justify-content: flex-start; gap: 20px;">
                <label class="layer-label"><input type="checkbox" id="showViahe" checked onchange="toggleLayer('viahe')"> <span class="color-dot" id="dot-viahe" style="background:#ffcc00;"></span> 🚶 Vỉa Hè</label>
            </div>
            <div class="row" style="justify-content: flex-start; gap: 20px;">
                <label class="layer-label"><input type="checkbox" id="showNuoc" checked onchange="toggleLayer('nuoc')"> <span class="color-dot" id="dot-nuoc" style="background:#00e5ff;"></span> 💧 Mặt Nước</label>
            </div>
        </div>

        <button class="btn-glow" onclick="startMegaScan()" title="Phím tắt: Space">🚀 BẮT ĐẦU QUÉT (SPACE)</button>

        <div class="ctrl-box" style="padding-bottom: 10px;">
            <div class="row">
                <span title="Chống treo máy">Hệ thống Core:</span>
                <div id="coreBadge" class="core-badge loading">
                    <div class="cyber-spinner"></div>
                    <span class="stt-text" id="lib-stt">ĐANG TẢI...</span>
                </div>
            </div>
            
            <div class="prog-container">
                <div class="prog-wrap" id="progWrap">
                    <div id="progress"></div>
                </div>
                <div id="stt">SẴN SÀNG NHẬN LỆNH</div>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn-outline" style="margin-top: 0; flex: 1; padding: 12px 0;" onclick="resetScan()" title="Xóa dữ liệu để quét vùng mới">🔄 LÀM MỚI</button>
            <button class="btn-outline" style="margin-top: 0; flex: 1.5; border-color: var(--primary); color: var(--primary);" onclick="exportDxfSafe()" title="Phím tắt: Ctrl + E">📥 XUẤT CAD</button>
        </div>
    </div>
    
    <div class="toggle-btn" onclick="toggleSidebar()" title="Ẩn/Hiện Bảng điều khiển (Phím tắt: M)"><span id="toggle-icon">◀</span></div>
</div>

<div class="crosshair"></div>
<div class="hud-bottom">
    <div class="hud-item" title="La bàn">🧭 HƯỚNG: <span class="hud-val">BẮC (N)</span></div>
    <div class="hud-item" title="Tọa độ tâm bản đồ">📍 TỌA ĐỘ: <span class="hud-val" id="hud-coord">10.7933, 106.6800</span></div>
    <div class="hud-item" title="Độ cao camera mô phỏng">🚁 CAO ĐỘ: <span class="hud-val" id="hud-alt">610m</span></div>
</div>

<div id="map"></div>

<script>
    // --- KHỞI TẠO UI & HOTKEYS ---
    let sidebarOpen = true;
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('hidden', !sidebarOpen);
        document.getElementById('toggle-icon').innerText = sidebarOpen ? '◀' : '▶';
    }

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); startMegaScan(); }
        if (e.ctrlKey && e.code === 'KeyE') { e.preventDefault(); exportDxfSafe(); }
        if (e.code === 'KeyM') { e.preventDefault(); toggleSidebar(); }
    });

    setInterval(() => {
        const el = document.getElementById('lib-stt');
        const badge = document.getElementById('coreBadge');
        if (typeof turf !== 'undefined') { 
            el.innerText = "ONLINE (V6.5)"; badge.className = "core-badge online";
        }
    }, 1000);

    // --- MAP SETUP ---
    var map = L.map('map', { zoomControl: false, maxZoom: 100, zoomSnap: 0.1 }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 }).addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 100, maxNativeZoom: 19 });
    
    L.GridLayer.Graticule = L.GridLayer.extend({
        createTile: function () {
            var tile = document.createElement('canvas'); tile.width = tile.height = 256;
            var ctx = tile.getContext('2d'); ctx.strokeStyle = 'rgba(128,128,128,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(256, 0); ctx.moveTo(0, 0); ctx.lineTo(0, 256); ctx.stroke(); return tile;
        }
    });
    new L.GridLayer.Graticule({maxZoom: 100}).addTo(map);

    let isLightMap = false;
    function toggleMapTheme() {
        isLightMap = !isLightMap;
        if(isLightMap) {
            map.removeLayer(darkT); lightT.addTo(map);
            document.getElementById('mapThemeBtn').innerText = '🗺️ NỀN BẢN ĐỒ: ĐA SẮC (VOYAGER)';
            document.getElementById('dot-nha').style.background = '#dc2626';
            document.getElementById('dot-duong').style.background = '#111827';
            document.getElementById('dot-viahe').style.background = '#ea580c';
            document.getElementById('dot-nuoc').style.background = '#0284c7';
        } else {
            map.removeLayer(lightT); darkT.addTo(map);
            document.getElementById('mapThemeBtn').innerText = '🗺️ NỀN BẢN ĐỒ: TỐI (DARK)';
            document.getElementById('dot-nha').style.background = '#ff3366';
            document.getElementById('dot-duong').style.background = '#ffffff';
            document.getElementById('dot-viahe').style.background = '#ffcc00';
            document.getElementById('dot-nuoc').style.background = '#00e5ff';
        }
        updateLineStyles();
    }

    async function searchLocation() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if(!query) return;
        input.placeholder = "Đang tìm...";
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data && data.length > 0) map.flyTo([data[0].lat, data[0].lon], 16, { duration: 2 });
            else alert("Không tìm thấy địa điểm này!");
        } catch(e) { alert("Lỗi kết nối khi tìm kiếm!"); }
        input.placeholder = "Tìm kiếm địa điểm...";
    }

    const zSlider = document.getElementById('zoomSlider');
    const zVal = document.getElementById('z-val');
    function updateHUD() {
        let z = map.getZoom(); let center = map.getCenter();
        zSlider.value = z; zVal.innerText = z.toFixed(1);
        document.getElementById('hud-coord').innerText = `${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`;
        let alt = Math.round(40000000 / Math.pow(2, z));
        document.getElementById('hud-alt').innerText = alt >= 1000 ? (alt/1000).toFixed(1) + 'km' : alt + 'm';
    }
    zSlider.addEventListener('input', e => map.setZoom(e.target.value));
    map.on('move', updateHUD); map.on('zoomend', updateHUD); updateHUD();

    var geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
    var layers = { nha: L.layerGroup().addTo(map), duong: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), nuoc: L.layerGroup().addTo(map) };

    function toggleLayer(type) {
        const isChecked = document.getElementById('show' + type.charAt(0).toUpperCase() + type.slice(1)).checked;
        if (isChecked) map.addLayer(layers[type]); else map.removeLayer(layers[type]);
    }

    function getLayerStyle(type) {
        const config = isLightMap ? {
            nha: { color: '#dc2626', weight: 3, fillOpacity: 0.15 },
            duong: { color: '#111827', weight: 3, fillOpacity: 0.1 },
            viahe: { color: '#ea580c', weight: 3, fillOpacity: 0.15 },
            nuoc: { color: '#0284c7', weight: 3, fillOpacity: 0.15 }
        } : {
            nha: { color: '#ff3366', weight: 3, fillOpacity: 0.15 }, 
            duong: { color: '#ffffff', weight: 3, fillOpacity: 0.1 }, 
            viahe: { color: '#ffcc00', weight: 3, fillOpacity: 0.15 }, 
            nuoc: { color: '#00e5ff', weight: 3, fillOpacity: 0.15 }  
        };
        return config[type];
    }

    function updateLineStyles() {
        layers.nha.eachLayer(l => l.setStyle(getLayerStyle('nha')));
        layers.duong.eachLayer(l => l.setStyle(getLayerStyle('duong')));
        layers.viahe.eachLayer(l => l.setStyle(getLayerStyle('viahe')));
        layers.nuoc.eachLayer(l => l.setStyle(getLayerStyle('nuoc')));
    }

    // --- HÀM CẬP NHẬT TIẾN TRÌNH V62 ---
    function updateProgress(percent, text, isActive = true) {
        const pBar = document.getElementById('progress');
        const pWrap = document.getElementById('progWrap');
        const stt = document.getElementById('stt');
        
        pBar.style.width = percent + '%';
        stt.innerText = text;
        
        // Bật/tắt hiệu ứng ánh sáng chạy ngang (Shimmer)
        if(isActive) pWrap.classList.add('active');
        else pWrap.classList.remove('active');
        
        if(percent >= 100) {
            stt.style.color = "#10b981"; // Xanh thành công
            pWrap.classList.remove('active');
        } else {
            stt.style.color = "var(--primary)"; // Màu mặc định
        }
    }

    function resetScan() {
        Object.values(layers).forEach(l => l.clearLayers());
        geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
        updateProgress(0, "ĐÃ XÓA. SẴN SÀNG QUÉT VÙNG MỚI!", false);
        document.getElementById('stt').style.color = "var(--text-main)";
    }

    const yieldCPU = () => new Promise(r => setTimeout(r, 5));

    async function chunkedUnion(polygons, type) {
        if (!polygons || polygons.length === 0) return null;
        if (polygons.length === 1) return polygons[0];
        let current = [...polygons]; let step = 0;
        while (current.length > 1) {
            let next = [];
            for (let i = 0; i < current.length; i += 2) {
                if (i % 4 === 0) await yieldCPU();
                if (i + 1 < current.length) {
                    try { next.push(turf.union(current[i], current[i+1])); } catch(e) { next.push(current[i]); }
                } else next.push(current[i]);
            }
            current = next; step++;
            document.getElementById('stt').innerText = `TỐI ƯU HÓA ${type}: CẤP ${step}`;
        }
        return current[0];
    }

    function makeClosedPolygon(pts) {
        let ring = pts.map(p => [p[0], p[1]]);
        if (ring[0][0] !== ring[ring.length-1][0] || ring[0][1] !== ring[ring.length-1][1]) ring.push([...ring[0]]);
        return turf.polygon([ring]);
    }

    async function startMegaScan() {
        if(typeof turf === 'undefined' || !turf.bboxClip) return alert("Hệ thống Core đang tải, đợi chút nhé!");
        
        resetScan();
        // Nhảy vọt lên 10% ngay lập tức để người dùng không tưởng bị đơ
        updateProgress(10, "KẾT NỐI VỆ TINH OVERPASS...", true);

        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];

        const q = `[out:json][timeout:50][bbox:${sw.lat},${sw.lng},${ne.lat},${ne.lng}];(way["building"];way["highway"];way["natural"="water"];);out body;>;out skel qt;`;
        
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodes = new Map();
            data.elements.forEach(e => { if(e.type === 'node') nodes.set(e.id, [e.lon, e.lat]); });

            let rBufs = [], sBufs = [];
            let ways = data.elements.filter(e => e.type === "way");
            
            if(ways.length === 0) {
                updateProgress(0, "KHÔNG CÓ DỮ LIỆU Ở KHU VỰC NÀY!", false);
                document.getElementById('stt').style.color = "#ef4444";
                return;
            }

            for (let i = 0; i < ways.length; i++) {
                const e = ways[i];
                
                // Thanh chạy mượt theo % đối tượng
                if (i % 30 === 0) {
                    let percent = 10 + (i / ways.length) * 50; 
                    updateProgress(percent, `TRÍCH XUẤT NÉT: ${i}/${ways.length}`, true);
                    await yieldCPU(); 
                }

                const pts = e.nodes.map(id => nodes.get(id)).filter(p => p);
                if (pts.length < 3) continue;

                if (e.tags.building) {
                    const poly = turf.bboxClip(makeClosedPolygon(pts), screenBox);
                    geoData.nha.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('nha') }).addTo(layers.nha);
                } else if (e.tags.natural === 'water') {
                    const poly = turf.bboxClip(makeClosedPolygon(pts), screenBox);
                    geoData.nuoc.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('nuoc') }).addTo(layers.nuoc);
                } else if (e.tags.highway) {
                    const line = turf.lineString(pts);
                    const w = (e.tags.highway === 'primary' || e.tags.highway === 'secondary') ? 12 : 6;
                    rBufs.push(turf.bboxClip(turf.buffer(line, w/2, {units:'meters', steps: 2}), screenBox));
                    sBufs.push(turf.bboxClip(turf.buffer(line, (w/2)+3.5, {units:'meters', steps: 2}), screenBox));
                }
            }
            
            if (rBufs.length > 0) {
                updateProgress(70, "XỬ LÝ NÉT LÒNG ĐƯỜNG...", true);
                let mR = await chunkedUnion(rBufs, "LÒNG ĐƯỜNG");
                if (mR) { geoData.duong.push(mR); L.geoJSON(mR, { style: getLayerStyle('duong') }).addTo(layers.duong); }

                updateProgress(85, "XỬ LÝ NÉT VỈA HÈ...", true);
                let mS = await chunkedUnion(sBufs, "VỈA HÈ");
                
                try {
                    let viahe = turf.difference(mS, mR);
                    if(viahe) { geoData.viahe.push(viahe); L.geoJSON(viahe, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                } catch(e) { 
                    if (mS) { geoData.viahe.push(mS); L.geoJSON(mS, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                }
            }
            
            updateProgress(100, "HOÀN TẤT! SẴN SÀNG XUẤT CAD.", false);
        } catch (err) { 
            updateProgress(0, "LỖI TẢI DỮ LIỆU (QUÁ LỚN HOẶC RỚT MẠNG)!", false);
            document.getElementById('stt').style.color = "#ef4444";
        }
    }

    function extractRings(geom) {
        let rings = [];
        if (!geom) return rings;
        if (geom.type === 'Feature') return extractRings(geom.geometry);
        if (geom.type === 'FeatureCollection') { geom.features.forEach(f => rings.push(...extractRings(f))); return rings; }
        if (geom.type === 'Polygon') rings.push(...geom.coordinates);
        else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => rings.push(...poly));
        else if (geom.type === 'GeometryCollection') geom.geometries.forEach(g => rings.push(...extractRings(g)));
        return rings;
    }

    async function exportDxfSafe() {
        if(geoData.nha.length === 0 && geoData.duong.length === 0) return alert("Bạn chưa quét dữ liệu nào!");
        
        updateProgress(90, "ĐANG GHI FILE DXF...", true);
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const writeToDxf = async (geoArray, layerName) => {
            for (let i = 0; i < geoArray.length; i++) {
                if (i % 10 === 0) await yieldCPU();
                const rings = extractRings(geoArray[i]);
                rings.forEach(ring => {
                    if(!ring || ring.length < 2) return;
                    dxf += `0\nPOLYLINE\n8\n${layerName}\n66\n1\n70\n1\n`;
                    ring.forEach(pt => { dxf += `0\nVERTEX\n8\n${layerName}\n10\n${((pt[0]-center.lng)*sx).toFixed(3)}\n20\n${((pt[1]-center.lat)*sy).toFixed(3)}\n`; });
                    dxf += "0\nSEQEND\n";
                });
            }
        };

        if(document.getElementById('showNha').checked) await writeToDxf(geoData.nha, "V21_NHA");
        if(document.getElementById('showDuong').checked) await writeToDxf(geoData.duong, "V21_DUONG");
        if(document.getElementById('showViahe').checked) await writeToDxf(geoData.viahe, "V21_VIAHE");
        if(document.getElementById('showNuoc').checked) await writeToDxf(geoData.nuoc, "V21_NUOC");

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
        a.download = "NAM_ARCH_PRO_V62.dxf"; a.click();
        
        updateProgress(100, "XUẤT FILE CAD THÀNH CÔNG!", false);
    }
</script>
