<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V20 ULTIMATE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #2d3436; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: #ffffff; padding: 25px; border-radius: 20px; width: 280px;
            border: 3px solid #6c5ce7;
        }
        h2 { color: #6c5ce7; margin: 0 0 10px; font-size: 22px; text-align: center; }
        button { 
            width: 100%; padding: 15px; background: #6c5ce7; color: white; 
            border: none; cursor: pointer; border-radius: 50px; font-weight: bold;
        }
        #stt { text-align: center; font-size: 11px; margin-top: 10px; color: #636e72; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui">
        <h2>NAM ARCH v20</h2>
        <p style="text-align:center; font-size:11px; color:#6c5ce7; margin-top:-5px;">CHẾ ĐỘ HÀN NÉT NGÃ TƯ</p>
        <button onclick="exportV20()">XUẤT CAD SIÊU SẠCH</button>
        <div id="stt">Giao diện TÍM mới là bản chuẩn!</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

        async function exportV20() {
            const stt = document.getElementById('stt');
            stt.innerText = "ĐANG TÍNH TOÁN GIAO LỘ...";
            
            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;
                const ways = data.elements.filter(e => e.type === "way");

                ways.forEach(e => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n && b.contains([n.lat, n.lon]));
                    if (nodes.length < 2) return;

                    const isBuilding = !!e.tags?.building;
                    const w = (e.tags.highway === 'primary' || e.tags.highway === 'trunk') ? 6 : 3;

                    if (isBuilding) {
                        dxf += `0\nPOLYLINE\n8\nNHA\n62\n1\n66\n1\n70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nNHA\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    } else {
                        // THUẬT TOÁN MỚI: Vẽ từng đoạn và tự giật lùi 2 đầu để không đâm xuyên
                        for (let i = 0; i < nodes.length - 1; i++) {
                            let n1 = nodes[i], n2 = nodes[i+1];
                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            let dx = x2 - x1, dy = y2 - y1;
                            let len = Math.sqrt(dx*dx + dy*dy);
                            if (len < 1) continue;

                            let ox = (-dy / len) * w, oy = (dx / len) * w;

                            // Giật lùi 2 đầu đoạn thẳng một khoảng bằng chiều rộng đường để tạo khe hở tại ngã tư
                            // giúp các nét chỉ chạm nhau chứ không đâm xuyên
                            let shrink = w * 0.8; 
                            let sx = (dx / len) * shrink, sy = (dy / len) * shrink;

                            // Vẽ lề trái (đã thu gọn)
                            dxf += `0\nLINE\n8\nDUONG\n62\n7\n10\n${(x1+ox+sx).toFixed(2)}\n20\n${(y1+oy+sy).toFixed(2)}\n11\n${(x2+ox-sx).toFixed(2)}\n21\n${(y2+oy-sy).toFixed(2)}\n`;
                            // Vẽ lề phải (đã thu gọn)
                            dxf += `0\nLINE\n8\nDUONG\n62\n7\n10\n${(x1-ox+sx).toFixed(2)}\n20\n${(y1-oy+sy).toFixed(2)}\n11\n${(x2-ox-sx).toFixed(2)}\n21\n${(y2-oy-sy).toFixed(2)}\n`;
                        }
                    }
                });

                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_V20_Ultimate_Clean.dxf";
                a.click();
                stt.innerText = "XONG! ĐÃ HÀN NÉT NGÃ TƯ.";
            } catch (err) { stt.innerText = "LỖI KẾT NỐI!"; }
        }
    </script>
</body>
</html>
