<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - PRO CAD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .ui { position: absolute; top: 20px; left: 50px; z-index: 1000; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 250px; }
        button { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .desc { font-size: 11px; color: #555; margin-bottom: 15px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 10px; color:#c0392b;">NAM CAD PRO v3</h2>
        <div class="desc">
            • Tự động tạo <b>lòng đường</b> (Offset)<br>
            • Tăng độ đậm <b>đường bao</b><br>
            • Lọc trùng và chồng chéo nét
        </div>
        <button onclick="exportProCAD()">XUẤT CAD CAO CẤP</button>
        <div id="stt" style="margin-top:10px; font-size:12px; font-weight:bold; text-align:center;"></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        async function exportProCAD() {
            const stt = document.getElementById('stt');
            stt.innerText = "⏳ Đang xử lý offset nét...";
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json];(way["building"](${bbox});way["highway"](${bbox}););out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                
                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;

                data.elements.filter(e => e.type === "way").forEach(e => {
                    let isBuilding = !!e.tags?.building;
                    let layer = isBuilding ? "RANH_NHA" : "RANH_DUONG";
                    let weight = isBuilding ? 35 : 25; // Độ đậm nét bao (Lineweight)

                    // Xử lý tạo 2 nét ranh đường (Offset tim đường sang 2 bên)
                    let offsetDist = 0.00004; // Tương đương ~4-5m lòng đường
                    
                    for (let i = 0; i < e.nodes.length - 1; i++) {
                        let n1 = data.elements.find(n => n.id === e.nodes[i]);
                        let n2 = data.elements.find(n => n.id === e.nodes[i+1]);
                        if (!n1 || !n2) continue;

                        let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                        let y1 = (n1.lat - center.lat) * scale;
                        let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                        let y2 = (n2.lat - center.lat) * scale;

                        if (isBuilding) {
                            // Với nhà: Vẽ nét đậm bao quanh
                            dxf += `0\nLINE\n8\n${layer}\n370\n${weight}\n10\n${x1}\n20\n${y1}\n11\n${x2}\n21\n${y2}\n`;
                        } else {
                            // Với đường: Tạo 2 nét biên (Parallel)
                            let dx = x2 - x1; let dy = y2 - y1;
                            let len = Math.sqrt(dx*dx + dy*dy);
                            let nx = -dy/len * 4; // Offset 4m
                            let ny = dx/len * 4;
                            
                            // Biên trái
                            dxf += `0\nLINE\n8\n${layer}\n10\n${x1+nx}\n20\n${y1+ny}\n11\n${x2+nx}\n21\n${y2+ny}\n`;
                            // Biên phải
                            dxf += `0\nLINE\n8\n${layer}\n10\n${x1-nx}\n20\n${y1-ny}\n11\n${x2-nx}\n21\n${y2-ny}\n`;
                        }
                    }
                });
                
                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_Architect_ProCAD.dxf";
                a.click();
                stt.innerText = "✅ ĐÃ XUẤT CAD CAO CẤP!";
            } catch (e) { stt.innerText = "❌ Lỗi kết nối!"; }
        }
    </script>
</body>
</html>
