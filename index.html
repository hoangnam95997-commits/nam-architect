<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - CAD FINAL FIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .ui { position: absolute; top: 20px; left: 50px; z-index: 1000; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 260px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .progress-container { width: 100%; background-color: #eee; border-radius: 10px; margin: 15px 0; display: none; border: 1px solid #ddd; }
        .progress-bar { width: 0%; height: 12px; background-color: #2ecc71; border-radius: 10px; transition: width 0.2s; }
        #percent { font-size: 13px; font-weight: bold; text-align: center; display: block; margin-bottom: 5px; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 10px; color:#2c3e50; font-size: 18px;">NAM CAD ULTIMATE</h2>
        <button id="exportBtn" onclick="exportCAD()">XUẤT CAD (FIX RỖNG)</button>
        <div id="loader" class="progress-container">
            <span id="percent">0%</span>
            <div id="bar" class="progress-bar"></div>
        </div>
        <div id="stt" style="margin-top:10px; font-size:12px; text-align:center; color:#7f8c8d;">Gõ <b>Z > E</b> nếu thấy màn hình đen</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        function updateUI(val, text) {
            document.getElementById('bar').style.width = val + "%";
            document.getElementById('percent').innerText = val + "%";
            document.getElementById('stt').innerText = text;
        }

        async function exportCAD() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            updateUI(10, "Đang gọi server...");

            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json];(way["building"](${bbox});way["highway"](${bbox}););out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                
                if (!data.elements || data.elements.length < 5) {
                    alert("Vùng này không có dữ liệu nhà/đường. Hãy zoom gần hơn!");
                    loader.style.display = 'none';
                    return;
                }

                updateUI(50, "Đang xử lý nét vẽ...");
                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319; // Quy đổi sang Mét
                const ways = data.elements.filter(e => e.type === "way");

                ways.forEach((e, idx) => {
                    let isBuilding = !!e.tags?.building;
                    let layer = isBuilding ? "NHA_DO" : "DUONG_TRANG";
                    let color = isBuilding ? 1 : 7; // 1 = Đỏ, 7 = Trắng/Đen

                    for (let i = 0; i < e.nodes.length - 1; i++) {
                        let n1 = data.elements.find(n => n.id === e.nodes[i]);
                        let n2 = data.elements.find(n => n.id === e.nodes[i+1]);
                        if (n1 && n2) {
                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            dxf += `0\nLINE\n8\n${layer}\n62\n${color}\n10\n${x1}\n20\n${y1}\n30\n0.0\n11\n${x2}\n21\n${y2}\n31\n0.0\n`;
                        }
                    }
                    if (idx % 20 === 0) {
                        let p = 50 + Math.floor((idx/ways.length)*45);
                        updateUI(p, `Đang xử lý: ${idx}/${ways.length}`);
                    }
                });

                dxf += "0\nENDSEC\n0\nEOF";
                updateUI(100, "Xong! Đang tải...");
                
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = "Nam_Architect_Fixed.dxf"; a.click();
                
                setTimeout(() => { loader.style.display = 'none'; }, 3000);
            } catch (e) {
                alert("Server bận, bạn đợi 5 giây rồi bấm lại nhé!");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
