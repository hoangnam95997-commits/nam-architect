<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH v43 - Ultimate Hybrid</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #121212; --panel: rgba(28, 28, 28, 0.98); --text: #eee; }
        .light-mode { --accent: #ff4757; --bg: #f5f6fa; --panel: rgba(255, 255, 255, 0.98); --text: #2f3542; }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        /* GIAO DIỆN SIDEBAR ĐẦY ĐỦ */
        .sidebar {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 320px;
            background: var(--panel); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0; font-size: 22px; color: var(--accent); text-align: center; letter-spacing: -0.5px; }
        .tagline { font-size: 9px; opacity: 0.6; display: block; text-align: center; margin-bottom: 20px; text-transform: uppercase; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        button {
            padding: 12px; border: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 11px; text-transform: uppercase;
        }
        .btn-main { background: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        .btn-main:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-export { background: var(--accent); color: #000; }
        .btn-theme { background: #57606f; color: white; }

        /* BẢNG MÀU LIVE V21 */
        .color-panel { background: rgba(128,128,128,0.1); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(128,128,128,0.2); }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; font-weight: 500; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; transition: 0.2s; }
        input[type="color"]:hover { transform: scale(1.1); }

        /* THANH TIẾN TRÌNH */
        .progress-wrapper { margin-top: 20px; }
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: var(--accent); transition: 0.4s; }
        #stt { font-size: 10px; text-align: center; margin-top: 10px; color: var(--accent); font-family: 'Courier New', monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>NAM ARCH v43</h1>
    <span class="tagline">Hybrid Engine | Core v21 Algorithm</span>

    <div class="btn-group">
        <button class="btn-theme" onclick="toggleTheme()">🌓 ĐỔI GIAO DIỆN (SÁNG/TỐI)</button>
        <button class="btn-main" onclick="runHybridScan()">🚀 QUÉT DIỆN TÍCH LỚN (SONG SONG)</button>
    </div>

    <div class="color-panel">
        <div class="row"><span>Tòa nhà</span><input type="color" id="cNha" value="#ff4d4d" oninput="liveUpdate()"></div>
        <div class="row"><span>Lòng đường</span><input type="color" id="cDuong" value="#2d3436" oninput="liveUpdate()"></div>
        <div class="row"><span>Vỉa hè</span><input type="color" id="cViaHe" value="#f1c40f" oninput="liveUpdate()"></div>
        <div class="row"><span>Cây xanh</span><input type="color" id="cCay" value="#00b894" oninput="liveUpdate()"></div>
        <div class="row"><span>Mặt nước</span><input type="color" id="cNuoc" value="#0984e3" oninput="liveUpdate()"></div>
    </div>

    <div class="progress-wrapper">
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="stt">HỆ THỐNG V21 SẴN SÀNG</div>
    </div>

    <button class="btn-export" style="margin-top:20px; width:100%" onclick="exportFullCAD()">📥 XUẤT CAD 1:1 (MESH LAYERS)</button>
</div>

<div id="map"></div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png');
    
    var groups = { 
        nha: L.layerGroup().addTo(map), 
        duong: L.layerGroup().addTo(map), 
        viahe: L.layerGroup().addTo(map), 
        cay: L.layerGroup().addTo(map), 
        nuoc: L.layerGroup().addTo(map) 
    };

    function toggleTheme() {
        if(document.body.classList.toggle('light-mode')) { map.removeLayer(darkT); lightT.addTo(map); }
        else { map.removeLayer(lightT); darkT.addTo(map); }
    }

    function liveUpdate() {
        const c = { 
            n: document.getElementById('cNha').value, 
            d: document.getElementById('cDuong').value, 
            v: document.getElementById('cViaHe').value, 
            g: document.getElementById('cCay').value, 
            w: document.getElementById('cNuoc').value 
        };
        groups.nha.eachLayer(l => l.setStyle({ color: c.n, fillColor: c.n, fillOpacity: 0.8, weight: 0.5 }));
        groups.duong.eachLayer(l => l.setStyle({ color: c.d, fillColor: c.d, fillOpacity: 1, weight: 0 }));
        groups.viahe.eachLayer(l => l.setStyle({ color: c.v, fillColor: c.v, fillOpacity: 0.8, weight: 0 }));
        groups.cay.eachLayer(l => l.setStyle({ color: c.g, fillColor: c.g, fillOpacity: 0.7, weight: 0 }));
        groups.nuoc.eachLayer(l => l.setStyle({ color: c.w, fillColor: c.w, fillOpacity: 0.8, weight: 0 }));
    }

    async function runHybridScan() {
        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const rows = 4, cols = 4; // Chia 16 mảng
        const latS = (ne.lat - sw.lat)/rows, lngS = (ne.lng - sw.lng)/cols;

        Object.values(groups).forEach(g => g.clearLayers());
        document.getElementById('progress').style.width = '0%';
        let done = 0;

        // Chạy song song 4 luồng để tăng tốc
        let tasks = [];
        for(let i=0; i<rows; i++) {
            for(let j=0; j<cols; j++) {
                tasks.push([sw.lat + i*latS, sw.lng + j*lngS, sw.lat + (i+1)*latS, sw.lng + (j+1)*lngS]);
            }
        }

        const worker = async (list) => {
            for(let box of list) {
                await processV21Tile(box);
                done++;
                document.getElementById('progress').style.width = (done/16)*100 + '%';
                document.getElementById('stt').innerText = `TIẾN ĐỘ: ${done}/16 MẢNG (V21 COMPUTE)`;
            }
        };

        const chunks = [tasks.slice(0,4), tasks.slice(4,8), tasks.slice(8,12), tasks.slice(12,16)];
        await Promise.all(chunks.map(c => worker(c)));
        
        liveUpdate();
        document.getElementById('stt').innerText = "✅ HOÀN THÀNH QUÉT DIỆN TÍCH LỚN";
    }

    async function processV21Tile(box) {
        const q = `[out:json][timeout:40][bbox:${box[0]},${box[1]},${box[2]},${box[3]}];(way["building"];way["highway"];way["natural"~"water|wood"];way["landuse"~"grass|forest"];way["leisure"~"park"];);out body;>;out skel qt;`;
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodeMap = new Map();
            data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

            let rPolys = [], wPolys = [];
            data.elements.filter(e => e.type === "way").forEach(e => {
                const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                if (nodes.length < 2) return;
                const pts = nodes.map(n => [n.lat, n.lon]);

                if (e.tags?.building) L.polygon(pts, {weight: 0.5}).addTo(groups.nha);
                else if (e.tags?.highway) {
                    const line = turf.lineString(nodes.map(n => [n.lon, n.lat]));
                    const w = (e.tags.highway === 'primary' || e.tags.highway === 'secondary') ? 10 : 6;
                    // THUẬT TOÁN V21
                    rPolys.push(turf.buffer(line, w/2, {units:'meters', steps: 4}));
                    wPolys.push(turf.buffer(line, (w/2)+3.5, {units:'meters', steps: 4}));
                } else if (e.tags?.natural === 'water') L.polygon(pts, {weight: 0}).addTo(groups.nuoc);
                else if (e.tags?.leisure || e.tags?.landuse || e.tags?.natural === 'wood') L.polygon(pts, {weight: 0}).addTo(groups.cay);
            });

            // THUẬT TOÁN ĐỤC LỖ V21
            if (rPolys.length > 0) {
                let mR = rPolys.reduce((a, b) => turf.union(a, b));
                let mW = wPolys.reduce((a, b) => turf.union(a, b));
                L.geoJSON(mR, {weight:0}).addTo(groups.duong);
                L.geoJSON(turf.difference(mW, mR), {weight:0}).addTo(groups.viahe);
            }
        } catch (e) { console.warn("Mảng lỗi, tự động bỏ qua..."); }
    }

    function exportFullCAD() {
        document.getElementById('stt').innerText = "ĐANG XUẤT CAD MẢNG KHỐI...";
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const writeMesh = (layerGroup, name) => {
            layerGroup.eachLayer(l => {
                const geo = l.toGeoJSON();
                let rings = (geo.geometry.type === 'Polygon') ? [geo.geometry.coordinates] : geo.geometry.coordinates;
                if(geo.geometry.type === 'MultiPolygon') rings = geo.geometry.coordinates.flat(1);
                
                rings.forEach(ring => {
                    if (Array.isArray(ring[0][0])) ring = ring[0]; // Fix lồng mảng
                    dxf += `0\nPOLYLINE\n8\n${name}\n66\n1\n70\n1\n`;
                    ring.forEach(pt => {
                        dxf += `0\nVERTEX\n8\n${name}\n10\n${((pt[0] - center.lng) * sx).toFixed(3)}\n20\n${((pt[1] - center.lat) * sy).toFixed(3)}\n`;
                    });
                    dxf += "0\nSEQEND\n";
                });
            });
        };

        writeMesh(groups.nha, "A_NHA");
        writeMesh(groups.duong, "A_DUONG");
        writeMesh(groups.viahe, "A_VIA_HE");
        writeMesh(groups.nuoc, "A_NUOC");
        writeMesh(groups.cay, "A_CAY_XANH");

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type:'application/dxf'}));
        a.download = "NAM_V43_ULTIMATE.dxf"; a.click();
        document.getElementById('stt').innerText = "XUẤT CAD THÀNH CÔNG!";
    }
</script>
</body>
</html>
