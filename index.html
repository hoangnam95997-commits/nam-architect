<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Pha Lê Quang Học - Sandbox V15</title>
    <style>
        /* Nền xám xanh sáng để dễ đối chiếu với ảnh gốc */
        body {
            background-color: #eaf0f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .optical-glass {
            width: 250px;
            height: 250px;
            border-radius: 64px; /* Bo góc cực êm (Squircle form) */
            position: relative;
            cursor: pointer;
            
            /* ========================================================== */
            /* 1. ĐỘ XUYÊN SÁNG (Transparency) & MÀU LÕI (Tinted Core)   */
            /* ========================================================== */
            /* Dùng RGBA thay vì Hex đặc. Sắc Tím -> Hồng -> Cam cháy mờ mịt */
            background: linear-gradient(135deg, 
                rgba(68, 12, 136, 0.45) 0%,   /* Tím */
                rgba(227, 27, 100, 0.35) 50%,  /* Hồng */
                rgba(255, 107, 21, 0.55) 100%  /* Cam cháy */
            );
            
            /* BÍ QUYẾT TRONG SUỐT: Bẻ cong màu nền đằng sau giống kính lúp */
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);

            /* ========================================================== */
            /* 2. KHỐI LƯỢNG 3D (Volume) & TỤ QUANG ĐÁY (Inner Caustics)  */
            /* ========================================================== */
            box-shadow: 
                /* A. Highlight viền trắng gắt ở Trên-Trái (Đón nguồn sáng chính) */
                inset 2px 2px 5px rgba(255, 255, 255, 0.9),
                inset 1px 1px 1px rgba(255, 255, 255, 1),
                
                /* B. Vách kính tối (The Inner Edge): Tạo cảm giác "nhìn xuyên qua" khối dày */
                inset 10px 10px 20px rgba(0, 0, 0, 0.3),
                inset -10px -10px 20px rgba(0, 0, 0, 0.15),
                
                /* C. TỤ QUANG VIỀN ĐÁY (Inner Caustic Refraction): Sáng rực rỡ vàng/cam */
                inset -3px -6px 15px rgba(255, 200, 50, 0.85),
                inset -1px -2px 3px rgba(255, 255, 255, 0.7),
                
                /* D. Bóng đổ vật lý (Drop Shadow): Ghim nút sát mặt sàn, không trôi nổi */
                5px 15px 30px rgba(0, 0, 0, 0.25),
                
                /* E. QUẦNG CAUSTICS NGOÀI (Outer Drop Glow): Ánh sáng hồng tỏa ra nền */
                0px 20px 45px rgba(233, 30, 99, 0.5);
                
            /* Viền quang học ngoài cùng để định hình khối kính */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.4);
            border-left-color: rgba(255, 255, 255, 0.2);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ========================================================== */
        /* 3. PHẢN QUANG BỀ MẶT (Surface Gloss - PURE FRESNEL)       */
        /* ========================================================== */
        /* ĐÃ XÓA VỆT CẮT LỖI. Dùng một mảng bóng mượt mà, tỏa nhẹ */
        .optical-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px; /* Thụt vào nhẹ so với viền ngoài */
            /* Mảng bóng mượt mà lan tỏa từ góc Trên-Trái xuống giữa */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.45) 0%,   /* Chói ở trên trái */
                rgba(255, 255, 255, 0.1) 45%,   /* Nhạt dần */
                transparent 60%,                /* Tan biến hoàn toàn */
                transparent 100%
            );
            pointer-events: none;
        }
        
        /* 4. CHẤM BỤI SÁNG PHẢN QUANG (The Precision Glints)         */
        /* Tái hiện 100% chi tiết đắt giá của ảnh gốc */
        .optical-glass::after {
            content: '';
            position: absolute;
            width: 3.5px; height: 3.5px;
            background: white;
            border-radius: 50%;
            top: 32%; left: 16%;
            /* 3 chấm bụi sáng y hệt ảnh mẫu */
            box-shadow: 
                0 0 5px 2px rgba(255, 255, 255, 0.7),
                18px 25px 0 -1.5px white, 
                18px 25px 4px 0 rgba(255, 255, 255, 0.5),
                135px 105px 0 -1.5px white, 
                135px 105px 4px 0 rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .optical-glass:active {
            transform: scale(0.96) translateY(5px);
            box-shadow: 
                inset 2px 2px 10px rgba(255, 255, 255, 0.9),
                inset 15px 15px 30px rgba(0, 0, 0, 0.4),
                inset -3px -6px 20px rgba(255, 200, 50, 1),
                8px 15px 20px rgba(0, 0, 0, 0.15),
                0px 15px 35px rgba(233, 30, 99, 0.6);
        }

    </style>
</head>
<body>

    <div class="optical-glass"></div>

</body>
</html>
