<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Three.js True Optical Glass</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #eaf0f6; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif; font-weight: bold; color: #333;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Đang nạp cỗ máy vật lý 3D...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // 1. KHỞI TẠO SCENE, CAMERA, RENDERER
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Cài màu nền giống với ảnh mẫu của bạn
        scene.background = new THREE.Color('#8ab6d6'); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        document.getElementById('loading').style.display = 'none';

        // 2. MÔI TRƯỜNG ÁNH SÁNG (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);

        // Nguồn sáng chính hắt từ góc Trên-Trái (Tạo vệt bóng gương)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // 3. TẠO CÁC VẬT THỂ NỀN ĐỂ TEST ĐỘ KHÚC XẠ (Refraction)
        // Mình tạo 3 khối cầu Tím - Hồng - Cam đặt phía sau tấm kính
        const bgGroup = new THREE.Group();
        const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
        
        const mat1 = new THREE.MeshBasicMaterial({ color: '#440c88' });
        const sphere1 = new THREE.Mesh(sphereGeo, mat1);
        sphere1.position.set(-2, 2, -4);
        bgGroup.add(sphere1);

        const mat2 = new THREE.MeshBasicMaterial({ color: '#e31b64' });
        const sphere2 = new THREE.Mesh(sphereGeo, mat2);
        sphere2.position.set(2, 0, -5);
        bgGroup.add(sphere2);

        const mat3 = new THREE.MeshBasicMaterial({ color: '#ff6b15' });
        const sphere3 = new THREE.Mesh(sphereGeo, mat3);
        sphere3.position.set(-1, -2, -3);
        bgGroup.add(sphere3);
        
        scene.add(bgGroup);

        // 4. CHẤT LIỆU THỦY TINH VẬT LÝ (MeshPhysicalMaterial)
        // Đây chính là "phép màu" mà CSS không bao giờ làm được
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,          // Kính không màu (Clear Glass)
            metalness: 0.1,           // Độ phản quang nhẹ như kính
            roughness: 0.05,          // Bề mặt cực nhẵn (Tạo độ bóng gương tự nhiên)
            transmission: 1.0,        // ĐỘ XUYÊN SÁNG TUYỆT ĐỐI
            ior: 1.5,                 // CHỈ SỐ KHÚC XẠ (Index of Refraction của thủy tinh)
            thickness: 2.0,           // ĐỘ DÀY CỦA KHỐI (Tạo vách kính và độ uốn cong)
            clearcoat: 1.0,           // Lớp phủ bóng lộn bên ngoài
            clearcoatRoughness: 0.1,
            side: THREE.DoubleSide    // Render cả mặt trong lẫn ngoài của kính
        });

        // 5. KHỐI KÍNH SQUIRCLE
        const geometry = new RoundedBoxGeometry(4, 4, 1.5, 6, 0.6);
        const glassMesh = new THREE.Mesh(geometry, glassMaterial);
        scene.add(glassMesh);

        // 6. THÊM TƯƠNG TÁC XOAY CHUỘT
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 7. VÒNG LẶP RENDER VÀ CHUYỂN ĐỘNG (Animation Loop)
        function animate() {
            requestAnimationFrame(animate);
            
            // Xoay các quả cầu phía sau để bạn thấy kính bẻ cong ánh sáng realtime
            bgGroup.rotation.z += 0.005;
            bgGroup.rotation.x += 0.002;

            // Xoay nhẹ khối kính
            glassMesh.rotation.y = Math.sin(Date.now() * 0.001) * 0.1;
            glassMesh.rotation.x = Math.sin(Date.now() * 0.0015) * 0.1;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Xử lý khi đổi kích thước màn hình
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
