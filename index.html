<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH v46 - Stable v21 Wireframe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #121212; --panel: rgba(30, 30, 30, 0.98); --text: #eee; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }
        .sidebar {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 320px;
            background: var(--panel); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0; font-size: 20px; color: var(--accent); text-align: center; }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 11px; text-transform: uppercase; margin-top: 10px;
        }
        .btn-main { background: #3498db; color: white; border-bottom: 3px solid #2980b9; }
        .btn-export { background: var(--accent); color: #000; }
        .status-panel { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        #progress { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
        #stt { font-size: 10px; text-align: center; margin-top: 10px; color: var(--accent); font-family: monospace; }
        /* Chỉ hiện nét, không màu */
        .leaflet-interactive { fill-opacity: 0 !important; stroke-width: 1.5; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>NAM ARCH v46</h1>
    <p style="font-size: 9px; text-align:center; opacity:0.6">V21 LOGIC - SCREEN BOUND ONLY</p>

    <button class="btn-main" onclick="runSafeScan()">🚀 QUÉT NÉT MÀN HÌNH (16 MẢNG)</button>

    <div class="status-panel">
        <div style="font-size: 11px; display: flex; justify-content: space-between;">
            <span>Thư viện:</span>
            <span id="lib-stt" style="color: #ff4757;">Đang tải...</span>
        </div>
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="stt">HỆ THỐNG SẴN SÀNG</div>
    </div>

    <button class="btn-export" onclick="exportDxfFinal()">📥 XUẤT CAD NÉT 1:1</button>
</div>

<div id="map"></div>

<script>
    // Kiểm tra thư viện Turf đã tải chưa
    window.onload = () => {
        if (typeof turf !== 'undefined') {
            document.getElementById('lib-stt').innerText = "Đã kết nối";
            document.getElementById('lib-stt').style.color = "#00ffcc";
        } else {
            document.getElementById('lib-stt').innerText = "Lỗi thư viện!";
        }
    };

    var map = L.map('map', { zoomControl: false }).setView([10.7933, 106.6800], 16);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
    
    var groups = { 
        nha: L.layerGroup().addTo(map), 
        duong: L.layerGroup().addTo(map), 
        viahe: L.layerGroup().addTo(map) 
    };

    async function runSafeScan() {
        if (typeof turf === 'undefined') {
            alert("Thư viện Turf.js chưa tải xong. Vui lòng F5 hoặc kiểm tra internet!");
            return;
        }

        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];
        
        Object.values(groups).forEach(g => g.clearLayers());
        let done = 0;
        const rows = 4, cols = 4;
        const latStep = (ne.lat - sw.lat)/rows, lngStep = (ne.lng - sw.lng)/cols;

        for(let i=0; i<rows; i++) {
            for(let j=0; j<cols; j++) {
                const box = [sw.lat + i*latStep, sw.lng + j*lngStep, sw.lat + (i+1)*latStep, sw.lng + (j+1)*lngStep];
                await fetchAndProcess(box, screenBox);
                done++;
                document.getElementById('progress').style.width = (done/16)*100 + '%';
                document.getElementById('stt').innerText = `TIẾN ĐỘ: ${done}/16`;
            }
        }
        document.getElementById('stt').innerText = "✅ QUÉT XONG PHẠM VI MÀN HÌNH";
    }

    async function fetchAndProcess(box, screenBox) {
        const q = `[out:json][timeout:30][bbox:${box[0]},${box[1]},${box[2]},${box[3]}];(way["building"];way["highway"];);out body;>;out skel qt;`;
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodeMap = new Map();
            data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

            let rBufs = [], sBufs = [];

            data.elements.filter(e => e.type === "way").forEach(e => {
                const pts = e.nodes.map(id => nodeMap.get(id)).filter(n => n).map(n => [n.lon, n.lat]);
                if (pts.length < 2) return;

                if (e.tags.building) {
                    const p = turf.polygon([pts.concat([pts[0]])]);
                    L.geoJSON(turf.bboxClip(p, screenBox), {color:'#ff4d4d'}).addTo(groups.nha);
                } else if (e.tags.highway) {
                    const line = turf.lineString(pts);
                    const w = (e.tags.highway === 'primary') ? 10 : 6;
                    rBufs.push(turf.bboxClip(turf.buffer(line, w/2, {units:'meters'}), screenBox));
                    sBufs.push(turf.bboxClip(turf.buffer(line, (w/2)+3.5, {units:'meters'}), screenBox));
                }
            });

            if (rBufs.length > 0) {
                let mR = rBufs.reduce((a, b) => turf.union(a, b));
                let mS = sBufs.reduce((a, b) => turf.union(a, b));
                L.geoJSON(mR, {color:'#ffffff'}).addTo(groups.duong);
                L.geoJSON(turf.difference(mS, mR), {color:'#f1c40f'}).addTo(groups.viahe);
            }
        } catch (e) { console.error("Tile error"); }
    }

    function exportDxfFinal() {
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const write = (g, name) => {
            g.eachLayer(l => {
                const geo = l.toGeoJSON();
                let rings = (geo.features) ? geo.features[0].geometry.coordinates : geo.geometry.coordinates;
                if(geo.geometry.type === "MultiPolygon") rings = rings.flat(1);
                rings.forEach(ring => {
                    let pts = Array.isArray(ring[0][0]) ? ring[0] : ring;
                    dxf += `0\nPOLYLINE\n8\n${name}\n66\n1\n70\n1\n`;
                    pts.forEach(p => dxf += `0\nVERTEX\n8\n${name}\n10\n${((p[0]-center.lng)*sx).toFixed(3)}\n20\n${((p[1]-center.lat)*sy).toFixed(3)}\n`);
                    dxf += "0\nSEQEND\n";
                });
            });
        };

        write(groups.nha, "NET_NHA");
        write(groups.duong, "NET_DUONG");
        write(groups.viahe, "NET_VIAHE");
        dxf += "0\nENDSEC\n0\nEOF";
        
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type:'application/dxf'}));
        a.download = "NAM_V46_FIXED.dxf"; a.click();
    }
</script>
</body>
</html>
