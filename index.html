<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V16 NEON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(15, 23, 42, 0.9); padding: 25px; 
            border-radius: 16px; border: 1px solid #38bdf8; width: 280px; color: white;
        }
        button { 
            width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; 
            border: none; cursor: pointer; border-radius: 50px; 
            font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #7dd3fc; box-shadow: 0 0 15px #38bdf8; }
        
        .progress-container { 
            width: 100%; height: 12px; background: #1e293b; 
            border-radius: 50px; margin-top: 15px; display: none; overflow: hidden;
        }
        .progress-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #38bdf8 0%, #c084fc 100%); 
        }
        #stt { text-align: center; font-size: 12px; margin-top: 10px; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 5px; font-size:22px; color:#38bdf8;">NAM ARCH v16</h2>
        <p style="font-size:11px; margin-bottom:15px; color:#94a3b8;">DOUBLE LINE - SCREEN CLIP ONLY</p>
        <button onclick="exportV16()">XUẤT CAD 2 NÉT (NEON)</button>
        <div class="progress-container" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="stt"></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

        async function exportV16() {
            const stt = document.getElementById('stt');
            const pFill = document.getElementById('p-fill');
            document.getElementById('p-bar').style.display = 'block';
            
            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;
                const ways = data.elements.filter(e => e.type === "way");

                ways.forEach((e, idx) => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                    
                    // LỌC CHẶT: Chỉ vẽ nếu ĐOẠN THẲNG nằm trong màn hình
                    if (nodes.length < 2) return;

                    const isBuilding = !!e.tags?.building;

                    if (isBuilding) {
                        // Nhà: Dùng Polyline khép kín (70 1)
                        dxf += `0\nPOLYLINE\n8\nNHA\n62\n1\n66\n1\n70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nNHA\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    } else {
                        // Đường: Tính toán 2 lề song song
                        let w = 2.5; 
                        if (e.tags.highway === 'primary') w = 6;
                        else if (e.tags.highway === 'secondary') w = 4;

                        // Vẽ lề trái và phải theo chuỗi Polyline liên tục để KHÔNG BỊ RỐI
                        let leftPoints = [], rightPoints = [];

                        for (let i = 0; i < nodes.length - 1; i++) {
                            let n1 = nodes[i], n2 = nodes[i+1];
                            // Kiểm tra nếu đoạn thẳng này nằm ngoài màn hình thì bỏ qua
                            if (!b.contains([n1.lat, n1.lon]) && !b.contains([n2.lat, n2.lon])) continue;

                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            let dx = x2 - x1, dy = y2 - y1;
                            let len = Math.sqrt(dx*dx + dy*dy);
                            if (len === 0) continue;
                            let ox = (-dy / len) * w, oy = (dx / len) * w;

                            if (i === 0) {
                                leftPoints.push({x: x1+ox, y: y1+oy});
                                rightPoints.push({x: x1-ox, y: y1-oy});
                            }
                            leftPoints.push({x: x2+ox, y: y2+oy});
                            rightPoints.push({x: x2-ox, y: y2-oy});
                        }

                        if (leftPoints.length > 0) {
                            dxf += `0\nPOLYLINE\n8\nDUONG\n66\n1\n`;
                            leftPoints.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                            dxf += `0\nSEQEND\n`;
                            dxf += `0\nPOLYLINE\n8\nDUONG\n66\n1\n`;
                            rightPoints.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                            dxf += `0\nSEQEND\n`;
                        }
                    }
                    pFill.style.width = (idx/ways.length*100) + "%";
                });

                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_V16_Neon_Clean.dxf";
                a.click();
                stt.innerText = "Đã xuất bản v16 sạch nét!";
            } catch (err) { stt.innerText = "Lỗi!"; }
        }
    </script>
</body>
</html>
