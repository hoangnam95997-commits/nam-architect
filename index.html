<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Liquid Glass - Sandbox V2</title>
    <style>
        /* Nền xanh đen sâu thẳm giống hệt ảnh gốc của bạn để dễ đối chiếu */
        body {
            background-color: #0b101e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* KHUNG CHUNG CHO KÍNH LỎNG */
        .glass-btn {
            width: 280px;
            padding: 22px;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            position: relative;
            outline: none;
            
            /* Độ mờ nền cực mạnh để tạo chất kính đặc */
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            
            /* Viền vật lý ngoài cùng cực mỏng, sáng mép trên, tối mép dưới */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top-color: rgba(255, 255, 255, 0.3);
            border-left-color: rgba(255, 255, 255, 0.2);
            
            transition: all 0.3s ease;
        }

        /* LÓA BỀ MẶT TẠO ĐỘ LỒI (Surface Glare) */
        .glass-btn::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            /* Phủ lớp sáng trắng nhẹ từ góc 11h, tan dần ra giữa nút */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.05) 30%, transparent 50%);
            pointer-events: none;
        }

        /* ---------------------------------------------------- */
        /* NÚT CYAN TÁI TẠO TỪ ẢNH GỐC                           */
        /* ---------------------------------------------------- */
        .btn-cyan {
            /* MÀU LÕI: Loang màu Cyan nhẹ từ góc dưới phải lên */
            background: radial-gradient(100% 100% at 100% 100%, rgba(0, 240, 255, 0.25) 0%, rgba(255, 255, 255, 0.02) 100%);
            
            box-shadow: 
                /* LỚP 1: Viền highlight TRẮNG DÀY & MƯỢT ở góc Trên-Trái */
                inset 2px 3px 6px rgba(255, 255, 255, 0.7),
                inset 1px 1px 15px rgba(255, 255, 255, 0.2),

                /* LỚP 2: Khúc xạ viền MÀU GẮT ở góc Dưới-Phải */
                inset -3px -5px 12px rgba(0, 240, 255, 0.6),

                /* LỚP 3: Bóng đen vật lý xô chéo xuống Dưới-Phải (Tạo khối 3D) */
                8px 12px 20px rgba(0, 0, 0, 0.6),

                /* LỚP 4: Ánh sáng xuyên thấu rực rỡ tỏa ra nền */
                0px 10px 40px -5px rgba(0, 240, 255, 0.5);
        }

        .btn-cyan:hover {
            transform: translateY(-2px);
            background: radial-gradient(100% 100% at 100% 100%, rgba(0, 240, 255, 0.4) 0%, rgba(255, 255, 255, 0.05) 100%);
            box-shadow: 
                inset 2px 3px 8px rgba(255, 255, 255, 0.9),
                inset 1px 1px 15px rgba(255, 255, 255, 0.3),
                inset -3px -5px 15px rgba(0, 240, 255, 0.8),
                10px 15px 25px rgba(0, 0, 0, 0.7),
                0px 15px 50px -5px rgba(0, 240, 255, 0.7);
        }

        /* ---------------------------------------------------- */
        /* NÚT MAGENTA TÁI TẠO TỪ ẢNH GỐC                       */
        /* ---------------------------------------------------- */
        .btn-magenta {
            /* MÀU LÕI: Loang màu Magenta nhẹ từ góc dưới phải lên */
            background: radial-gradient(100% 100% at 100% 100%, rgba(255, 0, 150, 0.25) 0%, rgba(255, 255, 255, 0.02) 100%);
            
            box-shadow: 
                /* LỚP 1: Viền highlight TRẮNG DÀY & MƯỢT ở góc Trên-Trái */
                inset 2px 3px 6px rgba(255, 255, 255, 0.7),
                inset 1px 1px 15px rgba(255, 255, 255, 0.2),

                /* LỚP 2: Khúc xạ viền MÀU GẮT ở góc Dưới-Phải */
                inset -3px -5px 12px rgba(255, 0, 150, 0.6),

                /* LỚP 3: Bóng đen vật lý xô chéo xuống Dưới-Phải (Tạo khối 3D) */
                8px 12px 20px rgba(0, 0, 0, 0.6),

                /* LỚP 4: Ánh sáng xuyên thấu rực rỡ tỏa ra nền */
                0px 10px 40px -5px rgba(255, 0, 150, 0.5);
        }

        .btn-magenta:hover {
            transform: translateY(-2px);
            background: radial-gradient(100% 100% at 100% 100%, rgba(255, 0, 150, 0.4) 0%, rgba(255, 255, 255, 0.05) 100%);
            box-shadow: 
                inset 2px 3px 8px rgba(255, 255, 255, 0.9),
                inset 1px 1px 15px rgba(255, 255, 255, 0.3),
                inset -3px -5px 15px rgba(255, 0, 150, 0.8),
                10px 15px 25px rgba(0, 0, 0, 0.7),
                0px 15px 50px -5px rgba(255, 0, 150, 0.7);
        }

    </style>
</head>
<body>

    <button class="glass-btn btn-cyan">Thuật toán Cyan</button>
    <button class="glass-btn btn-magenta">Thuật toán Magenta</button>

</body>
</html>
