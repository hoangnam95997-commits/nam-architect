<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Nguyên Bản - Sandbox V17</title>
    <style>
        /* Nền sáng, sạch sẽ */
        body {
            background-color: #f2f5f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
        }

        /* KHỐI KÍNH DUY NHẤT (Không viền vỏ rườm rà) */
        .pure-glass {
            width: 250px;
            height: 250px;
            border-radius: 60px; /* Bo góc chuẩn */
            position: relative;
            cursor: pointer;
            
            /* 1. MÀU SẮC RỰC RỠ (Không dùng RGBA loãng, không bóng đen đục) */
            background: linear-gradient(135deg, #440c88 0%, #e31b64 50%, #ff6b15 100%);
            
            /* 2. VIỀN ÁNH SÁNG & BÓNG XUYÊN THẤU */
            box-shadow: 
                /* Viền trên đón sáng: Sáng rực rỡ, sắc nét */
                inset 2px 2px 6px rgba(255, 255, 255, 0.7),
                inset 1px 1px 1px rgba(255, 255, 255, 0.9),
                
                /* Viền dưới tụ quang: Màu vàng/cam rực rỡ (Tuyệt đối không dùng bóng đen ở đây nữa) */
                inset -3px -3px 12px rgba(255, 200, 50, 0.8),
                inset -1px -1px 2px rgba(255, 255, 255, 0.4),
                
                /* Quầng màu xuyên thấu hắt xuống mặt bàn */
                10px 25px 45px rgba(233, 30, 99, 0.4),
                /* Bóng ghim vật lý rất nhẹ */
                5px 10px 15px rgba(0, 0, 0, 0.1);
                
            transition: transform 0.2s ease;
        }

        /* 3. VỆT CẮT BÓNG GƯƠNG BỀ MẶT */
        .pure-glass::before {
            content: '';
            position: absolute;
            inset: 1px; /* Thụt vào 1px để chừa đường viền ngoài */
            border-radius: 59px;
            
            /* Vết cắt chéo tuyệt đối sắc lẹm tại 45% */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.5) 0%, 
                rgba(255, 255, 255, 0.05) 45%, 
                transparent 45.2%, 
                transparent 100%
            );
            pointer-events: none;
        }

        /* 4. ĐIỂM BỤI SÁNG (Giống hệt ảnh gốc) */
        .pure-glass::after {
            content: '';
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            top: 33%; left: 16%;
            box-shadow: 
                0 0 5px 2px rgba(255, 255, 255, 0.7),
                18px 25px 0 -1px white, 
                18px 25px 4px 0 rgba(255, 255, 255, 0.5),
                135px 105px 0 -1px white, 
                135px 105px 4px 0 rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .pure-glass:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="pure-glass"></div>

</body>
</html>
