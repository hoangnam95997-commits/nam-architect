<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH PRO v69 - Anti-Crash Engine</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <style>
        :root { 
            --primary: #00e5ff; --secondary: #0077ff; --accent-3d: #ff00ff;
            --bg-dark: #111827; --panel-bg: rgba(31, 41, 55, 0.95);
            --box-bg: rgba(17, 24, 39, 0.6); 
            --text-main: #f9fafb; --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); }
        
        .search-box { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .search-box input { background: transparent; border: none; padding: 12px 15px; width: 250px; color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box button { background: var(--box-bg); border: none; border-left: 1px solid var(--border); padding: 0 15px; cursor: pointer; color: var(--primary); transition: 0.2s; font-weight: bold;}
        .search-box button:hover { background: rgba(0, 229, 255, 0.1); }

        .sidebar-container { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; align-items: flex-start; }
        .sidebar { width: 350px; background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; transition: 0.3s; }

        .toggle-btn { background: var(--panel-bg); border: 1px solid var(--border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 10px; }
        .toggle-btn:hover { background: var(--box-bg); transform: scale(1.05); }

        h1 { margin: 0; font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--accent-3d)); -webkit-background-clip: text; color: transparent; text-align: center; }
        .tagline { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; text-align: center; display: block; margin-bottom: 15px; margin-top: 4px;}

        .ctrl-box { background: var(--box-bg); border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .val-hl { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;}
        
        .layer-label { cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 11px;}
        .layer-label input[type="checkbox"] { cursor: pointer; accent-color: var(--primary); }

        .zoom-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; outline: none; margin-top: 5px; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
        
        .btn-glow { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 229, 255, 0.25); transition: all 0.3s ease; margin-bottom: 10px; margin-top: 5px; }
        .btn-glow:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4); }
        
        .btn-outline { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-main); font-weight: 700; font-size: 10px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-outline:hover { background: rgba(128,128,128,0.15); }

        .prog-container { margin: 10px 0; }
        .prog-wrap { height: 8px; background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        #progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #ff00ff, #ffcc00, #00e5ff); background-size: 200% 100%; transition: width 0.3s ease; box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }
        .prog-wrap.active #progress { animation: progressFlow 2s linear infinite; }
        @keyframes progressFlow { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        #stt { font-size: 10px; text-align: center; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; text-transform: uppercase; margin-top: 8px; line-height: 1.4;}

        .hud-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; display: flex; gap: 25px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .hud-item { display: flex; align-items: center; gap: 8px; }
        .hud-val { color: var(--text-main); font-weight: 700; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; z-index: 999; pointer-events: none; opacity: 0.5; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: 0; width: 30px; height: 2px; background: var(--primary); }
        .crosshair::after { content: ''; position: absolute; top: 0; left: 14px; width: 2px; height: 30px; background: var(--primary); }
        .leaflet-interactive { pointer-events: none; }
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        
        .core-badge { display: flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; transition: all 0.3s ease; }
        .core-badge.loading { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
        .cyber-spinner { width: 12px; height: 12px; border-radius: 50%; background: conic-gradient(#00e5ff, #ff00ff, #ffcc00, #00e5ff); animation: spin 1s linear infinite; -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff 0); }
        .core-badge.loading .stt-text { background: linear-gradient(90deg, #00e5ff, #ff00ff, #ffcc00, #00e5ff); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientText 2s linear infinite; }
        .core-badge.online { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); text-shadow: 0 0 5px #10b981; }
        .core-badge.online .cyber-spinner { display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes gradientText { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm địa điểm..." onkeypress="if(event.key === 'Enter') searchLocation()">
    <button onclick="searchLocation()">Tìm</button>
</div>

<div class="sidebar-container">
    <div class="sidebar" id="sidebar">
        <h1>NAM ARCH <span>PRO</span></h1>
        <span class="tagline">V69 - ANTI-CRASH ENGINE</span>

        <div class="ctrl-box">
            <div class="row"><span>Cấp độ Zoom</span><span class="val-hl" id="z-val">16.0</span></div>
            <input type="range" id="zoomSlider" min="1" max="100" step="0.5" value="16" class="zoom-slider">
        </div>

        <div class="ctrl-box">
            <div class="row" style="border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px;">
                <span style="color: var(--primary); text-transform: uppercase; font-size: 10px;">⚙️ QUẢN LÝ QUY HOẠCH</span>
            </div>

            <button id="mapThemeBtn" class="btn-outline" style="margin-bottom: 12px; width: 100%;" onclick="toggleMapTheme()">🗺️ BẢN ĐỒ NỀN: TỐI (DARK)</button>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label class="layer-label"><input type="checkbox" id="showNha" checked onchange="toggleLayer('nha')"> <span class="color-dot" id="dot-nha" style="background:#ff3366;"></span> Tòa Nhà</label>
                <label class="layer-label"><input type="checkbox" id="showDuong" checked onchange="toggleLayer('duong')"> <span class="color-dot" id="dot-duong" style="background:#ffffff;"></span> Lòng Đường</label>
                <label class="layer-label"><input type="checkbox" id="showViahe" checked onchange="toggleLayer('viahe')"> <span class="color-dot" id="dot-viahe" style="background:#ffcc00;"></span> Vỉa Hè</label>
                <label class="layer-label"><input type="checkbox" id="showNuoc" checked onchange="toggleLayer('nuoc')"> <span class="color-dot" id="dot-nuoc" style="background:#00e5ff;"></span> Sông Hồ</label>
                <label class="layer-label"><input type="checkbox" id="showCay" checked onchange="toggleLayer('cayxanh')"> <span class="color-dot" id="dot-cay" style="background:#10b981;"></span> Cây Xanh</label>
                <label class="layer-label"><input type="checkbox" id="showDat" checked onchange="toggleLayer('dattrong')"> <span class="color-dot" id="dot-dat" style="background:#9ca3af;"></span> Đất Trống</label>
            </div>
        </div>

        <button class="btn-glow" onclick="startMegaScan()">🚀 BẮT ĐẦU QUÉT MAP (SPACE)</button>

        <div class="ctrl-box" style="padding-bottom: 8px;">
            <div class="row">
                <span>Hệ thống Core:</span>
                <div id="coreBadge" class="core-badge loading">
                    <div class="cyber-spinner"></div>
                    <span class="stt-text" id="lib-stt">ĐANG TẢI...</span>
                </div>
            </div>
            <div class="prog-container">
                <div class="prog-wrap" id="progWrap"><div id="progress"></div></div>
                <div id="stt">SẴN SÀNG NHẬN LỆNH</div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn-outline" style="margin-top: 0;" onclick="resetScan()" title="Xóa dữ liệu để quét vùng mới">🔄 LÀM MỚI DỮ LIỆU</button>
            <div style="display: flex; gap: 8px;">
                <button class="btn-outline" style="margin-top: 0; flex: 1; border-color: var(--primary); color: var(--primary);" onclick="exportDxfSafe(false)">📥 XUẤT 2D (NÉT)</button>
                <button class="btn-outline" style="margin-top: 0; flex: 1.5; border-color: var(--accent-3d); color: var(--accent-3d);" onclick="exportDxfSafe(true)" title="Solid Block - Chống treo máy">🏙️ XUẤT 3D (MẶT KHỐI)</button>
            </div>
        </div>
    </div>
    
    <div class="toggle-btn" onclick="toggleSidebar()"><span id="toggle-icon">◀</span></div>
</div>

<div class="crosshair"></div>
<div class="hud-bottom">
    <div class="hud-item">🧭 HƯỚNG: <span class="hud-val">BẮC (N)</span></div>
    <div class="hud-item">📍 TỌA ĐỘ: <span class="hud-val" id="hud-coord">10.7933, 106.6800</span></div>
    <div class="hud-item">🚁 CAO ĐỘ: <span class="hud-val" id="hud-alt">610m</span></div>
</div>

<div id="map"></div>

<script>
    let sidebarOpen = true;
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('hidden', !sidebarOpen);
        document.getElementById('toggle-icon').innerText = sidebarOpen ? '◀' : '▶';
    }

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); startMegaScan(); }
    });

    setInterval(() => {
        const el = document.getElementById('lib-stt');
        const badge = document.getElementById('coreBadge');
        if (typeof turf !== 'undefined') { 
            el.innerText = "ONLINE (V6.5)"; badge.className = "core-badge online";
        }
    }, 1000);

    var map = L.map('map', { zoomControl: false, maxZoom: 100, zoomSnap: 0.1 }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 }).addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 100, maxNativeZoom: 19 });
    
    L.GridLayer.Graticule = L.GridLayer.extend({
        createTile: function () {
            var tile = document.createElement('canvas'); tile.width = tile.height = 256;
            var ctx = tile.getContext('2d'); ctx.strokeStyle = 'rgba(128,128,128,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(256, 0); ctx.moveTo(0, 0); ctx.lineTo(0, 256); ctx.stroke(); return tile;
        }
    });
    new L.GridLayer.Graticule({maxZoom: 100}).addTo(map);

    let isLightMap = false;
    function toggleMapTheme() {
        isLightMap = !isLightMap;
        if(isLightMap) {
            map.removeLayer(darkT); lightT.addTo(map);
            document.getElementById('mapThemeBtn').innerText = '🗺️ BẢN ĐỒ NỀN: ĐA SẮC (VOYAGER)';
            document.getElementById('dot-nha').style.background = '#dc2626';
            document.getElementById('dot-duong').style.background = '#111827';
            document.getElementById('dot-viahe').style.background = '#ea580c';
            document.getElementById('dot-nuoc').style.background = '#0284c7';
            document.getElementById('dot-cay').style.background = '#16a34a';
            document.getElementById('dot-dat').style.background = '#4b5563';
        } else {
            map.removeLayer(lightT); darkT.addTo(map);
            document.getElementById('mapThemeBtn').innerText = '🗺️ BẢN ĐỒ NỀN: TỐI (DARK)';
            document.getElementById('dot-nha').style.background = '#ff3366';
            document.getElementById('dot-duong').style.background = '#ffffff';
            document.getElementById('dot-viahe').style.background = '#ffcc00';
            document.getElementById('dot-nuoc').style.background = '#00e5ff';
            document.getElementById('dot-cay').style.background = '#10b981';
            document.getElementById('dot-dat').style.background = '#9ca3af';
        }
        updateLineStyles();
    }

    async function searchLocation() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if(!query) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data && data.length > 0) map.flyTo([data[0].lat, data[0].lon], 16, { duration: 2 });
            else alert("Không tìm thấy!");
        } catch(e) {}
    }

    function updateHUD() {
        let z = map.getZoom(); let center = map.getCenter();
        document.getElementById('zoomSlider').value = z; 
        document.getElementById('z-val').innerText = z.toFixed(1);
        document.getElementById('hud-coord').innerText = `${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`;
        let alt = Math.round(40000000 / Math.pow(2, z));
        document.getElementById('hud-alt').innerText = alt >= 1000 ? (alt/1000).toFixed(1) + 'km' : alt + 'm';
    }
    document.getElementById('zoomSlider').addEventListener('input', e => map.setZoom(e.target.value));
    map.on('move zoomend', updateHUD); updateHUD();

    var geoData = { nha: [], duong: [], viahe: [], nuoc: [], cayxanh: [], dattrong: [] };
    var layers = { 
        cayxanh: L.layerGroup().addTo(map), dattrong: L.layerGroup().addTo(map), 
        nuoc: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), 
        duong: L.layerGroup().addTo(map), nha: L.layerGroup().addTo(map) 
    };

    function toggleLayer(type) {
        if(document.getElementById('show' + type.charAt(0).toUpperCase() + type.slice(1)).checked) map.addLayer(layers[type]);
        else map.removeLayer(layers[type]);
    }

    function getLayerStyle(type) {
        const config = isLightMap ? {
            nha: { color: '#dc2626', weight: 2, fillOpacity: 0.15 },
            duong: { color: '#111827', weight: 2, fillOpacity: 0.1 },
            viahe: { color: '#ea580c', weight: 2, fillOpacity: 0.15 },
            nuoc: { color: '#0284c7', weight: 2, fillOpacity: 0.15 },
            cayxanh: { color: '#16a34a', weight: 2, fillOpacity: 0.15 },
            dattrong: { color: '#4b5563', weight: 2, fillOpacity: 0.1 }
        } : {
            nha: { color: '#ff3366', weight: 2, fillOpacity: 0.15 }, 
            duong: { color: '#ffffff', weight: 2, fillOpacity: 0.1 }, 
            viahe: { color: '#ffcc00', weight: 2, fillOpacity: 0.15 }, 
            nuoc: { color: '#00e5ff', weight: 2, fillOpacity: 0.15 },
            cayxanh: { color: '#10b981', weight: 2, fillOpacity: 0.15 },
            dattrong: { color: '#9ca3af', weight: 2, fillOpacity: 0.1 }  
        };
        return config[type];
    }

    function updateLineStyles() {
        Object.keys(layers).forEach(type => layers[type].eachLayer(l => l.setStyle(getLayerStyle(type))));
    }

    function updateProgress(percent, text, isActive = true) {
        const pBar = document.getElementById('progress');
        const pWrap = document.getElementById('progWrap');
        const stt = document.getElementById('stt');
        pBar.style.width = percent + '%';
        stt.innerText = text;
        if(isActive) pWrap.classList.add('active'); else pWrap.classList.remove('active');
        stt.style.color = (percent >= 100) ? "#10b981" : "var(--primary)";
    }

    function resetScan() {
        Object.values(layers).forEach(l => l.clearLayers());
        geoData = { nha: [], duong: [], viahe: [], nuoc: [], cayxanh: [], dattrong: [] };
        updateProgress(0, "ĐÃ XÓA. SẴN SÀNG!", false);
        document.getElementById('stt').style.color = "var(--text-main)";
    }

    // YIELD CPU MẠNH HƠN ĐỂ CHỐNG CRASH BẢN ĐỒ LỚN
    const yieldCPU = () => new Promise(resolve => setTimeout(resolve, 0));

    async function chunkedUnion(polygons, type) {
        if (!polygons || polygons.length === 0) return null;
        if (polygons.length === 1) return polygons[0];
        
        let current = polygons.map(p => { try { return turf.cleanCoords(p); } catch(e) { return p; } });
        let step = 0;
        while (current.length > 1) {
            let next = [];
            for (let i = 0; i < current.length; i += 2) {
                // Nhả CPU liên tục để trình duyệt không báo "Unresponsive"
                if (i % 2 === 0) await yieldCPU(); 
                if (i + 1 < current.length) {
                    try { next.push(turf.union(current[i], current[i+1])); } catch(e) { next.push(current[i]); }
                } else next.push(current[i]);
            }
            current = next; step++;
            document.getElementById('stt').innerText = `GỘP MẶT PHẲNG ${type}: BƯỚC ${step}`;
        }
        return current[0];
    }

    function makeClosedPolygon(pts) {
        let ring = pts.map(p => [p[0], p[1]]);
        if (ring[0][0] !== ring[ring.length-1][0] || ring[0][1] !== ring[ring.length-1][1]) ring.push([...ring[0]]);
        return turf.polygon([ring]);
    }

    function calculateBuildingHeight(tags) {
        if(tags['building:levels']) return parseFloat(tags['building:levels']) * 3.5;
        const rand = Math.random();
        if(rand < 0.7) return 9 + Math.random() * 6;
        if(rand < 0.9) return 15 + Math.random() * 15;
        return 30 + Math.random() * 30;
    }

    async function startMegaScan() {
        if(typeof turf === 'undefined') return alert("Core đang khởi động!");
        resetScan();
        updateProgress(10, "KẾT NỐI VỆ TINH OVERPASS...", true);

        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];
        
        const q = `[out:json][timeout:50][bbox:${sw.lat},${sw.lng},${ne.lat},${ne.lng}];
        (
            way["building"];
            way["highway"];
            way["natural"="water"];
            way["leisure"="park"];
            way["landuse"="grass"];
            way["natural"="wood"];
            way["leisure"="garden"];
            way["landuse"="brownfield"];
            way["landuse"="construction"];
        );out body;>;out skel qt;`;
        
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodes = new Map();
            data.elements.forEach(e => { if(e.type === 'node') nodes.set(e.id, [e.lon, e.lat]); });

            let ways = data.elements.filter(e => e.type === "way");
            if(ways.length === 0) { updateProgress(0, "KHÔNG CÓ DỮ LIỆU!", false); return; }
            
            // CẢNH BÁO DATA QUÁ LỚN
            if(ways.length > 5000) {
                if(!confirm(`Cảnh báo: Khu vực này có hơn ${ways.length} đối tượng. Việc quét và xuất 3D có thể tốn nhiều phút. Bạn có muốn tiếp tục? (Nên Zoom lại gần để map nhẹ hơn)`)) {
                    updateProgress(0, "ĐÃ HỦY QUÉT.", false);
                    return;
                }
            }

            let rBufs = [], sBufs = [];

            for (let i = 0; i < ways.length; i++) {
                const e = ways[i];
                if (i % 50 === 0) {
                    updateProgress(15 + (i / ways.length) * 40, `ĐANG QUÉT MẢNG KHỐI: ${i}/${ways.length}`, true);
                    await yieldCPU(); 
                }

                const pts = e.nodes.map(id => nodes.get(id)).filter(p => p);
                if (pts.length < 2) continue;

                let poly = null;
                if (pts.length >= 3) {
                    try { poly = turf.bboxClip(makeClosedPolygon(pts), screenBox); } catch(err) {}
                }

                if (e.tags.building && poly) {
                    poly.height = calculateBuildingHeight(e.tags);
                    geoData.nha.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('nha') }).addTo(layers.nha);
                } 
                else if ((e.tags.natural === 'water') && poly) {
                    geoData.nuoc.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('nuoc') }).addTo(layers.nuoc);
                }
                else if ((e.tags.leisure === 'park' || e.tags.landuse === 'grass' || e.tags.natural === 'wood' || e.tags.leisure === 'garden') && poly) {
                    geoData.cayxanh.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('cayxanh') }).addTo(layers.cayxanh);
                }
                else if ((e.tags.landuse === 'brownfield' || e.tags.landuse === 'construction') && poly) {
                    geoData.dattrong.push(poly);
                    L.geoJSON(poly, { style: getLayerStyle('dattrong') }).addTo(layers.dattrong);
                }
                else if (e.tags.highway) {
                    const line = turf.lineString(pts);
                    const wDuong = (e.tags.highway === 'primary' || e.tags.highway === 'secondary') ? 12 : 6;
                    const wViahe = wDuong + 6; 
                    
                    try {
                        rBufs.push(turf.bboxClip(turf.buffer(line, wDuong/2, {units:'meters', steps: 2}), screenBox));
                        sBufs.push(turf.bboxClip(turf.buffer(line, wViahe/2, {units:'meters', steps: 2}), screenBox));
                    } catch(err) {}
                }
            }

            if (rBufs.length > 0) {
                updateProgress(60, "ĐANG GỘP MẶT LÒNG ĐƯỜNG...", true);
                let mR = await chunkedUnion(rBufs, "LÒNG ĐƯỜNG");
                if (mR) { geoData.duong.push(mR); L.geoJSON(mR, { style: getLayerStyle('duong') }).addTo(layers.duong); }

                updateProgress(80, "ĐANG CẮT MẶT VỈA HÈ...", true);
                let mS = await chunkedUnion(sBufs, "VỈA HÈ");
                try {
                    let viahe = turf.difference(mS, mR);
                    if(viahe) { geoData.viahe.push(viahe); L.geoJSON(viahe, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                } catch(e) { 
                    if (mS) { geoData.viahe.push(mS); L.geoJSON(mS, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                }
            }
            
            updateProgress(100, "QUÉT XONG! SẴN SÀNG XUẤT FILE.", false);
        } catch (err) { updateProgress(0, "LỖI MẠNG HOẶC DỮ LIỆU LỚN!", false); }
    }

    function extractRings(geom) {
        let rings = [];
        if (!geom) return rings;
        if (geom.type === 'Feature') return extractRings(geom.geometry);
        if (geom.type === 'FeatureCollection') { geom.features.forEach(f => rings.push(...extractRings(f))); return rings; }
        if (geom.type === 'Polygon') rings.push(...geom.coordinates);
        else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => rings.push(...poly));
        else if (geom.type === 'GeometryCollection') geom.geometries.forEach(g => rings.push(...extractRings(g)));
        return rings;
    }

    // THUẬT TOÁN ĐAN LƯỚI TẠO MẶT (TESSELLATION) CHỐNG ĐƠ MÁY BẰNG CÁCH YIELD CPU
    async function create3DFaces(geoArray, layerName, baseZ, isBuilding) {
        let faceDXF = "";
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        
        const tx = (pt) => ((pt[0] - center.lng) * sx).toFixed(3);
        const ty = (pt) => ((pt[1] - center.lat) * sy).toFixed(3);

        const writeTriangle = (p1, p2, p3, zVal) => {
            let str = `0\n3DFACE\n8\n${layerName}\n`;
            str += `10\n${tx(p1)}\n20\n${ty(p1)}\n30\n${zVal}\n`;
            str += `11\n${tx(p2)}\n20\n${ty(p2)}\n30\n${zVal}\n`;
            str += `12\n${tx(p3)}\n20\n${ty(p3)}\n30\n${zVal}\n`;
            str += `13\n${tx(p3)}\n20\n${ty(p3)}\n30\n${zVal}\n`;
            return str;
        };

        const writeWall = (p1, p2, zBottom, zTop) => {
            let str = `0\n3DFACE\n8\n${layerName}\n`;
            str += `10\n${tx(p1)}\n20\n${ty(p1)}\n30\n${zBottom}\n`;
            str += `11\n${tx(p2)}\n20\n${ty(p2)}\n30\n${zBottom}\n`;
            str += `12\n${tx(p2)}\n20\n${ty(p2)}\n30\n${zTop}\n`;
            str += `13\n${tx(p1)}\n20\n${ty(p1)}\n30\n${zTop}\n`;
            return str;
        };

        let total = geoArray.length;
        for (let i = 0; i < total; i++) {
            // NHẢ CPU MỖI 5 OBJECT ĐỂ TRÌNH DUYỆT KHÔNG BỊ "UNRESPONSIVE"
            if (i % 5 === 0) {
                let p = 10 + (i / total) * 80;
                updateProgress(p, `TẠO MẶT 3D [${layerName}]: ${i}/${total}`, true);
                await yieldCPU(); 
            }

            const item = geoArray[i];
            const geom = item.geometry || item;
            let height = item.height || 0;

            let polysToTessellate = [];
            if (geom.type === 'Polygon') polysToTessellate.push(geom.coordinates);
            else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(c => polysToTessellate.push(c));
            
            // 1. MẶT SÀN (VÀ MÁI)
            for(let coords of polysToTessellate) {
                try {
                    let poly = turf.polygon(coords);
                    let cleaned = turf.cleanCoords(poly);
                    let tessellated = turf.tesselate(cleaned);
                    
                    tessellated.features.forEach(tri => {
                        let pts = tri.geometry.coordinates[0];
                        if(pts.length >= 3) {
                            faceDXF += writeTriangle(pts[0], pts[1], pts[2], baseZ);
                            if (isBuilding && height > 0) faceDXF += writeTriangle(pts[0], pts[1], pts[2], baseZ + height);
                        }
                    });
                } catch(e) {
                    let r = coords[0];
                    faceDXF += `0\nPOLYLINE\n8\n${layerName}_ERR\n66\n1\n70\n1\n`;
                    r.forEach(pt => { faceDXF += `0\nVERTEX\n8\n${layerName}_ERR\n10\n${tx(pt)}\n20\n${ty(pt)}\n30\n${baseZ}\n`; });
                    faceDXF += "0\nSEQEND\n";
                }
            }

            // 2. TƯỜNG BAO (CHỈ TÒA NHÀ)
            if (isBuilding && height > 0) {
                for(let coords of polysToTessellate) {
                    let outerRing = coords[0]; 
                    for (let j = 0; j < outerRing.length - 1; j++) faceDXF += writeWall(outerRing[j], outerRing[j+1], baseZ, baseZ + height);
                    for(let k = 1; k < coords.length; k++) {
                        let innerRing = coords[k];
                        for (let j = 0; j < innerRing.length - 1; j++) faceDXF += writeWall(innerRing[j], innerRing[j+1], baseZ, baseZ + height);
                    }
                }
            }
        }
        return faceDXF;
    }

    async function export2D(center, sx, sy) {
        let dxf = "";
        const writeLines = async (dataArray, layerName) => {
            for (let i = 0; i < dataArray.length; i++) {
                if (i % 20 === 0) await yieldCPU();
                const geom = dataArray[i].geometry || dataArray[i];
                let polys = [];
                if (geom.type === 'Polygon') polys.push(geom.coordinates);
                else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(c => polys.push(c));
                
                polys.forEach(coords => {
                    coords.forEach(ring => {
                        dxf += `0\nPOLYLINE\n8\n${layerName}\n66\n1\n70\n1\n`;
                        ring.forEach(pt => { dxf += `0\nVERTEX\n8\n${layerName}\n10\n${((pt[0]-center.lng)*sx).toFixed(3)}\n20\n${((pt[1]-center.lat)*sy).toFixed(3)}\n30\n0\n`; });
                        dxf += "0\nSEQEND\n";
                    });
                });
            }
        };
        if(document.getElementById('showNuoc').checked) await writeLines(geoData.nuoc, "V21_NUOC");
        if(document.getElementById('showDat').checked) await writeLines(geoData.dattrong, "V21_DATTRONG");
        if(document.getElementById('showCay').checked) await writeLines(geoData.cayxanh, "V21_CAYXANH");
        if(document.getElementById('showDuong').checked) await writeLines(geoData.duong, "V21_DUONG");
        if(document.getElementById('showViahe').checked) await writeLines(geoData.viahe, "V21_VIAHE");
        if(document.getElementById('showNha').checked) await writeLines(geoData.nha, "V21_NHA");
        return dxf;
    }

    async function exportDxfSafe(is3D) {
        let totalFeatures = geoData.nha.length + geoData.duong.length + geoData.cayxanh.length;
        if(totalFeatures === 0) return alert("Chưa có dữ liệu!");
        
        updateProgress(10, "ĐANG KHỞI TẠO FILE DXF...", true);
        
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        if (!is3D) {
            dxf += await export2D(center, sx, sy);
        } else {
            // XUẤT 3D BẰNG 3DFACE (Có nhả CPU để chống treo)
            if(document.getElementById('showNuoc').checked) dxf += await create3DFaces(geoData.nuoc, "V21_NUOC", -0.1, false);
            if(document.getElementById('showDat').checked) dxf += await create3DFaces(geoData.dattrong, "V21_DATTRONG", 0, false);
            if(document.getElementById('showCay').checked) dxf += await create3DFaces(geoData.cayxanh, "V21_CAYXANH", 0.05, false);
            if(document.getElementById('showDuong').checked) dxf += await create3DFaces(geoData.duong, "V21_DUONG", 0.1, false);
            if(document.getElementById('showViahe').checked) dxf += await create3DFaces(geoData.viahe, "V21_VIAHE", 0.15, false);
            if(document.getElementById('showNha').checked) dxf += await create3DFaces(geoData.nha, "V21_NHA", 0.15, true);
        }

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
        a.download = is3D ? "NAM_ARCH_SOLID_CITY.dxf" : "NAM_ARCH_2D_PLAN.dxf"; 
        a.click();
        
        updateProgress(100, is3D ? "XUẤT MÔ HÌNH SOLID THÀNH CÔNG!" : "XUẤT BẢN VẼ 2D THÀNH CÔNG!", false);
    }
