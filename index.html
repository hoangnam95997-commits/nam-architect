<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Liquid Glass - Sandbox</title>
    <style>
        /* Nền tối ngả xanh để tôn màu Neon */
        body {
            background-color: #0e131d;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            font-family: sans-serif;
        }

        /* KHUNG CHUNG CHO KÍNH LỎNG */
        .glass-btn {
            width: 300px;
            padding: 20px;
            border-radius: 40px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            border: none;
            cursor: pointer;
            position: relative;
            
            /* Bước 1: Khối lượng kính (Độ mờ và độ tương phản nền) */
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            
            /* Viền ngoài cùng cực mỏng, giả lập mặt cắt kính */
            border: 1px solid rgba(255, 255, 255, 0.05);
            
            /* Base màu rất trong suốt (để lộ nền) */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
        }

        /* ---------------------------------------------------- */
        /* NÚT CYAN TÁI TẠO TỪ ẢNH GỐC                           */
        /* ---------------------------------------------------- */
        .btn-cyan {
            box-shadow: 
                /* LỚP 1 (TRONG): Viền sáng sắc lẹm góc Top-Left */
                inset 1px 2px 3px rgba(255, 255, 255, 0.9),
                inset 2px 4px 6px rgba(255, 255, 255, 0.2),

                /* LỚP 2 (TRONG): Sự đọng màu (Refraction) ôm sát mép Bottom-Right */
                inset -2px -4px 10px rgba(0, 240, 255, 0.9),
                inset -1px -2px 4px rgba(0, 255, 255, 0.5),

                /* LỚP 3 (TRONG): Lõi tối nhẹ để kính có độ dày */
                inset -6px -8px 20px rgba(0, 0, 0, 0.4),

                /* LỚP 4 (NGOÀI): Bóng đen vật lý đổ xô lệch chéo xuống Bottom-Right */
                8px 12px 16px rgba(0, 0, 0, 0.6),

                /* LỚP 5 (NGOÀI): Bóng tụ quang màu xuyên thấu đổ xuống nền */
                12px 18px 30px -4px rgba(0, 240, 255, 0.6);
        }

        /* ---------------------------------------------------- */
        /* NÚT MAGENTA TÁI TẠO TỪ ẢNH GỐC                       */
        /* ---------------------------------------------------- */
        .btn-magenta {
            box-shadow: 
                /* LỚP 1 (TRONG): Viền sáng sắc lẹm góc Top-Left */
                inset 1px 2px 3px rgba(255, 255, 255, 0.9),
                inset 2px 4px 6px rgba(255, 255, 255, 0.2),

                /* LỚP 2 (TRONG): Sự đọng màu (Refraction) ôm sát mép Bottom-Right */
                inset -2px -4px 10px rgba(255, 0, 120, 0.9),
                inset -1px -2px 4px rgba(255, 50, 150, 0.5),

                /* LỚP 3 (TRONG): Lõi tối nhẹ để kính có độ dày */
                inset -6px -8px 20px rgba(0, 0, 0, 0.4),

                /* LỚP 4 (NGOÀI): Bóng đen vật lý đổ xô lệch chéo xuống Bottom-Right */
                8px 12px 16px rgba(0, 0, 0, 0.6),

                /* LỚP 5 (NGOÀI): Bóng tụ quang màu xuyên thấu đổ xuống nền */
                12px 18px 30px -4px rgba(255, 0, 120, 0.6);
        }

        /* HIỆU ỨNG LÓA BỀ MẶT TRÊN CÙNG (Surface Glare) */
        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            /* Phủ một lớp sáng cực nhẹ từ Top-Left chéo xuống nửa nút rồi biến mất */
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 30%, transparent 35%);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <button class="glass-btn btn-cyan">Thuật toán Cyan</button>
    <button class="glass-btn btn-magenta">Thuật toán Magenta</button>

</body>
</html>
