<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Trong Suốt (Clear Glass) - V19</title>
    <style>
        /* ĐỔI NỀN SANG MÀU XANH GIỐNG ẢNH MẪU ĐỂ TEST ĐỘ TRONG SUỐT */
        body {
            background-color: #8ab6d6; /* Màu xanh thiên thanh */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
            /* Thêm gradient nhẹ cho nền có chiều sâu */
            background-image: radial-gradient(circle at 50% 0%, #b0d4ef 0%, #689dc3 100%);
        }

        /* KHỐI KÍNH TRONG SUỐT (CLEAR GLASS VOLUME) */
        .clear-glass {
            width: 240px;
            height: 240px;
            border-radius: 65px; /* Bo góc cực tròn trịa */
            position: relative;
            cursor: pointer;
            
            /* 1. KHẮC PHỤC LỖI NHỰA ĐỤC: 
               - Trả khối kính về trạng thái KHÔNG MÀU (Chỉ phủ một lớp trắng cực kỳ mờ 5%)
               - Dùng Blur để bẻ cong nền xanh phía sau, tạo chất liệu kính */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.0) 100%);
            backdrop-filter: blur(10px) saturate(110%);
            -webkit-backdrop-filter: blur(10px) saturate(110%);

            /* 2. KHẮC PHỤC THIẾU ĐỘ DÀY & PHẢN QUANG YẾU (The 3D Geometry) */
            box-shadow: 
                /* A. Dải sáng Top-Left (Nguồn sáng chính): Dày, rực rỡ và uốn cong */
                inset 5px 5px 15px rgba(255, 255, 255, 0.6),  /* Vầng sáng rộng */
                inset 2px 2px 5px rgba(255, 255, 255, 1),     /* Sống kính bén ngót */
                
                /* B. Vách kính tối (Tạo độ dày và sâu cho lòng kính) */
                inset -12px -12px 25px rgba(0, 0, 0, 0.15),
                inset 8px 8px 20px rgba(0, 0, 0, 0.05),
                
                /* C. Khúc xạ hắt sáng ở đáy (Bottom-Right Bounce Light) */
                inset -4px -4px 10px rgba(255, 255, 255, 0.7), /* Ánh sáng dội ngược lên */
                inset -1px -2px 3px rgba(255, 180, 50, 0.4),   /* Đốm màu cam nhiễu quang học ở mép (Giống ảnh gốc) */

                /* D. Bóng đổ vật lý (Ambient Drop Shadow) */
                12px 25px 40px rgba(0, 50, 100, 0.2), /* Bóng tiệp với màu nền xanh */
                
                /* E. Quầng tụ quang hắt xuyên thấu xuống bàn (Caustics) */
                5px 10px 20px rgba(255, 255, 255, 0.4);

            /* Viền bao ngoài cùng để định hình khối */
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom-color: rgba(255, 255, 255, 0.1);
            border-right-color: rgba(255, 255, 255, 0.1);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 3. LÓA BỀ MẶT HỮU CƠ (Organic Surface Gloss) */
        /* Không dùng đường vát chéo cứng đơ nữa, dùng vầng sáng tỏa nhẹ */
        .clear-glass::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 60px;
            background: radial-gradient(ellipse at top left, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Hiệu ứng vật lý khi nhấn */
        .clear-glass:active {
            transform: scale(0.96) translateY(4px);
            box-shadow: 
                inset 5px 5px 20px rgba(255, 255, 255, 0.8),
                inset -12px -12px 30px rgba(0, 0, 0, 0.25),
                inset -3px -3px 8px rgba(255, 255, 255, 0.9),
                5px 10px 15px rgba(0, 50, 100, 0.2),
                2px 5px 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="clear-glass"></div>

</body>
</html>
