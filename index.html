<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V17 MASTER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: #fff; padding: 25px; border-radius: 20px; width: 280px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        h2 { color: #e84118; margin: 0 0 10px; font-size: 24px; text-align: center; }
        button { 
            width: 100%; padding: 15px; background: #e84118; color: white; 
            border: none; cursor: pointer; border-radius: 50px; font-weight: bold;
        }
        .progress-container { width: 100%; height: 10px; background: #f1f2f6; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #e84118; transition: 0.2s; }
        #stt { text-align: center; font-size: 11px; margin-top: 10px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="ui">
        <h2>NAM ARCH v17</h2>
        <p style="text-align:center; font-size:12px; margin-top:-5px;">BẢN FIX LỖI RỐI NÉT - 2 LỀ</p>
        <button onclick="exportV17()">XUẤT CAD SIÊU SẠCH</button>
        <div class="progress-container" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="stt">Chào bạn! Nhấn Ctrl+F5 nếu thấy v13.</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

        async function exportV17() {
            const stt = document.getElementById('stt');
            const pFill = document.getElementById('p-fill');
            document.getElementById('p-bar').style.display = 'block';
            
            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;
                const ways = data.elements.filter(e => e.type === "way");

                ways.forEach((e, idx) => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n && b.contains([n.lat, n.lon]));
                    if (nodes.length < 2) return;

                    const isBuilding = !!e.tags?.building;
                    if (isBuilding) {
                        dxf += `0\nPOLYLINE\n8\nNHA\n62\n1\n66\n1\n70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nNHA\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    } else {
                        let w = (e.tags.highway === 'primary' || e.tags.highway === 'trunk') ? 6 : 3;
                        let leftPoints = [], rightPoints = [];

                        for (let i = 0; i < nodes.length - 1; i++) {
                            let n1 = nodes[i], n2 = nodes[i+1];
                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            let dx = x2 - x1, dy = y2 - y1;
                            let len = Math.sqrt(dx*dx + dy*dy);
                            if (len < 0.1) continue; // Bỏ qua đoạn quá ngắn gây rối

                            let ox = (-dy / len) * w, oy = (dx / len) * w;
                            if (i === 0) {
                                leftPoints.push({x: x1+ox, y: y1+oy});
                                rightPoints.push({x: x1-ox, y: y1-oy});
                            }
                            leftPoints.push({x: x2+ox, y: y2+oy});
                            rightPoints.push({x: x2-ox, y: y2-oy});
                        }

                        if (leftPoints.length > 1) {
                            dxf += `0\nPOLYLINE\n8\nDUONG\n62\n7\n66\n1\n`;
                            leftPoints.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                            dxf += `0\nSEQEND\n0\nPOLYLINE\n8\nDUONG\n62\n7\n66\n1\n`;
                            rightPoints.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                            dxf += `0\nSEQEND\n`;
                        }
                    }
                    pFill.style.width = (idx/ways.length*100) + "%";
                });

                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_V17_Master_Clean.dxf";
                a.click();
                stt.innerText = "XONG! Bản vẽ v17 đã sẵn sàng.";
            } catch (err) { stt.innerText = "Lỗi kết nối!"; }
        }
    </script>
</body>
</html>
