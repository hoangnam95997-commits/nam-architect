<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH v35 - Workspace Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #121212; --panel: rgba(25, 25, 25, 0.95); --text: #eee; }
        .light-mode { --accent: #ff4757; --bg: #f5f6fa; --panel: rgba(255, 255, 255, 0.95); --text: #2f3542; }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        .sidebar {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 320px;
            background: var(--panel); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(128,128,128,0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 22px; color: var(--accent); letter-spacing: -1px; margin-bottom: 5px; }
        .tagline { font-size: 9px; opacity: 0.6; text-transform: uppercase; margin-bottom: 20px; display: block; }

        .control-group { margin-bottom: 15px; display: flex; gap: 8px; flex-direction: column; }
        
        button {
            padding: 12px; border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 11px; text-transform: uppercase;
        }
        .btn-theme { background: #57606f; color: white; }
        .btn-fetch { background: #3498db; color: white; }
        .btn-export { background: var(--accent); color: #000; margin-top: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .color-panel { background: rgba(128,128,128,0.1); padding: 15px; border-radius: 12px; margin-top: 15px; }
        .color-panel label { display: block; font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 12px; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        input[type="color"] { border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; background: none; }

        #stt { font-size: 10px; text-align: center; margin-top: 15px; color: var(--accent); font-family: monospace; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>NAM ARCH v35</h1>
        <span class="tagline">Interactive Design Dashboard</span>

        <div class="control-group">
            <button class="btn-theme" onclick="toggleTheme()">🌓 ĐỔI GIAO DIỆN (SÁNG/TỐI)</button>
            <button class="btn-fetch" onclick="loadData()">🔄 CẬP NHẬT DỮ LIỆU VÙNG NÀY</button>
        </div>

        <div class="color-panel">
            <label>ĐIỀU KHIỂN MÀU TRỰC TIẾP (LIVE)</label>
            <div class="row"><span>Tòa nhà</span><input type="color" id="cNha" value="#ff4757" oninput="applyLiveColors()"></div>
            <div class="row"><span>Lòng đường</span><input type="color" id="cDuong" value="#2f3542" oninput="applyLiveColors()"></div>
            <div class="row"><span>Vỉa hè</span><input type="color" id="cViaHe" value="#f1c40f" oninput="applyLiveColors()"></div>
            <div class="row"><span>Cây xanh</span><input type="color" id="cCay" value="#2ed573" oninput="applyLiveColors()"></div>
            <div class="row"><span>Mặt nước</span><input type="color" id="cNuoc" value="#1e90ff" oninput="applyLiveColors()"></div>
        </div>

        <button class="btn-export" onclick="exportCAD()">📥 XUẤT CAD 1:1 (CLEAN LAYERS)</button>
        <div id="stt">HỆ THỐNG SẴN SÀNG</div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([10.7933, 106.6800], 17);
        var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
        var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png');
        
        var groups = {
            nha: L.layerGroup().addTo(map),
            duong: L.layerGroup().addTo(map),
            viahe: L.layerGroup().addTo(map),
            cay: L.layerGroup().addTo(map),
            nuoc: L.layerGroup().addTo(map)
        };

        // HÀM ĐỔI GIAO DIỆN SÁNG TỐI
        function toggleTheme() {
            if(document.body.classList.toggle('light-mode')) {
                map.removeLayer(darkT); lightT.addTo(map);
            } else {
                map.removeLayer(lightT); darkT.addTo(map);
            }
        }

        // HÀM ĐIỀU KHIỂN MÀU TRỰC TIẾP (LIVE)
        function applyLiveColors() {
            const colors = {
                nha: document.getElementById('cNha').value,
                duong: document.getElementById('cDuong').value,
                viahe: document.getElementById('cViaHe').value,
                cay: document.getElementById('cCay').value,
                nuoc: document.getElementById('cNuoc').value
            };

            groups.nha.eachLayer(l => l.setStyle({ color: colors.nha, fillColor: colors.nha, fillOpacity: 0.85 }));
            groups.duong.eachLayer(l => l.setStyle({ color: colors.duong, fillColor: colors.duong, fillOpacity: 1 }));
            groups.viahe.eachLayer(l => l.setStyle({ color: colors.viahe, fillColor: colors.viahe, fillOpacity: 0.8 }));
            groups.cay.eachLayer(l => l.setStyle({ color: colors.cay, fillColor: colors.cay, fillOpacity: 0.75 }));
            groups.nuoc.eachLayer(l => l.setStyle({ color: colors.nuoc, fillColor: colors.nuoc, fillOpacity: 0.8 }));
        }

        async function loadData() {
            if(map.getZoom() < 16) return alert("Zoom gần hơn để quét dữ liệu!");
            document.getElementById('stt').innerText = "📡 ĐANG QUÉT DỮ LIỆU...";
            
            const b = map.getBounds();
            const q = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];way["natural"~"water|wood"];way["landuse"~"grass|forest"];way["leisure"~"park"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                Object.values(groups).forEach(g => g.clearLayers());
                let rPolys = [], wPolys = [];

                data.elements.filter(e => e.type === "way").forEach(e => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                    if (nodes.length < 2) return;
                    const latlngs = nodes.map(n => [n.lat, n.lon]);

                    if (e.tags?.building) {
                        L.polygon(latlngs, { weight: 0.5 }).addTo(groups.nha);
                    } else if (e.tags?.highway) {
                        const line = turf.lineString(nodes.map(n => [n.lon, n.lat]));
                        const w = (e.tags.highway === 'primary') ? 10 : 6;
                        rPolys.push(turf.buffer(line, w/2, {units:'meters'}));
                        wPolys.push(turf.buffer(line, (w/2)+3, {units:'meters'}));
                    } else if (e.tags?.natural === 'water') {
                        L.polygon(latlngs, { weight: 0 }).addTo(groups.nuoc);
                    } else if (e.tags?.leisure || e.tags?.landuse) {
                        L.polygon(latlngs, { weight: 0 }).addTo(groups.cay);
                    }
                });

                if (rPolys.length > 0) {
                    let mR = rPolys.reduce((a, b) => turf.union(a, b));
                    let mW = wPolys.reduce((a, b) => turf.union(a, b));
                    L.geoJSON(mR, { weight: 0 }).addTo(groups.duong);
                    L.geoJSON(turf.difference(mW, mR), { weight: 0 }).addTo(groups.viahe);
                }
                applyLiveColors();
                document.getElementById('stt').innerText = "✅ ĐÃ CẬP NHẬT MÀU LIVE";
            } catch (err) { document.getElementById('stt').innerText = "❌ LỖI: SERVER QUÁ TẢI"; }
        }

        function exportCAD() {
            document.getElementById('stt').innerText = "📥 ĐANG XUẤT CAD...";
            const center = map.getCenter();
            const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
            let dxf = "0\nSECTION\n2\nENTITIES\n";

            groups.nha.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "CONG_TRINH", center, sx, sy));
            groups.duong.eachLayer(l => dxf += geoToDxf(l.toGeoJSON(), "MAT_DUONG", center, sx, sy));
            groups.viahe.eachLayer(l => dxf += geoToDxf(l.toGeoJSON(), "VIA_HE", center, sx, sy));
            groups.nuoc.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "MAT_NUOC", center, sx, sy));
            groups.cay.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "CAY_XANH", center, sx, sy));

            dxf += "0\nENDSEC\n0\nEOF";
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
            a.download = "NAM_ARCH_V35_1x1.dxf"; a.click();
            document.getElementById('stt').innerText = "🚀 XUẤT FILE THÀNH CÔNG";
        }

        function writeDxf(pts, layer, center, sx, sy) {
            let s = `0\nPOLYLINE\n8\n${layer}\n66\n1\n70\n1\n`;
            pts.forEach(p => s += `0\nVERTEX\n8\n${layer}\n10\n${((p.lng - center.lng) * sx).toFixed(3)}\n20\n${((p.lat - center.lat) * sy).toFixed(3)}\n`);
            return s + "0\nSEQEND\n";
        }

        function geoToDxf(geo, layer, center, sx, sy) {
            let s = "";
            let rings = (geo.geometry.type === 'Polygon') ? geo.geometry.coordinates : geo.geometry.coordinates.flat(1);
            rings.forEach(ring => {
                s += `0\nPOLYLINE\n8\n${layer}\n66\n1\n70\n1\n`;
                ring.forEach(pt => s += `0\nVERTEX\n8\n${layer}\n10\n${((pt[0] - center.lng) * sx).toFixed(3)}\n20\n${((pt[1] - center.lat) * sy).toFixed(3)}\n`);
                s += `0\nSEQEND\n`;
            });
            return s;
        }
    </script>
</body>
</html>
