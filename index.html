<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - CAD FINAL FIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .ui { position: absolute; top: 20px; left: 50px; z-index: 1000; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); width: 220px; text-align: center;}
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 14px; }
        #stt { font-size: 12px; margin-top: 10px; color: #333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 10px; font-size:18px;">NAM CAD PRO</h2>
        <button onclick="exportCAD()">TẢI FILE CAD (.DXF)</button>
        <div id="stt">Trạng thái: Sẵn sàng</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 18);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        async function exportCAD() {
            const stt = document.getElementById('stt');
            stt.innerText = "⏳ Đang quét dữ liệu...";
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json];(way["building"](${bbox});way["highway"](${bbox}););out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                
                if (!data.elements || data.elements.length < 5) {
                    stt.innerText = "❌ Vùng này không có nét vẽ!";
                    return;
                }

                // Header DXF R12 - Ép màu trắng (62\n7)
                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 1000000; // Phóng đại cực lớn để dễ thấy

                data.elements.filter(e => e.type === "way").forEach(e => {
                    for (let i = 0; i < e.nodes.length - 1; i++) {
                        let n1 = data.elements.find(n => n.id === e.nodes[i]);
                        let n2 = data.elements.find(n => n.id === e.nodes[i+1]);
                        
                        if (n1 && n2) {
                            let x1 = (n1.lon - center.lng) * scale;
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale;
                            let y2 = (n2.lat - center.lat) * scale;

                            // Ép layer trắng (62\n7)
                            dxf += `0\nLINE\n8\nNAM_ARCH\n62\n7\n10\n${x1}\n20\n${y1}\n30\n0.0\n11\n${x2}\n21\n${y2}\n31\n0.0\n`;
                        }
                    }
                });
                
                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_Architect_Final.dxf";
                a.click();
                stt.innerText = "✅ ĐÃ TẢI XONG!";
            } catch (e) { stt.innerText = "❌ Lỗi kết nối!"; }
        }
    </script>
</body>
</html>
