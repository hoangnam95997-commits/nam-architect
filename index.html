<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Pha Lê - Sandbox V9</title>
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
        }

        /* 1. LAYER BEZEL (VIỀN VỎ NGOÀI CÙNG) */
        /* Tạo ra ranh giới quang học: Tối ở Trên-Trái, Rực rỡ ở Dưới-Phải */
        .glass-bezel {
            width: 250px;
            height: 250px;
            border-radius: 64px; /* Bo góc ngoài lớn hơn */
            position: relative;
            cursor: pointer;
            
            /* Gradient vỏ: Tím đen -> Đỏ tía -> Cam cháy */
            background: linear-gradient(135deg, #2c0b4e 0%, #a2125f 50%, #ff7300 100%);
            padding: 3px; /* Độ dày của vỏ */
            
            /* Bóng đổ vật lý và Caustics (Quầng màu hắt xuống nền) */
            box-shadow: 
                15px 25px 35px rgba(0, 0, 0, 0.15),         /* Bóng đen vật lý */
                5px 15px 35px rgba(255, 40, 100, 0.4);      /* Quầng hồng/cam hắt sáng */
                
            transition: transform 0.2s ease;
        }
        
        .glass-bezel:active {
            transform: scale(0.95);
        }

        /* 2. LAYER LÕI KÍNH (THE GLASS CORE) */
        .glass-core {
            width: 100%;
            height: 100%;
            border-radius: 61px; /* Bo góc trong ôm khít vỏ */
            position: relative;
            overflow: hidden;
            
            /* Base Màu: Dùng màu đặc có độ rực cao để tạo sự trong trẻo, không dùng rgba loãng */
            background: linear-gradient(135deg, #6c1eb2 0%, #e82167 50%, #ff8c3a 100%);
            
            /* KỸ THUẬT KHOÉT SÂU 3D BẰNG SHADOW (Quyết định độ thật của kính) */
            box-shadow: 
                /* Khoét tối góc Trên-Trái: Tạo cảm giác lớp vỏ nhô lên, lõi tụt xuống */
                inset 10px 10px 25px rgba(0, 0, 0, 0.25),
                inset 2px 2px 5px rgba(0, 0, 0, 0.4),
                
                /* Làm sâu lõi góc Dưới-Phải */
                inset -15px -15px 35px rgba(0, 0, 0, 0.3),
                
                /* Viền đọng sáng Neon cực gắt ở mép Dưới-Phải (Phản xạ toàn phần) */
                inset -2px -2px 6px rgba(255, 255, 255, 0.6),
                inset -6px -6px 15px rgba(255, 200, 0, 0.9);
        }

        /* 3. LAYER BÓNG GƯƠNG (THE SHARP GLOSS CUT) */
        /* Đóng vai trò là ánh sáng hắt trên bề mặt phẳng của kính */
        .glass-gloss {
            position: absolute;
            inset: 1px; 
            border-radius: 60px;
            /* Cắt chéo đột ngột tại 45% -> 45.1% tạo độ Polished (Đánh bóng) */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.65) 0%, 
                rgba(255, 255, 255, 0.15) 45%, 
                rgba(255, 255, 255, 0) 45.1%, 
                transparent 100%
            );
            pointer-events: none;
        }

        /* 4. LAYER BỤI SÁNG (SPARKLES) */
        .sparkles {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
        }
        .sparkle {
            position: absolute; background: white; border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.6);
        }
        .s1 { width: 3px; height: 3px; top: 35%; left: 18%; }
        .s2 { width: 2px; height: 2px; top: 43%; left: 24%; }
        .s3 { width: 1.5px; height: 1.5px; bottom: 26%; right: 22%; }
    </style>
</head>
<body>

    <div class="glass-bezel">
        <div class="glass-core">
            <div class="glass-gloss"></div>
            <div class="sparkles">
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
            </div>
        </div>
    </div>

</body>
</html>
