<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - CAD CLEAN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .control-panel {
            position: absolute; top: 15px; left: 50px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 230px;
        }
        button {
            width: 100%; padding: 12px; background: #e74c3c; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #c0392b; transform: translateY(-2px); }
        #stt { margin-top: 10px; font-size: 11px; color: #7f8c8d; line-height: 1.4; }
    </style>
</head>
<body>

<div class="control-panel">
    <h3 style="margin:0 0 10px 0; color:#333;">NAM CAD PRO - SẠCH</h3>
    <button onclick="exportCleanCAD()">XUẤT CAD SẠCH NÉT</button>
    <div id="stt">• Chế độ lọc nét rối<br>• Lấy ranh đường chính & nhà<br>• Trạng thái: Sẵn sàng</div>
</div>

<div id="map"></div>

<script>
    var map = L.map('map').setView([10.7933, 106.6800], 17);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    async function exportCleanCAD() {
        const stt = document.getElementById('stt');
        stt.innerText = "⏳ Đang lọc dữ liệu rối...";
        
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        
        // BỘ LỌC THÔNG MINH:
        // 1. Lấy tất cả nhà (building)
        // 2. Chỉ lấy các loại đường chính (primary, secondary, tertiary, residential, motorway, trunk)
        // -> Loại bỏ các đường hẻm nhỏ (service, footway, path, cycleway)
        const query = `[out:json];(way["building"](${bbox});way["highway"~"^(primary|secondary|tertiary|residential|motorway|trunk)$"](${bbox}););out body;>;out skel qt;`;
        const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

        try {
            const res = await fetch(url);
            const data = await res.json();

            if (!data.elements || data.elements.length === 0) {
                stt.innerText = "❌ Vùng này không có dữ liệu!";
                return;
            }

            // Header DXF
            let dxf = "0\nSECTION\n2\nENTITIES\n";
            const center = map.getCenter();
            const scale = 111319; // Quy đổi sang mét thực tế

            data.elements.filter(el => el.type === "way").forEach(el => {
                let layer = el.tags?.building ? "NHA_HIEN_HUU" : "DUONG_GIAO_THONG";
                dxf += "0\nLWPOLYLINE\n100\nAcDbEntity\n8\n" + layer + "\n100\nAcDbPolyline\n90\n" + e.nodes.length + "\n70\n1\n";
                
                el.nodes.forEach(nid => {
                    let n = data.elements.find(node => node.id === nid);
                    if (n) {
                        let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                        let y = (n.lat - center.lat) * scale;
                        dxf += "10\n" + x.toFixed(3) + "\n20\n" + y.toFixed(3) + "\n";
                    }
                });
            });

            dxf += "0\nENDSEC\n0\nEOF";
            const blob = new Blob([dxf], {type: 'application/dxf'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Nam_Architect_Plan_Clean.dxf";
            a.click();
            status.innerText = "✅ Đã tải file CAD sạch!";
        } catch (e) {
            status.innerText = "❌ Lỗi: Server bận. Thử lại!";
        }
    }
</script>
</body>
</html>
