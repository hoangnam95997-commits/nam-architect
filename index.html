<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - MAP TO CAD (SIMPLE)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f9; }
        #map { height: 100vh; width: 100vw; }
        .ui-panel { 
            position: absolute; top: 20px; left: 60px; z-index: 1000; 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 240px;
            border: 1px solid #ddd;
        }
        h2 { margin: 0 0 15px; font-size: 18px; color: #333; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        button { 
            width: 100%; padding: 15px; background: #3498db; color: white; 
            border: none; cursor: pointer; border-radius: 8px; font-weight: bold;
            transition: 0.3s; font-size: 14px;
        }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        #stt { font-size: 12px; margin-top: 15px; color: #7f8c8d; line-height: 1.5; }
        .badge { background: #e8f4fd; color: #3498db; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h2>CAD EXPORTER</h2>
        <div id="stt">
            <span class="badge">Chế độ: Đơn giản</span><br><br>
            • Di chuyển đến vùng dự án<br>
            • Zoom gần để thấy rõ nét<br>
            • Nhấn nút bên dưới để tải file
        </div><br>
        <button onclick="exportDXF()">XUẤT FILE DXF (CAD)</button>
        <div id="msg" style="margin-top:10px; font-weight:bold; text-align:center;"></div>
    </div>
    <div id="map"></div>

    <script>
        // Khởi tạo bản đồ với phong cách đơn giản (Light Mode)
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        async function exportDXF() {
            const msg = document.getElementById('msg');
            msg.style.color = "#e67e22";
            msg.innerText = "⏳ Đang chuẩn bị dữ liệu...";
            
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json];(way["building"](${bbox});way["highway"](${bbox}););out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                
                if (!data.elements || data.elements.length === 0) {
                    msg.style.color = "red";
                    msg.innerText = "❌ Vùng này không có nét vẽ!";
                    return;
                }

                    // Tạo layer riêng cho nhà và đường để dễ quản lý trong CAD
                    let layer = e.tags?.building ? "NHA_HI
