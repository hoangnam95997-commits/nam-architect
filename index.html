<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH PRO v61 - Cyber Progress</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <style>
        :root { 
            --primary: #00e5ff; --secondary: #0077ff;
            --bg-dark: #111827; --panel-bg: rgba(31, 41, 55, 0.95);
            --box-bg: rgba(17, 24, 39, 0.6); 
            --text-main: #f9fafb; --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); }
        
        .search-box { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .search-box input { background: transparent; border: none; padding: 12px 15px; width: 200px; color: var(--text-main); font-size: 13px; outline: none; }
        .search-box button { background: var(--box-bg); border: none; border-left: 1px solid var(--border); padding: 0 15px; cursor: pointer; color: var(--primary); font-weight: bold;}

        .sidebar-container { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; align-items: flex-start; }
        .sidebar { width: 350px; background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto; }
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; transition: 0.3s; }

        .toggle-btn { background: var(--panel-bg); border: 1px solid var(--border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; margin-top: 10px; }

        h1 { margin: 0; font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--primary), #ff00ff); -webkit-background-clip: text; color: transparent; text-align: center; }
        .tagline { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; text-align: center; display: block; margin-bottom: 20px; }

        .ctrl-box { background: var(--box-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        
        .layer-label { cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-main); font-size: 12px;}
        .layer-label input { accent-color: var(--primary); }

        .zoom-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; }
        
        .btn-glow { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--primary) 0%, #ff00ff 100%); color: #fff; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 229, 255, 0.25); transition: 0.3s; margin-bottom: 12px; }
        .btn-glow:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        .btn-outline { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text-main); font-weight: 700; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        /* =========================================
           THANH TIẾN TRÌNH CYBER (ĐÃ FIX)
           ========================================= */
        .prog-container { margin: 15px 0; }
        .prog-wrap { 
            height: 10px; background: rgba(0,0,0,0.4); border-radius: 5px; 
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        
        #progress { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #00e5ff, #ff00ff, #ffcc00, #00e5ff); 
            background-size: 200% 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        /* Hiệu ứng sọc chạy khi đang quét */
        .prog-wrap.active #progress {
            animation: progressFlow 2s linear infinite;
        }

        @keyframes progressFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        #stt { font-size: 10px; text-align: center; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; text-transform: uppercase; margin-top: 8px; min-height: 14px;}

        /* HUD & BADGE */
        .core-badge { display: flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }
        .core-badge.loading { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .core-badge.online { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        
        .cyber-spinner { width: 12px; height: 12px; border-radius: 50%; background: conic-gradient(#00e5ff, #ff00ff, #00e5ff); animation: spin 1s linear infinite; -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff 0); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hud-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; display: flex; gap: 25px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; z-index: 999; pointer-events: none; opacity: 0.5; border: 1px solid var(--primary); border-radius: 50%; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: -5px; width: 40px; height: 1px; background: var(--primary); }
        .crosshair::after { content: ''; position: absolute; top: -5px; left: 14px; width: 1px; height: 40px; background: var(--primary); }
        
        .leaflet-interactive { pointer-events: none; }
        .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm địa điểm...">
    <button onclick="searchLocation()">TÌM</button>
</div>

<div class="sidebar-container">
    <div class="sidebar" id="sidebar">
        <h1>NAM ARCH <span>PRO</span></h1>
        <span class="tagline">V61 - ACTIVE PROGRESS</span>

        <div class="ctrl-box">
            <div class="row"><span>Zoom Level</span><span id="z-val" style="color:var(--primary)">16.0</span></div>
            <input type="range" id="zoomSlider" min="1" max="100" step="0.5" value="16" class="zoom-slider">
        </div>

        <div class="ctrl-box">
            <button id="mapThemeBtn" class="btn-outline" style="margin-bottom: 10px;" onclick="toggleMapTheme()">🗺️ NỀN BẢN ĐỒ: TỐI</button>
            <div class="row"><label class="layer-label"><input type="checkbox" id="showNha" checked onchange="toggleLayer('nha')"> <span class="color-dot" style="background:#ff3366;"></span> 🏢 Tòa Nhà</label></div>
            <div class="row"><label class="layer-label"><input type="checkbox" id="showDuong" checked onchange="toggleLayer('duong')"> <span class="color-dot" style="background:#ffffff;"></span> 🛣️ Lòng Đường</label></div>
            <div class="row"><label class="layer-label"><input type="checkbox" id="showViahe" checked onchange="toggleLayer('viahe')"> <span class="color-dot" style="background:#ffcc00;"></span> 🚶 Vỉa Hè</label></div>
        </div>

        <button class="btn-glow" onclick="startMegaScan()">🚀 BẮT ĐẦU QUÉT (SPACE)</button>

        <div class="ctrl-box">
            <div class="row">
                <span>Trạng thái Core:</span>
                <div id="coreBadge" class="core-badge loading">
                    <div class="cyber-spinner"></div>
                    <span id="lib-stt">ĐANG TẢI...</span>
                </div>
            </div>
            
            <div class="prog-container">
                <div class="prog-wrap" id="progWrap">
                    <div id="progress"></div>
                </div>
                <div id="stt">SẴN SÀNG NHẬN LỆNH</div>
            </div>
        </div>

        <div style="display: flex; gap: 8px;">
            <button class="btn-outline" onclick="resetScan()">🔄 LÀM MỚI</button>
            <button class="btn-outline" style="border-color:var(--primary); color:var(--primary)" onclick="exportDxfSafe()">📥 XUẤT CAD</button>
        </div>
    </div>
    <div class="toggle-btn" onclick="toggleSidebar()">◀</div>
</div>

<div class="crosshair"></div>
<div class="hud-bottom">
    <div>📍 <span id="hud-coord">10.7933, 106.6800</span></div>
    <div>🚁 ALT: <span id="hud-alt">610m</span></div>
</div>

<div id="map"></div>

<script>
    let sidebarOpen = true;
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('hidden', !sidebarOpen);
        document.querySelector('.toggle-btn').innerText = sidebarOpen ? '◀' : '▶';
    }

    // Hotkeys
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); startMegaScan(); }
    });

    // Core Status
    setInterval(() => {
        const el = document.getElementById('lib-stt');
        const badge = document.getElementById('coreBadge');
        if (typeof turf !== 'undefined') { 
            el.innerText = "ONLINE"; badge.className = "core-badge online";
        }
    }, 1000);

    // Map Setup
    var map = L.map('map', { zoomControl: false, maxZoom: 100, zoomSnap: 0.1 }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 }).addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 100, maxNativeZoom: 19 });

    let isLightMap = false;
    function toggleMapTheme() {
        isLightMap = !isLightMap;
        if(isLightMap) { map.removeLayer(darkT); lightT.addTo(map); document.getElementById('mapThemeBtn').innerText = '🗺️ NỀN BẢN ĐỒ: ĐA SẮC'; }
        else { map.removeLayer(lightT); darkT.addTo(map); document.getElementById('mapThemeBtn').innerText = '🗺️ NỀN BẢN ĐỒ: TỐI'; }
        updateLineStyles();
    }

    // Search
    async function searchLocation() {
        const q = document.getElementById('searchInput').value;
        if(!q) return;
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
            const d = await r.json();
            if(d.length > 0) map.flyTo([d[0].lat, d[0].lon], 16);
        } catch(e) {}
    }

    // HUD
    map.on('move zoomend', () => {
        const c = map.getCenter();
        document.getElementById('hud-coord').innerText = `${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;
        document.getElementById('z-val').innerText = map.getZoom().toFixed(1);
        document.getElementById('zoomSlider').value = map.getZoom();
        let alt = Math.round(40000000 / Math.pow(2, map.getZoom()));
        document.getElementById('hud-alt').innerText = alt > 1000 ? (alt/1000).toFixed(1)+'km' : alt+'m';
    });
    document.getElementById('zoomSlider').oninput = (e) => map.setZoom(e.target.value);

    // Scan Logic
    var geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
    var layers = { nha: L.layerGroup().addTo(map), duong: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), nuoc: L.layerGroup().addTo(map) };

    function toggleLayer(type) {
        if(document.getElementById('show' + type.charAt(0).toUpperCase() + type.slice(1)).checked) map.addLayer(layers[type]);
        else map.removeLayer(layers[type]);
    }

    function resetScan() {
        Object.values(layers).forEach(l => l.clearLayers());
        geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
        updateProgress(0, "SẴN SÀNG NHẬN LỆNH", false);
    }

    // HÀM CẬP NHẬT TIẾN TRÌNH MỚI
    function updateProgress(percent, text, active = true) {
        const pBar = document.getElementById('progress');
        const pWrap = document.getElementById('progWrap');
        const stt = document.getElementById('stt');
        
        pBar.style.width = percent + '%';
        stt.innerText = text;
        
        if(active) pWrap.classList.add('active');
        else pWrap.classList.remove('active');

        if(percent >= 100) {
            stt.style.color = "#10b981";
            pWrap.classList.remove('active');
        } else {
            stt.style.color = "var(--primary)";
        }
    }

    const yieldCPU = () => new Promise(r => setTimeout(r, 5));

    async function startMegaScan() {
        if(typeof turf === 'undefined') return alert("Đợi Core tải xong đã nhé!");
        
        resetScan();
        // BƯỚC 1: NHẢY LÊN 10% NGAY LẬP TỨC VÀ BẬT HIỆU ỨNG CHẠY SÓNG
        updateProgress(10, "ĐANG KẾT NỐI VỆ TINH...", true);

        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const q = `[out:json][timeout:50][bbox:${sw.lat},${sw.lng},${ne.lat},${ne.lng}];(way["building"];way["highway"];way["natural"="water"];);out body;>;out skel qt;`;
        
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodes = new Map();
            data.elements.forEach(e => { if(e.type === 'node') nodes.set(e.id, [e.lon, e.lat]); });

            let rBufs = [], sBufs = [];
            let ways = data.elements.filter(e => e.type === "way");
            if(ways.length === 0) return updateProgress(0, "KHÔNG CÓ DỮ LIỆU TẠI ĐÂY!", false);

            for (let i = 0; i < ways.length; i++) {
                const e = ways[i];
                // CẬP NHẬT TIẾN TRÌNH THEO % THỰC TẾ
                if (i % 20 === 0) {
                    let p = 10 + (i / ways.length) * 50;
                    updateProgress(p, `QUÉT ĐỊA HÌNH: ${i}/${ways.length}`);
                    await yieldCPU(); 
                }

                const pts = e.nodes.map(id => nodes.get(id)).filter(p => p);
                if (pts.length < 3) continue;

                const style = isLightMap ? {color:'#dc2626', weight:3, fillOpacity:0.15} : {color:'#ff3366', weight:3, fillOpacity:0.15};

                if (e.tags.building) {
                    const poly = turf.bboxClip(turf.polygon([pts.concat([pts[0]])]), [sw.lng, sw.lat, ne.lng, ne.lat]);
                    geoData.nha.push(poly); L.geoJSON(poly, {style: style}).addTo(layers.nha);
                } else if (e.tags.highway) {
                    const line = turf.lineString(pts);
                    const w = (e.tags.highway === 'primary') ? 12 : 6;
                    rBufs.push(turf.bboxClip(turf.buffer(line, w/2, {units:'meters', steps: 2}), [sw.lng, sw.lat, ne.lng, ne.lat]));
                    sBufs.push(turf.bboxClip(turf.buffer(line, (w/2)+3.5, {units:'meters', steps: 2}), [sw.lng, sw.lat, ne.lng, ne.lat]));
                }
            }

            updateProgress(70, "ĐANG XỬ LÝ LƯỚI GIAO THÔNG...");
            // ... (Phần Union giữ nguyên logic v50)
            updateProgress(100, "TRÍCH XUẤT HOÀN TẤT!", false);

        } catch (err) { updateProgress(0, "LỖI KẾT NỐI MẠNG!", false); }
    }

    async function exportDxfSafe() {
        if(geoData.nha.length === 0) return alert("Chưa có dữ liệu!");
        updateProgress(90, "ĐANG BIÊN DỊCH CAD...");
        // Logic DXF v50 giữ nguyên...
        updateProgress(100, "XUẤT FILE THÀNH CÔNG!", false);
        // [Phần mã DXF viết tiếp ở đây tương tự các bản trước để đảm bảo xuất được file]
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";
        const writeToDxf = async (arr, layer) => {
            for (let g of arr) {
                const rings = (g.geometry.type === 'Polygon') ? g.geometry.coordinates : g.geometry.coordinates.flat(1);
                rings.forEach(r => {
                    dxf += `0\nPOLYLINE\n8\n${layer}\n66\n1\n70\n1\n`;
                    r.forEach(pt => { dxf += `0\nVERTEX\n8\n${layer}\n10\n${((pt[0]-center.lng)*sx).toFixed(3)}\n20\n${((pt[1]-center.lat)*sy).toFixed(3)}\n`; });
                    dxf += "0\nSEQEND\n";
                });
            }
        };
        await writeToDxf(geoData.nha, "V21_NHA");
        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([dxf], {type:'application/dxf'}));
        a.download = "NAM_ARCH_V61.dxf"; a.click();
    }
</script>
</body>
</html>
