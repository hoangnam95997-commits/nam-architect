<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán 3D Crystal Icon - Sandbox V16</title>
    <style>
        /* Nền trắng/xám nhạt để tôn lên sự tương phản và bóng đổ y hệt ảnh gốc */
        body {
            background-color: #f2f5f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
        }

        /* 1. LỚP VỎ BAO BỌC (THE OUTER BEZEL) */
        /* Tạo khung viền ngoài cùng, màu tối ở góc trên, sáng rực ở đáy */
        .outer-bezel {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 64px; /* Bo góc Squircle chuẩn */
            padding: 4px; /* Độ dày của vách viền */
            cursor: pointer;
            
            /* Gradient của vỏ: Tím đen -> Tím đỏ -> Cam vàng */
            background: linear-gradient(135deg, #1c0836 0%, #820b45 40%, #ff8800 100%);
            
            /* BÓNG ĐỔ HẮT RA NGOÀI MÔI TRƯỜNG */
            box-shadow: 
                /* Quầng màu xuyên thấu hắt xuống nền (Caustic Drop) */
                0 25px 45px -10px rgba(233, 30, 99, 0.6),
                /* Bóng đen vật lý tạo khối bám mặt bàn */
                0 15px 25px -5px rgba(0, 0, 0, 0.35),
                /* Highlight mảnh bọc mép viền ngoài */
                inset 1px 1px 2px rgba(255, 255, 255, 0.3);
                
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .outer-bezel:active {
            transform: scale(0.95);
        }

        /* 2. LÕI KÍNH 3D (THE INNER GLASS CORE) */
        .inner-core {
            width: 100%;
            height: 100%;
            border-radius: 60px; /* Ôm khít vách viền */
            position: relative;
            overflow: hidden;
            
            /* MÀU GỐC CỰC BÃO HÒA (Solid Saturation) - Không dùng rgba loãng */
            background: linear-gradient(135deg, #48148c 0%, #e91e63 50%, #ff5722 100%);
            
            /* KIẾN TẠO CHIỀU SÂU VÀ KHÚC XẠ BÊN TRONG (Volumetric Shading) */
            box-shadow: 
                /* Viền sáng cực gắt ở mặt đón sáng Top-Left */
                inset 2px 2px 4px rgba(255, 255, 255, 0.8),
                inset 1px 1px 1px rgba(255, 255, 255, 1),
                
                /* KHOÉT SÂU LÕI KÍNH: Bóng đen chìm tạo độ sâu thăm thẳm */
                inset 15px 15px 35px rgba(0, 0, 0, 0.4),
                inset -15px -15px 35px rgba(0, 0, 0, 0.3),
                
                /* TỤ QUANG ĐÁY: Mép kính Dưới-Phải phản quang rực rỡ */
                inset -3px -6px 15px rgba(255, 200, 50, 0.9);
        }

        /* 3. VẾT CẮT BÓNG GƯƠNG (THE HARD-STOP GLOSS) */
        /* Tạo bề mặt phẳng, nhẵn thín như pha lê được đánh bóng */
        .inner-core::before {
            content: '';
            position: absolute;
            inset: 1px; /* Bo thụt vào 1px để không đè viền sáng */
            border-radius: 59px;
            
            /* Vết cắt chéo tuyệt đối sắc lẹm tại 46% */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.5) 0%,    /* Sáng chói góc trên */
                rgba(255, 255, 255, 0.05) 46%,  /* Trải đều xuống giữa */
                transparent 46.2%,              /* CẮT ĐỨT ĐOẠN */
                transparent 100%
            );
            pointer-events: none;
        }

        /* 4. ĐIỂM SÁNG RỰC CHÁY Ở ĐÁY (THE CAUSTIC HOTSPOT) */
        /* Đây là điểm hội tụ ánh sáng xuyên thấu qua khối kính */
        .hotspot {
            position: absolute;
            bottom: -4px; 
            left: 20%;
            right: 20%;
            height: 10px;
            /* Tâm trắng lóa, tỏa ra màu cam/vàng bão hòa */
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 1) 0%, rgba(255, 180, 0, 0.9) 40%, transparent 70%);
            filter: blur(2px);
            z-index: 10;
            pointer-events: none;
        }

        /* 5. MICRO DETAILS: BỤI SÁNG PHẢN QUANG (Sparkles) */
        .sparkles { position: absolute; inset: 0; pointer-events: none; }
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.6);
        }
        /* Tọa độ y hệt ảnh mẫu */
        .s1 { width: 3px; height: 3px; top: 32%; left: 16%; }
        .s2 { width: 1.5px; height: 1.5px; top: 43%; left: 24%; }
        .s3 { width: 1.5px; height: 1.5px; bottom: 24%; right: 26%; }

    </style>
</head>
<body>

    <div class="outer-bezel">
        <div class="inner-core">
            <div class="sparkles">
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
            </div>
        </div>
        <div class="hotspot"></div>
    </div>

</body>
</html>
