<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - VIEWPORT CAD</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .ui { position: absolute; top: 20px; left: 50px; z-index: 1000; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 260px; }
        button { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .loader-bg { width: 100%; background: #f0f0f0; border-radius: 10px; margin: 15px 0; display: none; }
        .bar { width: 0%; height: 10px; background: #27ae60; border-radius: 10px; transition: width 0.2s; }
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 10px; color:#2c3e50;">NAM CAD PRO v4</h2>
        <p style="font-size:11px; color:#666;">• Chỉ xuất vùng đang thấy trên màn hình<br>• Tự động cắt nét thừa ngoài biên</p>
        <button id="btn" onclick="exportViewportCAD()">XUẤT CAD VÙNG NHÌN</button>
        <div id="loader" class="loader-bg"><div id="bar" class="bar"></div></div>
        <div id="stt" style="margin-top:10px; font-size:12px; text-align:center; color:#7f8c8d;">Sẵn sàng</div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        async function exportViewportCAD() {
            const bar = document.getElementById('bar');
            document.getElementById('loader').style.display = 'block';
            document.getElementById('stt').innerText = "⏳ Đang tính toán vùng nhìn...";

            // Lấy chính xác ranh giới màn hình hiện tại
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            
            // Query chỉ lấy dữ liệu nằm TRONG bbox (vùng nhìn thấy)
            const query = `[out:json][bbox:${bbox}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                
                let dxf = "  0\nSECTION\n  2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;

                const ways = data.elements.filter(e => e.type === "way");
                ways.forEach((e, idx) => {
                    let color = e.tags?.building ? "1" : "7";
                    
                    for (let i = 0; i < e.nodes.length - 1; i++) {
                        let n1 = data.elements.find(n => n.id === e.nodes[i]);
                        let n2 = data.elements.find(n => n.id === e.nodes[i+1]);
                        
                        if (n1 && n2) {
                            // KIỂM TRA TỌA ĐỘ: Chỉ vẽ nếu điểm nằm trong màn hình
                            if (b.contains([n1.lat, n1.lon]) || b.contains([n2.lat, n2.lon])) {
                                let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                                let y1 = (n1.lat - center.lat) * scale;
                                let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                                let y2 = (n2.lat - center.lat) * scale;

                                dxf += `  0\nLINE\n  8\nNAM_CAD\n 62\n${color}\n 10\n${x1.toFixed(3)}\n 20\n${y1.toFixed(3)}\n 30\n0.0\n 11\n${x2.toFixed(3)}\n 21\n${y2.toFixed(3)}\n 31\n0.0\n`;
                            }
                        }
                    }
                    bar.style.width = Math.floor((idx / ways.length) * 100) + "%";
                });
                
                dxf += "  0\nENDSEC\n  0\nEOF\n";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_Architect_Viewport.dxf";
                a.click();
                document.getElementById('stt').innerText = "✅ ĐÃ XUẤT VÙNG NHÌN!";
                setTimeout(() => document.getElementById('loader').style.display = 'none', 2000);
            } catch (e) { alert("Lỗi: Vùng chọn quá rộng hoặc server bận!"); }
        }
    </script>
</body>
</html>
