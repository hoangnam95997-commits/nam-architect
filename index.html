<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Kính Nguyên Bản - Sandbox V15</title>
    <style>
        /* Nền sáng để kiểm tra độ xuyên sáng của kính */
        body {
            background-color: #eef2f7;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
            /* Thêm caro mờ để thấy rõ sự xuyên thấu và làm nhòe (blur) của kính */
            background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }

        .glass-icon {
            width: 250px;
            height: 250px;
            border-radius: 60px; /* Bo góc Squircle */
            position: relative;
            cursor: pointer;
            
            /* ========================================= */
            /* 1. ĐỘ XUYÊN SÁNG & MÀU SẮC (Transmittance)*/
            /* ========================================= */
            /* Dùng RGBA để màu sắc hòa quyện với nền, tạo độ trong trẻo */
            background: linear-gradient(135deg, 
                rgba(74, 20, 140, 0.65) 0%,   /* Tím */
                rgba(233, 30, 99, 0.55) 50%,  /* Hồng */
                rgba(255, 87, 34, 0.75) 100%  /* Cam */
            );
            
            /* Hiệu ứng kính lúp làm nhòe nền đằng sau */
            backdrop-filter: blur(15px) saturate(120%);
            -webkit-backdrop-filter: blur(15px) saturate(120%);

            /* ========================================= */
            /* 2. ĐỘ BÓNG & ĐỘ DÀY (Gloss & Volume)      */
            /* ========================================= */
            box-shadow: 
                /* Mặt trên đón sáng: Viền highlight trắng mượt mà */
                inset 3px 3px 8px rgba(255, 255, 255, 0.7),
                inset 1px 1px 2px rgba(255, 255, 255, 1),
                
                /* Vách kính (Độ dày): Bóng tối ôm sát tạo chiều sâu cho lõi kính */
                inset -10px -10px 25px rgba(0, 0, 0, 0.4),
                inset 10px 10px 25px rgba(0, 0, 0, 0.15),
                
                /* Tụ quang đáy (Refraction): Ánh sáng đọng lại ở mép kính dưới */
                inset -3px -6px 15px rgba(255, 200, 50, 0.85),
                inset -1px -2px 4px rgba(255, 255, 255, 0.5),
                
                /* Bóng đổ vật lý ngoài cùng */
                10px 20px 30px rgba(0, 0, 0, 0.15),
                
                /* Ánh sáng xuyên thấu hắt màu của kính xuống mặt bàn */
                0px 25px 40px -5px rgba(233, 30, 99, 0.4);
                
            /* Viền ngoài cùng mượt mà bọc lấy khối kính */
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-left-color: rgba(255, 255, 255, 0.3);
            
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ========================================= */
        /* 3. LỚP BÓNG BỀ MẶT (Smooth Surface Gloss) */
        /* ========================================= */
        /* ĐÃ XÓA BỎ VỆT CẮT LỖI. Chỉ để lại độ bóng mượt mà lan tỏa */
        .glass-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 59px;
            /* Phủ một lớp sáng lan tỏa dịu mắt từ góc trên trái xuống */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.45) 0%, 
                rgba(255, 255, 255, 0.05) 45%, 
                transparent 70%
            );
            pointer-events: none;
        }

        .glass-icon:active {
            transform: scale(0.96);
        }

    </style>
</head>
<body>

    <div class="glass-icon"></div>

</body>
</html>
