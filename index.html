<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH v33 - Real-time Color Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #111; --panel: rgba(20, 20, 20, 0.98); --text: #eee; }
        body { margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }

        .sidebar {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 310px;
            background: var(--panel); border-radius: 16px; padding: 22px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        h1 { margin: 0; font-size: 19px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 11px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-fetch { background: #3498db; color: white; }
        .btn-export { background: var(--accent); color: #000; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .color-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .label-title { font-size: 10px; color: var(--accent); font-weight: bold; margin-bottom: 12px; display: block; opacity: 0.8; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        input[type="color"] { border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; background: none; transition: 0.2s; }
        input[type="color"]:hover { transform: scale(1.1); }

        #status { font-size: 10px; text-align: center; color: var(--accent); font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>NAM ARCH v33</h1>

        <button class="btn btn-fetch" onclick="fetchData()">📡 LẤY DỮ LIỆU HIỆN TRẠNG</button>

        <div class="color-group">
            <span class="label-title">BẢNG ĐIỀU KHIỂN MÀU DIAGRAM</span>
            <div class="row"><span>🏢 Tòa nhà</span><input type="color" id="cNha" value="#ff4d4d" oninput="liveUpdate()"></div>
            <div class="row"><span>🛣️ Lòng đường</span><input type="color" id="cDuong" value="#2d3436" oninput="liveUpdate()"></div>
            <div class="row"><span>📐 Vỉa hè (Sidewalk)</span><input type="color" id="cViaHe" value="#fdcb6e" oninput="liveUpdate()"></div>
            <div class="row"><span>🌳 Cây xanh</span><input type="color" id="cCay" value="#00b894" oninput="liveUpdate()"></div>
            <div class="row"><span>🌊 Mặt nước</span><input type="color" id="cNuoc" value="#0984e3" oninput="applyNuoc()"></div>
        </div>

        <button class="btn btn-export" onclick="exportDXF()">📥 XUẤT FILE CAD 1:1</button>
        <div id="status">SẴN SÀNG QUÉT</div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
        
        // Tạo các lớp chứa đối tượng
        var gNha = L.layerGroup().addTo(map);
        var gDuong = L.layerGroup().addTo(map);
        var gViaHe = L.layerGroup().addTo(map);
        var gCay = L.layerGroup().addTo(map);
        var gNuoc = L.layerGroup().addTo(map);

        // HÀM ĐIỀU KHIỂN MÀU TRỰC TIẾP (LIVE CONTROL)
        function liveUpdate() {
            const vNha = document.getElementById('cNha').value;
            const vDuong = document.getElementById('cDuong').value;
            const vViaHe = document.getElementById('cViaHe').value;
            const vCay = document.getElementById('cCay').value;
            const vNuoc = document.getElementById('cNuoc').value;

            gNha.eachLayer(l => l.setStyle({ color: vNha, fillColor: vNha, fillOpacity: 0.8, weight: 0.5 }));
            gDuong.eachLayer(l => l.setStyle({ color: vDuong, fillColor: vDuong, fillOpacity: 1, weight: 0 }));
            gViaHe.eachLayer(l => l.setStyle({ color: vViaHe, fillColor: vViaHe, fillOpacity: 0.8, weight: 0 }));
            gCay.eachLayer(l => l.setStyle({ color: vCay, fillColor: vCay, fillOpacity: 0.7, weight: 0 }));
            gNuoc.eachLayer(l => l.setStyle({ color: vNuoc, fillColor: vNuoc, fillOpacity: 0.8, weight: 0 }));
        }

        async function fetchData() {
            if(map.getZoom() < 16) { alert("Hãy zoom gần hơn!"); return; }
            document.getElementById('status').innerText = "ĐANG TẢI DỮ LIỆU...";
            
            const b = map.getBounds();
            const q = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];way["natural"~"water|wood"];way["landuse"~"grass|forest"];way["leisure"~"park"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                // Xóa cũ để nạp mới
                [gNha, gDuong, gViaHe, gCay, gNuoc].forEach(g => g.clearLayers());
                let rPolys = [], wPolys = [];

                data.elements.filter(e => e.type === "way").forEach(e => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                    if (nodes.length < 2) return;
                    const lats = nodes.map(n => [n.lat, n.lon]);

                    if (e.tags?.building) {
                        L.polygon(lats).addTo(gNha);
                    } else if (e.tags?.highway) {
                        const line = turf.lineString(nodes.map(n => [n.lon, n.lat]));
                        const rW = (e.tags.highway === 'primary') ? 10 : 6;
                        rPolys.push(turf.buffer(line, rW/2, {units:'meters'}));
                        wPolys.push(turf.buffer(line, (rW/2)+3.5, {units:'meters'})); // Vỉa hè bao quanh
                    } else if (e.tags?.natural === 'water') {
                        L.polygon(lats).addTo(gNuoc);
                    } else if (e.tags?.leisure || e.tags?.landuse) {
                        L.polygon(lats).addTo(gCay);
                    }
                });

                if (rPolys.length > 0) {
                    let combinedRoad = rPolys.reduce((a, b) => turf.union(a, b));
                    let combinedWalk = wPolys.reduce((a, b) => turf.union(a, b));
                    L.geoJSON(combinedRoad).addTo(gDuong);
                    L.geoJSON(turf.difference(combinedWalk, combinedRoad)).addTo(gViaHe);
                }

                liveUpdate(); // Áp màu ngay sau khi tải xong
                document.getElementById('status').innerText = "ĐÃ CẬP NHẬT XONG";
            } catch (err) { document.getElementById('status').innerText = "LỖI KẾT NỐI SERVER"; }
        }

        function exportDXF() {
            document.getElementById('status').innerText = "ĐANG XUẤT CAD...";
            const center = map.getCenter();
            const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
            let dxf = "0\nSECTION\n2\nENTITIES\n";

            gNha.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "CONG_TRINH", center, sx, sy));
            gDuong.eachLayer(l => dxf += geoToDxf(l.toGeoJSON(), "MAT_DUONG", center, sx, sy));
            gViaHe.eachLayer(l => dxf += geoToDxf(l.toGeoJSON(), "VIA_HE", center, sx, sy));
            gCay.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "CAY_XANH", center, sx, sy));
            gNuoc.eachLayer(l => dxf += writeDxf(l.getLatLngs()[0], "MAT_NUOC", center, sx, sy));

            dxf += "0\nENDSEC\n0\nEOF";
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
            a.download = "NAM_ARCH_DIAGRAM_1x1.dxf"; a.click();
            document.getElementById('status').innerText = "FILE CAD ĐÃ TẢI VỀ";
        }

        function writeDxf(pts, layer, center, sx, sy) {
            let s = `0\nPOLYLINE\n8\n${layer}\n66\n1\n70\n1\n`;
            pts.forEach(p => s += `0\nVERTEX\n8\n${layer}\n10\n${((p.lng - center.lng) * sx).toFixed(3)}\n20\n${((p.lat - center.lat) * sy).toFixed(3)}\n`);
            return s + "0\nSEQEND\n";
        }

        function geoToDxf(geo, layer, center, sx, sy) {
            let s = "";
            let rings = (geo.geometry.type === 'Polygon') ? geo.geometry.coordinates : geo.geometry.coordinates.flat(1);
            rings.forEach(ring => {
                s += `0\nPOLYLINE\n8\n${layer}\n66\n1\n70\n1\n`;
                ring.forEach(pt => s += `0\nVERTEX\n8\n${layer}\n10\n${((pt[0] - center.lng) * sx).toFixed(3)}\n20\n${((pt[1] - center.lat) * sy).toFixed(3)}\n`);
                s += `0\nSEQEND\n`;
            });
            return s;
        }
    </script>
</body>
</html>
