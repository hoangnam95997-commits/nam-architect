<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH v44 - Screen Bound v21</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #121212; --panel: rgba(28, 28, 28, 0.98); --text: #eee; }
        .light-mode { --accent: #ff4757; --bg: #f5f6fa; --panel: rgba(255, 255, 255, 0.98); --text: #2f3542; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #000; }
        .sidebar {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 320px;
            background: var(--panel); border-radius: 20px; padding: 22px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0; font-size: 22px; color: var(--accent); text-align: center; }
        .tagline { font-size: 9px; opacity: 0.6; display: block; text-align: center; margin-bottom: 20px; }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 11px; text-transform: uppercase; margin-bottom: 8px;
        }
        .btn-main { background: #3498db; color: white; border-bottom: 3px solid #2980b9; }
        .btn-export { background: var(--accent); color: #000; }
        .btn-theme { background: #57606f; color: white; }
        .color-panel { background: rgba(128,128,128,0.1); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(128,128,128,0.2); }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 15px; }
        #progress { width: 0%; height: 100%; background: var(--accent); transition: 0.4s; }
        #stt { font-size: 10px; text-align: center; margin-top: 10px; color: var(--accent); font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>NAM ARCH v44</h1>
    <span class="tagline">SCREEN-BOUND ONLY | CORE V21</span>

    <button class="btn-theme" onclick="toggleTheme()">🌓 ĐỔI GIAO DIỆN (SÁNG/TỐI)</button>
    <button class="btn-main" onclick="runScreenScan()">🚀 QUÉT TRONG MÀN HÌNH (16 MẢNG)</button>

    <div class="color-panel">
        <div class="row"><span>Tòa nhà</span><input type="color" id="cNha" value="#ff4d4d" oninput="liveUpdate()"></div>
        <div class="row"><span>Lòng đường</span><input type="color" id="cDuong" value="#2d3436" oninput="liveUpdate()"></div>
        <div class="row"><span>Vỉa hè</span><input type="color" id="cViaHe" value="#f1c40f" oninput="liveUpdate()"></div>
        <div class="row"><span>Cây xanh</span><input type="color" id="cCay" value="#00b894" oninput="liveUpdate()"></div>
        <div class="row"><span>Mặt nước</span><input type="color" id="cNuoc" value="#0984e3" oninput="liveUpdate()"></div>
    </div>

    <div class="progress-bar"><div id="progress"></div></div>
    <div id="stt">HỆ THỐNG SẴN SÀNG</div>

    <button class="btn-export" style="margin-top:20px" onclick="exportCAD()">📥 XUẤT CAD 1:1 (MESH)</button>
</div>

<div id="map"></div>

<script>
    var map = L.map('map', { zoomControl: false }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png');
    
    var groups = { nha: L.layerGroup().addTo(map), duong: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), cay: L.layerGroup().addTo(map), nuoc: L.layerGroup().addTo(map) };

    function toggleTheme() {
        if(document.body.classList.toggle('light-mode')) { map.removeLayer(darkT); lightT.addTo(map); }
        else { map.removeLayer(lightT); darkT.addTo(map); }
    }

    function liveUpdate() {
        const c = { n: document.getElementById('cNha').value, d: document.getElementById('cDuong').value, v: document.getElementById('cViaHe').value, g: document.getElementById('cCay').value, w: document.getElementById('cNuoc').value };
        groups.nha.eachLayer(l => l.setStyle({ color: c.n, fillColor: c.n, fillOpacity: 0.8, weight: 0.5 }));
        groups.duong.eachLayer(l => l.setStyle({ color: c.d, fillColor: c.d, fillOpacity: 1, weight: 0 }));
        groups.viahe.eachLayer(l => l.setStyle({ color: c.v, fillColor: c.v, fillOpacity: 0.8, weight: 0 }));
        groups.cay.eachLayer(l => l.setStyle({ color: c.g, fillColor: c.g, fillOpacity: 0.7, weight: 0 }));
        groups.nuoc.eachLayer(l => l.setStyle({ color: c.w, fillColor: c.w, fillOpacity: 0.8, weight: 0 }));
    }

    async function runScreenScan() {
        const bounds = map.getBounds();
        const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
        // Giới hạn màn hình để Clip dữ liệu
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];
        
        const rows = 4, cols = 4;
        const latStep = (ne.lat - sw.lat) / rows;
        const lngStep = (ne.lng - sw.lng) / cols;

        Object.values(groups).forEach(g => g.clearLayers());
        document.getElementById('progress').style.width = '0%';
        let done = 0;

        for(let i=0; i<rows; i++) {
            for(let j=0; j<cols; j++) {
                const box = [sw.lat + i*latStep, sw.lng + j*lngStep, sw.lat + (i+1)*latStep, sw.lng + (j+1)*lngStep];
                await fetchV21Screen(box, screenBox);
                done++;
                document.getElementById('progress').style.width = (done/16)*100 + '%';
                document.getElementById('stt').innerText = `QUÉT MÀN HÌNH: ${done}/16`;
            }
        }
        liveUpdate();
        document.getElementById('stt').innerText = "✅ HOÀN THÀNH QUÉT TRONG PHẠM VI";
    }

    async function fetchV21Screen(box, clipBbox) {
        const q = `[out:json][timeout:30][bbox:${box[0]},${box[1]},${box[2]},${box[3]}];(way["building"];way["highway"];way["natural"~"water|wood"];way["landuse"~"grass|forest"];way["leisure"~"park"];);out body;>;out skel qt;`;
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodeMap = new Map();
            data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

            let rPolys = [], wPolys = [];
            data.elements.filter(e => e.type === "way").forEach(e => {
                const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                if (nodes.length < 2) return;
                
                // Thuật toán v21
                if (e.tags?.building) {
                    const poly = turf.polygon([nodes.map(n => [n.lon, n.lat]).concat([[nodes[0].lon, nodes[0].lat]])]);
                    const clipped = turf.bboxClip(poly, clipBbox);
                    if(clipped.geometry.coordinates.length > 0) L.geoJSON(clipped).addTo(groups.nha);
                } else if (e.tags?.highway) {
                    const line = turf.lineString(nodes.map(n => [n.lon, n.lat]));
                    const w = (e.tags.highway === 'primary') ? 10 : 6;
                    rPolys.push(turf.bboxClip(turf.buffer(line, w/2, {units:'meters'}), clipBbox));
                    wPolys.push(turf.bboxClip(turf.buffer(line, (w/2)+3.5, {units:'meters'}), clipBbox));
                } else if (e.tags?.natural === 'water') {
                    const poly = turf.polygon([nodes.map(n => [n.lon, n.lat]).concat([[nodes[0].lon, nodes[0].lat]])]);
                    L.geoJSON(turf.bboxClip(poly, clipBbox)).addTo(groups.nuoc);
                }
            });

            if (rPolys.length > 0) {
                let mR = rPolys.reduce((a, b) => turf.union(a, b));
                let mW = wPolys.reduce((a, b) => turf.union(a, b));
                L.geoJSON(mR).addTo(groups.duong);
                L.geoJSON(turf.difference(mW, mR)).addTo(groups.viahe);
            }
        } catch (e) { console.log("Skip"); }
    }

    function exportCAD() {
        document.getElementById('stt').innerText = "XUẤT CAD 1:1...";
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const writePoly = (layerGroup, name) => {
            layerGroup.eachLayer(l => {
                const geo = l.toGeoJSON();
                let rings = (geo.features) ? geo.features[0].geometry.coordinates : geo.geometry.coordinates;
                if (!Array.isArray(rings[0][0])) rings = [rings];
                
                rings.forEach(ring => {
                    dxf += `0\nPOLYLINE\n8\n${name}\n66\n1\n70\n1\n`;
                    (Array.isArray(ring[0][0]) ? ring[0] : ring).forEach(pt => {
                        dxf += `0\nVERTEX\n8\n${name}\n10\n${((pt[0] - center.lng) * sx).toFixed(3)}\n20\n${((pt[1] - center.lat) * sy).toFixed(3)}\n`;
                    });
                    dxf += "0\nSEQEND\n";
                });
            });
        };

        writePoly(groups.nha, "A_NHA");
        writePoly(groups.duong, "A_DUONG");
        writePoly(groups.viahe, "A_VIA_HE");
        writePoly(groups.nuoc, "A_NUOC");

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type:'application/dxf'}));
        a.download = "NAM_V44_SCREEN_CLIP.dxf"; a.click();
        document.getElementById('stt').innerText = "XUẤT XONG!";
    }
</script>
</body>
</html>
