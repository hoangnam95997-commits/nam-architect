<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH PRO v83 - Pro UI/UX Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js"></script>
    
    <style>
        /* BỘ MÀU SUNSET GRADIENT VÀ NEUMORPHIC CLEAN (CẬP NHẬT MỚI) */
        :root { 
            --bg-main: #2b2f38;           /* Xám tối chủ đạo - Giữ nguyên tone màu chính */
            --gradient-brand: linear-gradient(135deg, #FFB608 0%, #FF2553 50%, #00103C 100%);
            --text-primary: #ffffff;
            --text-secondary: #8b95a5;
            --success: #2ed573;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-day: 0 4px 6px rgba(0,0,0,0.1); /* Bóng nhẹ, sạch sẽ cho ban ngày */
            --night-grid: rgba(128,128,128,0.15); /* Lưới màu xám cho ban đêm */
            --day-grid: rgba(0,0,0,0.15); /* Lưới màu tối cho ban ngày */
        }

        /* TÁC ĐỘNG TOÀN CỤC CỦA THEME SÁNG/TỐI (SỬ DỤNG LỰC ĐÀN HỒI) */
        body { 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: var(--bg-main); 
            color: var(--text-primary); 
        }
        
        body.light-theme { 
            --bg-main: #f0f2f5;           /* Nền xám nhạt sạch sẽ cho ban ngày */
            --text-primary: #1c1e21;      /* Văn bản màu tối cho ban ngày */
            --text-secondary: #606770;    
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #1e2026; transition: all 0.5s; }
        
        /* THANH TÌM KIẾM NEUMORPHISM SẠCH SẼ (BỎ BÓNG CŨ) */
        .search-box { position: absolute; top: 24px; right: 24px; z-index: 1000; display: flex; border-radius: var(--radius-md); overflow: hidden; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .light-theme .search-box { background: #ffffff; box-shadow: var(--shadow-day); } /* Turn white, no old neumorphic shadows */
        
        .search-box input { background: transparent; border: none; padding: 14px 18px; width: 280px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: all 0.5s; color: var(--text-primary); }
        .search-box input::placeholder { color: var(--text-secondary); transition: all 0.5s; }
        
        .search-box button { background: transparent; border: none; border-left: 2px solid rgba(0,0,0,0.05); padding: 0 20px; cursor: pointer; color: var(--text-primary); font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .search-box button:hover { color: #FFB608; } /* Day hover: Gold */
        
        /* CẬP NHẬT TRẠNG THÁI ACTIVE CHO NÚT TÌM KIẾM TRONG THEME SÁNG */
        .light-theme .search-box button:active { background: #e8eaed; }

        /* BẢNG ĐIỀU KHIỂN CHÍNH (NỔI KHỐI 3D SẠCH SẼ) */
        .sidebar-container { position: absolute; top: 24px; left: 24px; z-index: 1000; display: flex; gap: 16px; align-items: flex-start; }
        .sidebar { width: 340px; background: rgba(15,23,42,0.9); border-radius: var(--radius-lg); padding: 24px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: calc(100vh - 48px); overflow-y: auto; }
        .sidebar::-webkit-scrollbar { width: 0px; } 
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }

        .light-theme .sidebar { background: #ffffff; color: var(--text-primary); box-shadow: var(--shadow-day); } /* Turn white */

        .toggle-btn { background: var(--bg-main); color: var(--night-text-color); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: none; margin-top: 8px; font-size: 14px; text-shadow: var(--night-text-glow); }
        .light-theme .toggle-btn { background: #ffffff; color: var(--text-primary); box-shadow: none; text-shadow: none; border: 1px solid rgba(0,0,0,0.05); } /* Day button styling */
        
        .toggle-btn:hover { color: var(--text-primary); text-shadow: none; }
        .toggle-btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .light-theme .toggle-btn:active { background: #e8eaed; box-shadow: none; } /* Day button active */

        /* TYPOGRAPHY (CẬP NHẬT HIỆU ỨNG TEXT VÀ THEME MỚI) */
        .brand-header { margin-bottom: 24px; text-align: center; }
        h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: 0.5px; transition: all 0.3s; }
        
        /* Hiệu ứng Glow ban đêm */
        .brand-header h1, .val-hl, .btn-main, .theme-btn.night-btn { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.4); } 
        h1 span { color: transparent; background: var(--gradient-brand); -webkit-background-clip: text; text-shadow: none; }
        
        .light-theme .brand-header h1, .light-theme h1 span { text-shadow: none; }

        .tagline { font-size: 10px; font-weight: 600; color: var(--night-text-color); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-top: 6px; transition: all 0.3s; text-shadow: var(--night-text-glow); }
        .light-theme .tagline { color: var(--text-secondary); text-shadow: none; }

        /* KHỐI CHỨA CÀI ĐẶT (LÕM XUỐNG SẠCH SẼ) */
        .panel-card { background: var(--bg-main); border-radius: var(--radius-md); padding: 16px; margin-bottom: 18px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .light-theme .panel-card { background: #f0f2f5; box-shadow: none; } /* Turn light gray, no old neumorphic shadows */

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .panel-title { font-size: 11px; font-weight: 700; color: var(--night-text-color); text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; text-shadow: var(--night-text-glow); }
        .light-theme .panel-title { color: var(--text-secondary); text-shadow: none; }

        /* SLIDER NEUMORPHISM (Bỏ bóng nặng nề) */
        .val-hl { color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; text-shadow: none; }
        .zoom-slider-container { background: var(--bg-main); border-radius: 20px; padding: 4px; box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); margin-top: 8px; display: flex; align-items: center; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .light-theme .zoom-slider-container { background: #ffffff; box-shadow: none; } /* Day: light gray background */

        .zoom-slider { -webkit-appearance: none; width: 100%; height: 28px; background: transparent; outline: none; margin: 0; padding: 0;}
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--gradient-brand); cursor: pointer; transition: all 0.2s; position: relative; z-index: 2; margin-top: 2px; }
        
        .light-theme .zoom-slider::-webkit-slider-thumb { background: #74b9ff; } /* Day color */
        
        .zoom-slider::-webkit-slider-runnable-track { width: 100%; height: 28px; background: transparent; border-radius: 20px; position: relative; }
        .zoom-slider::-moz-range-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--gradient-brand); cursor: pointer; transition: all 0.2s; z-index: 2;}
        .light-theme .zoom-slider::-moz-range-thumb { background: #74b9ff; } /* Day color */
        .zoom-slider::-moz-range-track { width: 100%; height: 28px; background: transparent; border-radius: 20px; }

        /* TOGGLE SWITCH CỰC NGẦU CỦA DANH SÁCH PHÂN LỚP (Cập nhật màu ban ngày) */
        .layer-list { display: flex; flex-direction: column; gap: 6px; }
        .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; background: transparent; border: none; cursor: pointer; }
        .layer-left { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; transition: all 0.3s; color: var(--text-primary);}
        
        /* Hiệu ứng Glow text ban đêm cho Layer labels */
        .layer-item Label .layer-left { text-shadow: var(--night-text-glow); color: var(--night-text-color); }
        .light-theme .layer-item Label .layer-left { text-shadow: none; color: var(--text-primary); }

        .color-dot { width: 10px; height: 10px; border-radius: 2px; }
        .layer-item input[type="checkbox"] { display: none; }
        
        /* Rãnh gạt lõm SẠCH SẼ (BỎ BÓNG NẶNG NỀ) */
        .toggle-switch { width: 44px; height: 24px; background: var(--bg-main); border-radius: 20px; position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .light-theme .toggle-switch { background: #e0e0e0; } /* Turn lighter gray */
        
        /* Cục tròn nổi SẠCH SẼ (BỎ BÓNG NẶNG NỀ) */
        .toggle-switch::after { content: ''; position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; background: var(--text-secondary); border-radius: 50%; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        /* Khi bật */
        .layer-item input[type="checkbox"]:checked ~ .toggle-switch { background: #f1f3f4; }
        .layer-item input[type="checkbox"]:checked ~ .toggle-switch::after { transform: translateX(20px); background: #34A853; } /* Chuyển sang xanh cho sạch */
        
        /* Ban ngày màu bật */
        .light-theme .layer-item input[type="checkbox"]:checked ~ .toggle-switch { background: #d7f4e0; }
        .light-theme .layer-item input[type="checkbox"]:checked ~ .toggle-switch::after { background: #34A853; }

        /* NÚT BẤM NEUMORPHISM SẠCH SẼ (BỎ BÓNG NẶNG NỀ CŨ) */
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); background: var(--gradient-brand); color: #fff; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
        .btn-main:hover { filter: brightness(1.1); }
        .btn-main:active { transform: translateY(3px); filter: brightness(1.0); }
        
        /* Nút xuất day theme styling */
        .light-theme .btn-main { background: #74b9ff; color: #ffffff; text-shadow: none; box-shadow: var(--shadow-day); }
        .light-theme .btn-main:hover { filter: brightness(1.1); }
        .light-theme .btn-main:active { background: #74b9ff; filter: brightness(1.0); }

        .btn-outline { padding: 12px; background: var(--bg-main); color: var(--night-text-color); border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); text-shadow: var(--night-text-glow); }
        .light-theme .btn-outline { background: #ffffff; color: var(--text-primary); box-shadow: none; text-shadow: none; border: 1px solid rgba(0,0,0,0.05); } /* Day outline buttons */
        
        .btn-outline:hover { color: var(--text-primary); text-shadow: none; }
        .btn-outline:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .light-theme .btn-outline:active { background: #e8eaed; box-shadow: none; } /* Day active */
        
        .btn-export-2d { flex: 1; }
        .btn-export-3d { flex: 1; color: #FF2553 !important; } /* Cập nhật tone đỏ hồng mới */

        /* TIẾN TRÌNH LÕM SÂU SẠCH SẼ (BỎ BÓNG NẶNG NỀ) */
        .prog-container { margin-top: 16px; }
        .prog-wrap { height: 8px; background: var(--bg-main); border-radius: 4px; overflow: hidden; position: relative; box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .light-theme .prog-wrap { background: #e0e0e0; box-shadow: none; } /* Day lighter gray progress track */

        #progress { width: 0%; height: 100%; background: var(--gradient-brand); transition: width 0.3s ease; }
        .light-theme #progress { background: #74b9ff; } /* Day color progress bar */

        #stt { font-size: 11px; text-align: center; color: var(--night-text-color); font-family: 'Inter', sans-serif; font-weight: 600; margin-top: 10px; line-height: 1.4; transition: all 0.3s; text-shadow: var(--night-text-glow);}
        .light-theme #stt { color: var(--text-secondary); text-shadow: none; }

        /* HUD ĐÁY MÀN HÌNH NỔI KHỐI SẠCH SẼ (BỎ BÓNG NẶNG NỀ) */
        .hud-bottom { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; background: rgba(15,23,42,0.9); border-radius: 30px; padding: 10px 24px; display: flex; gap: 32px; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--night-text-color); text-shadow: var(--night-text-glow); }
        .light-theme .hud-bottom { background: #ffffff; color: var(--text-primary); text-shadow: none; box-shadow: var(--shadow-day); } /* Turn white, day theme labels become dark */
        
        .hud-item { display: flex; align-items: center; gap: 6px; }
        
        /* CẬP NHẬT MÀU HUD LABEL CHO BAN NGÀY */
        .light-theme .hud-item { color: var(--text-primary); text-shadow: none; }
        .hud-val { color: #fff; font-weight: 600; text-shadow: none; transition: all 0.5s; }
        
        /* CẬP NHẬT MÀU HUD VALUES CHO BAN NGÀY */
        .light-theme .hud-val { color: #1c1e21; text-shadow: none; } 
        
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; z-index: 999; pointer-events: none; opacity: 0.6; }
        .crosshair::before { content: ''; position: absolute; top: 11px; left: 0; width: 24px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.5s; }
        .light-theme .crosshair::before { background: #000; } /* Turn black */
        .crosshair::after { content: ''; position: absolute; top: 0; left: 11px; width: 2px; height: 24px; background: #fff; border-radius: 2px; transition: all 0.5s; }
        .light-theme .crosshair::after { background: #000; } /* Turn black */
        .leaflet-interactive { pointer-events: none; }
        
        .core-badge { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--night-text-color); text-shadow: var(--night-text-glow); transition: all 0.3s; }
        .core-badge.online { color: var(--success); text-shadow: 0 0 8px rgba(46, 213, 115, 0.5); }
        .light-theme .core-badge.online { color: #34A853; text-shadow: none; } /* Day color success */
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .core-badge.online .pulse-dot { box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
        .light-theme .core-badge.online .pulse-dot { background: #34A853; box-shadow: 0 0 8px #34A853; } /* Day success pulse color */
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(0.95); opacity: 1; } }

        /* CẬP NHẬT GRID COLOR CHO LEAFLET */
        .light-theme .leaflet-grid-tile canvas { transition: all 0.5s; stroke: var(--day-grid); }
        .leaflet-grid-tile canvas { transition: all 0.5s; stroke: var(--night-grid); }
        
        /* THAY THẾ CÔNG TẮC BẰNG HAI NÚT THEME MỚI */
        .theme-buttons-container { display: flex; gap: 8px; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .light-theme .theme-buttons-container { border-color: rgba(0,0,0,0.05); }
        
        .theme-btn { flex: 1; padding: 12px; background: var(--bg-main); color: var(--text-secondary); border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; gap: 6px; }
        .theme-btn:active { transform: translateY(3px); }
        .theme-btn.day-btn { color: #fcc603; }
        .theme-btn.night-btn { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.4); }
        
        /* Hiển thị theme hiện tại */
        .light-theme .theme-btn.day-btn { background: #74b9ff; color: #ffffff; text-shadow: none; }
        .theme-btn.night-btn.active { background: #00103C; color: #ffffff; text-shadow: 0 0 8px rgba(255,255,255,0.4); } /* Night theme active */
        
        /* Đảm bảo active Night button không bị text glow day theme đè */
        .theme-btn.night-btn.active .layer-left { text-shadow: none !important; } 
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm địa điểm, tọa độ..." onkeypress="if(event.key === 'Enter') searchLocation()">
    <button onclick="searchLocation()">Tìm</button>
</div>

<div class="sidebar-container">
    <div class="sidebar" id="sidebar">
        
        <div class="brand-header">
            <h1>NAM ARCH <span>PRO</span></h1>
            <span class="tagline">V83 • BOOLEAN TOPOLOGY ENGINE</span>
        </div>

        <div class="panel-card">
            <div class="panel-header">
                <span class="panel-title">Mức Độ Thu Phóng</span>
                <span class="val-hl" id="z-val">16.0</span>
            </div>
            <div class="zoom-slider-container">
                <input type="range" id="zoomSlider" min="1" max="100" step="0.5" value="16" class="zoom-slider">
            </div>
        </div>

        <div class="panel-card">
            <div class="panel-header">
                <span class="panel-title">Quản Lý Phân Lớp</span>
                <div id="coreBadge" class="core-badge online"><div class="pulse-dot"></div> <span id="lib-stt">Core Online</span></div>
            </div>
            
            <div class="layer-list">
                <label class="layer-item">
                    <input type="checkbox" id="showNha" checked onchange="toggleLayer('nha')">
                    <div class="layer-left"><span class="color-dot" id="dot-nha" style="background:#f43f5e;"></span> Tòa Nhà</div>
                    <div class="toggle-switch"></div>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="showDuong" checked onchange="toggleLayer('duong')">
                    <div class="layer-left"><span class="color-dot" id="dot-duong" style="background:#f8fafc;"></span> Lòng Đường</div>
                    <div class="toggle-switch"></div>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="showViahe" checked onchange="toggleLayer('viahe')">
                    <div class="layer-left"><span class="color-dot" id="dot-viahe" style="background:#f59e0b;"></span> Vỉa Hè</div>
                    <div class="toggle-switch"></div>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="showNuoc" checked onchange="toggleLayer('nuoc')">
                    <div class="layer-left"><span class="color-dot" id="dot-nuoc" style="background:#0ea5e9;"></span> Sông Hồ</div>
                    <div class="toggle-switch"></div>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="showCay" checked onchange="toggleLayer('cayxanh')">
                    <div class="layer-left"><span class="color-dot" id="dot-cay" style="background:#10b981;"></span> Cây Xanh</div>
                    <div class="toggle-switch"></div>
                </label>
                <label class="layer-item" title="Các mảnh ghép lấp đầy khoảng trống">
                    <input type="checkbox" id="showDat" checked onchange="toggleLayer('dattrong')">
                    <div class="layer-left"><span class="color-dot" id="dot-dat" style="background:#64748b;"></span> Lấp Vùng Trống</div>
                    <div class="toggle-switch"></div>
                </label>
            </div>
            
            <div class="theme-buttons-container">
                <button id="dayThemeBtn" class="theme-btn day-btn" onclick="toggleGlobalTheme('day')">☀️ Day Theme</button>
                <button id="nightThemeBtn" class="theme-btn night-btn active" onclick="toggleGlobalTheme('night')">🌙 Night Theme</button>
            </div>
            
        </div>

        <button class="btn-main" onclick="startMegaScan()">
            ⛭ CHẠY PHÂN TÍCH MAP (SPACE)
        </button>

        <div class="panel-card" style="padding: 16px; margin-bottom: 0;">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <button class="btn-outline" style="flex: 1;" onclick="resetScan()" title="Xóa toàn bộ bộ nhớ Cache">Xóa Data</button>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <button class="btn-outline btn-export-2d" onclick="export2DDXF()">↓ 2D CAD</button>
                <button class="btn-outline btn-export-3d" onclick="export3DDAE()" title="Mô hình Khớp Nối, Chuẩn Cao Độ 100%">⬟ XUẤT 3D PRO</button>
            </div>

            <div class="prog-container">
                <div class="prog-wrap" id="progWrap"><div id="progress"></div></div>
                <div id="stt">Đang chờ lệnh...</div>
            </div>
        </div>
    </div>
    
    <button class="toggle-btn" onclick="toggleSidebar()"><span id="toggle-icon">◀</span></button>
</div>

<div class="crosshair"></div>
<div class="hud-bottom">
    <div class="hud-item">🧭 <span class="hud-val">BẮC (N)</span></div>
    <div class="hud-item">📍 <span class="hud-val" id="hud-coord">10.7933, 106.6800</span></div>
    <div class="hud-item">🚁 <span class="hud-val" id="hud-alt">610m</span></div>
</div>

<div id="map"></div>

<script>
    // =========================================================================
    // LÕI THUẬT TOÁN V82 GIỮ NGUYÊN 100% - KHÔNG CHỈNH SỬA ĐỂ ĐẢM BẢO ỔN ĐỊNH
    // =========================================================================
    
    let sidebarOpen = true;
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('hidden', !sidebarOpen);
        document.getElementById('toggle-icon').innerText = sidebarOpen ? '◀' : '▶';
    }

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); startMegaScan(); }
    });

    var map = L.map('map', { zoomControl: false, maxZoom: 100, zoomSnap: 0.1 }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 }).addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 100, maxNativeZoom: 19 });
    
    L.GridLayer.Graticule = L.GridLayer.extend({
        createTile: function () {
            var tile = document.createElement('canvas'); tile.width = tile.height = 256;
            var ctx = tile.getContext('2d'); ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            
            // Thiết lập màu lưới ban đầu
            ctx.strokeStyle = var('--night-grid');
            
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(256, 0); ctx.moveTo(0, 0); ctx.lineTo(0, 256); ctx.stroke(); return tile;
        }
    });
    new L.GridLayer.Graticule({maxZoom: 100}).addTo(map);

    let isLightMap = false;
    
    /* CHỨC NĂNG CHUYỂN ĐỔI THEME TOÀN CỤC MỚI (TÍCH HỢP UI VÀ MAP TILE) */
    function toggleGlobalTheme(theme) {
        const body = document.body;
        const dayBtn = document.getElementById('dayThemeBtn');
        const nightBtn = document.getElementById('nightThemeBtn');
        const mapTileControl = document.querySelector('.leaflet-grid-tile canvas');
        
        if (theme === 'day') {
            body.classList.add('light-theme');
            dayBtn.classList.add('active');
            nightBtn.classList.remove('active');
            
            // Cập nhật map tiles và line styles
            map.removeLayer(darkT); lightT.addTo(map);
            isLightMap = true;
            document.getElementById('dot-nha').style.background = '#dc2626';
            document.getElementById('dot-duong').style.background = '#1e293b';
            document.getElementById('dot-viahe').style.background = '#ea580c';
            document.getElementById('dot-nuoc').style.background = '#0284c7';
            document.getElementById('dot-cay').style.background = '#16a34a';
            document.getElementById('dot-dat').style.background = '#94a3b8';
            
            // Cập nhật Grid colors
            if (mapTileControl) mapTileControl.style.stroke = var('--day-grid');
            
        } else {
            body.classList.remove('light-theme');
            nightBtn.classList.add('active');
            dayBtn.classList.remove('active');
            
            // Cập nhật map tiles và line styles
            map.removeLayer(lightT); darkT.addTo(map);
            isLightMap = false;
            document.getElementById('dot-nha').style.background = '#f43f5e';
            document.getElementById('dot-duong').style.background = '#f8fafc';
            document.getElementById('dot-viahe').style.background = '#f59e0b';
            document.getElementById('dot-nuoc').style.background = '#0ea5e9';
            document.getElementById('dot-cay').style.background = '#10b981';
            document.getElementById('dot-dat').style.background = '#64748b';
            
            // Cập nhật Grid colors
            if (mapTileControl) mapTileControl.style.stroke = var('--night-grid');
        }
        updateLineStyles();
    }

    async function searchLocation() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if(!query) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data && data.length > 0) map.flyTo([data[0].lat, data[0].lon], 16, { duration: 2 });
            else alert("Không tìm thấy địa điểm!");
        } catch(e) {}
    }

    function updateHUD() {
        let z = map.getZoom(); let center = map.getCenter();
        document.getElementById('zoomSlider').value = z; 
        document.getElementById('z-val').innerText = z.toFixed(1);
        document.getElementById('hud-coord').innerText = `${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`;
        let alt = Math.round(40000000 / Math.pow(2, z));
        document.getElementById('hud-alt').innerText = alt >= 1000 ? (alt/1000).toFixed(1) + 'km' : alt + 'm';
    }
    document.getElementById('zoomSlider').addEventListener('input', e => map.setZoom(e.target.value));
    map.on('move zoomend', updateHUD); updateHUD();

    var geoData = { nha: [], duong: [], viahe: [], nuoc: [], cayxanh: [], dattrong: [], o_pho: [] };
    var layers = { 
        cayxanh: L.layerGroup().addTo(map), dattrong: L.layerGroup().addTo(map), 
        nuoc: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), 
        duong: L.layerGroup().addTo(map), nha: L.layerGroup().addTo(map) 
    };

    function toggleLayer(type) {
        if(document.getElementById('show' + type.charAt(0).toUpperCase() + type.slice(1)).checked) map.addLayer(layers[type]);
        else map.removeLayer(layers[type]);
    }

    function getLayerStyle(type) {
        const config = isLightMap ? {
            nha: { color: '#dc2626', weight: 2, fillOpacity: 0.15 },
            duong: { color: '#1e293b', weight: 2, fillOpacity: 0.1 },
            viahe: { color: '#ea580c', weight: 2, fillOpacity: 0.15 },
            nuoc: { color: '#0284c7', weight: 2, fillOpacity: 0.15 },
            cayxanh: { color: '#16a34a', weight: 2, fillOpacity: 0.15 },
            dattrong: { color: '#94a3b8', weight: 2, fillOpacity: 0.1 }
        } : {
            nha: { color: '#f43f5e', weight: 2, fillOpacity: 0.15 }, 
            duong: { color: '#f8fafc', weight: 2, fillOpacity: 0.1 }, 
            viahe: { color: '#f59e0b', weight: 2, fillOpacity: 0.15 }, 
            nuoc: { color: '#0ea5e9', weight: 2, fillOpacity: 0.15 },
            cayxanh: { color: '#10b981', weight: 2, fillOpacity: 0.15 },
            dattrong: { color: '#64748b', weight: 2, fillOpacity: 0.1 }  
        };
        return config[type];
    }

    function updateLineStyles() {
        Object.keys(layers).forEach(type => layers[type].eachLayer(l => l.setStyle(getLayerStyle(type))));
    }

    function updateProgress(percent, text, isActive = true) {
        const pBar = document.getElementById('progress');
        const pWrap = document.getElementById('progWrap');
        const stt = document.getElementById('stt');
        pBar.style.width = percent + '%';
        stt.innerText = text;
        if(isActive) pWrap.classList.add('active'); else pWrap.classList.remove('active');
        stt.style.color = (percent >= 100) ? "var(--success)" : "var(--primary)";
    }

    function resetScan() {
        Object.values(layers).forEach(l => l.clearLayers());
        geoData = { nha: [], duong: [], viahe: [], nuoc: [], cayxanh: [], dattrong: [], o_pho: [] };
        updateProgress(0, "Đã dọn dẹp Cache. Sẵn sàng!", false);
        document.getElementById('stt').style.color = "var(--night-text-color)";
    }

    const yieldCPU = () => new Promise(resolve => setTimeout(resolve, 0));

    async function chunkedUnion(polygons, type) {
        if (!polygons || polygons.length === 0) return null;
        if (polygons.length === 1) return polygons[0];
        
        let current = polygons.map(p => { try { return turf.cleanCoords(p); } catch(e) { return p; } });
        let step = 0;
        while (current.length > 1) {
            let next = [];
            for (let i = 0; i < current.length; i += 2) {
                if (i % 2 === 0) await yieldCPU(); 
                if (i + 1 < current.length) {
                    try { next.push(turf.union(current[i], current[i+1])); } catch(e) { next.push(current[i]); }
                } else next.push(current[i]);
            }
            current = next; step++;
            document.getElementById('stt').innerText = `Gộp đa giác ${type}: Vòng ${step}`;
        }
        return current[0];
    }

    function makeClosedPolygon(pts) {
        let ring = pts.map(p => [p[0], p[1]]);
        if (ring[0][0] !== ring[ring.length-1][0] || ring[0][1] !== ring[ring.length-1][1]) ring.push([...ring[0]]);
        return turf.polygon([ring]);
    }

    function calculateBuildingHeight(tags) {
        if(tags['building:levels']) return parseFloat(tags['building:levels']) * 3.5;
        const rand = Math.random();
        if(rand < 0.7) return 9 + Math.random() * 6;
        if(rand < 0.9) return 15 + Math.random() * 15;
        return 30 + Math.random() * 30;
    }

    async function startMegaScan() {
        if(typeof turf === 'undefined' || typeof osmtogeojson === 'undefined') return alert("Hệ thống Core đang khởi động, vui lòng đợi vài giây!");
        resetScan();
        updateProgress(10, "Đang kết nối API Vệ tinh...", true);

        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];
        
        const q = `[out:json][timeout:50][bbox:${sw.lat},${sw.lng},${ne.lat},${ne.lng}];
        (
            nwr["building"];
            nwr["highway"];
            nwr["natural"~"water|coastline|wood|scrub|wetland"];
            nwr["waterway"~"riverbank|canal|dock"];
            nwr["leisure"~"park|garden|pitch|recreation_ground"];
            nwr["landuse"];
            nwr["amenity"];
        );out body;>;out skel qt;`;
        
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            
            updateProgress(30, "Biên dịch OSM Relations...", true);
            await yieldCPU();

            const geojson = osmtogeojson(data);
            const features = geojson.features;

            if(features.length === 0) { updateProgress(0, "Khu vực này trống dữ liệu OSM!", false); return; }

            if(features.length > 8000) {
                if(!confirm(`Khu vực này chứa > ${features.length} objects. Việc phân tích có thể tốn vài phút. Chạy chứ?`)) {
                    updateProgress(0, "Đã hủy theo yêu cầu.", false);
                    return;
                }
            }

            let rBufs = [], sBufs = [], rawNuoc = [];

            for (let i = 0; i < features.length; i++) {
                if (i % 50 === 0) {
                    updateProgress(40 + (i / features.length) * 30, `Phân tách Vector: ${i}/${features.length}`, true);
                    await yieldCPU(); 
                }

                const f = features[i];
                const geom = f.geometry;
                const tags = f.properties;

                if (!geom) continue;

                if (geom.type === 'LineString' || geom.type === 'MultiLineString') {
                    if (tags.highway) {
                        const lines = geom.type === 'LineString' ? [geom.coordinates] : geom.coordinates;
                        lines.forEach(coords => {
                            const line = turf.lineString(coords);
                            const wDuong = (tags.highway === 'primary' || tags.highway === 'secondary') ? 12 : 6;
                            const wViahe = wDuong + 6; 
                            try {
                                rBufs.push(turf.bboxClip(turf.buffer(line, wDuong/2, {units:'meters'}), screenBox));
                                sBufs.push(turf.bboxClip(turf.buffer(line, wViahe/2, {units:'meters'}), screenBox));
                            } catch(err) {}
                        });
                    }
                } 
                else if (geom.type === 'Polygon' || geom.type === 'MultiPolygon') {
                    let poly = null;
                    try { poly = turf.bboxClip(f, screenBox); } catch(err) {}
                    if (!poly || poly.geometry.coordinates.length === 0) continue;

                    if (tags.building) {
                        poly.height = calculateBuildingHeight(tags);
                        geoData.nha.push(poly);
                        L.geoJSON(poly, { style: getLayerStyle('nha') }).addTo(layers.nha);
                    } 
                    else if (tags.natural === 'water' || tags.waterway) {
                        rawNuoc.push(poly);
                    }
                    else if (tags.leisure || tags.natural === 'wood' || tags.natural === 'scrub' || tags.landuse === 'grass' || tags.landuse === 'forest') {
                        geoData.cayxanh.push(poly);
                        L.geoJSON(poly, { style: getLayerStyle('cayxanh') }).addTo(layers.cayxanh);
                    }
                    else if (tags.landuse || tags.amenity) {
                        geoData.dattrong.push(poly);
                        L.geoJSON(poly, { style: getLayerStyle('dattrong') }).addTo(layers.dattrong);
                    }
                }
            }

            let mR = null;
            if (rBufs.length > 0) {
                updateProgress(70, "Tối ưu mạng lưới Giao thông...", true);
                mR = await chunkedUnion(rBufs, "LÒNG ĐƯỜNG");
                if (mR) { geoData.duong.push(mR); L.geoJSON(mR, { style: getLayerStyle('duong') }).addTo(layers.duong); }
            }

            updateProgress(75, "Tối ưu bề mặt Thủy văn...", true);
            let mNuoc = await chunkedUnion(rawNuoc, "MẶT NƯỚC");
            if (mNuoc) {
                geoData.nuoc.push(mNuoc);
                L.geoJSON(mNuoc, { style: getLayerStyle('nuoc') }).addTo(layers.nuoc);
            } else if (rawNuoc.length > 0) {
                geoData.nuoc = rawNuoc;
                rawNuoc.forEach(n => L.geoJSON(n, { style: getLayerStyle('nuoc') }).addTo(layers.nuoc));
            }

            updateProgress(80, "Cắt gọt khoảng trống (Boolean Cut)...", true);
            let baseCanvas = turf.bboxPolygon(screenBox);
            let mOpho = null;
            
            if (mR) {
                try { mOpho = turf.difference(baseCanvas, turf.cleanCoords(mR)); } catch(e) {}
            }
            if (!mOpho) mOpho = baseCanvas;

            updateProgress(88, "Khớp nối bề mặt Sông Hồ...", true);
            if (mNuoc) {
                try { 
                    let diff = turf.difference(mOpho, turf.cleanCoords(mNuoc)); 
                    if(diff) mOpho = diff;
                } catch(e) {}
            } else {
                for(let i=0; i<rawNuoc.length; i++) {
                    if (i % 10 === 0) await yieldCPU();
                    try { 
                        let diff = turf.difference(mOpho, turf.cleanCoords(rawNuoc[i])); 
                        if(diff) mOpho = diff;
                    } catch(e) {}
                }
            }

            if (mOpho) {
                turf.flatten(mOpho).features.forEach(f => {
                    geoData.o_pho.push(f);
                    L.geoJSON(f, { color: '#64748b', weight: 1, fillOpacity: 0.1 }).addTo(layers.dattrong);
                });
            }

            if (sBufs.length > 0 && mR) {
                updateProgress(92, "Trích xuất Vỉa hè...", true);
                let mS = await chunkedUnion(sBufs, "VỈA HÈ");
                try {
                    let viahe = turf.difference(mS, mR);
                    if(viahe) { geoData.viahe.push(viahe); L.geoJSON(viahe, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                } catch(e) { 
                    if (mS) { geoData.viahe.push(mS); L.geoJSON(mS, { style: getLayerStyle('viahe') }).addTo(layers.viahe); }
                }
            }
            
            updateProgress(100, "Hoàn tất! Bấm Tải 3D để xem thành quả.", false);
        } catch (err) { updateProgress(0, "Lỗi kết nối hoặc Map quá lớn!", false); }
    }

    async function export3DDAE() {
        updateProgress(10, "Đang kết xuất Geometry 3D...", true);
        
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        const tx = (pt) => ((pt[0] - center.lng) * sx);
        const ty = (pt) => ((pt[1] - center.lat) * sy);

        let positions = [];
        let indices = [];
        let vIdx = 0;
        let hasData = false;

        const addVertex = (x, y, z) => {
            positions.push(`${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
            indices.push(vIdx++);
        };

        function getCCWTriangle(p1, p2, p3) {
            let cross = (p2[0] - p1[0]) * (p3[1] - p1[1]) - (p2[1] - p1[1]) * (p3[0] - p1[0]);
            if (cross < 0) return [p1, p3, p2];
            return [p1, p2, p3];
        }

        const writeTriangles = (coords, zVal, reverseNormal = false) => {
            try {
                let poly = turf.rewind(turf.polygon(coords), {reverse: false});
                let clean = turf.cleanCoords(poly);
                let tess = turf.tesselate(clean);
                
                tess.features.forEach(tri => {
                    let pts = tri.geometry.coordinates[0];
                    if (pts.length < 3) return;
                    let [p1, p2, p3] = getCCWTriangle(pts[0], pts[1], pts[2]);
                    if (reverseNormal) [p1, p2, p3] = [p1, p3, p2];

                    addVertex(tx(p1), ty(p1), zVal);
                    addVertex(tx(p2), ty(p2), zVal);
                    addVertex(tx(p3), ty(p3), zVal);
                });
            } catch(e) {}
        };

        const writeWalls = (ring, zBottom, zTop) => {
            let pts = ring;
            if (pts[0][0] !== pts[pts.length-1][0] || pts[0][1] !== pts[pts.length-1][1]) pts = [...pts, pts[0]];
            for(let i=0; i<pts.length-1; i++) {
                let p1 = pts[i]; let p2 = pts[i+1];
                addVertex(tx(p1), ty(p1), zBottom);
                addVertex(tx(p2), ty(p2), zBottom);
                addVertex(tx(p2), ty(p2), zTop);
                
                addVertex(tx(p1), ty(p1), zBottom);
                addVertex(tx(p2), ty(p2), zTop);
                addVertex(tx(p1), ty(p1), zTop);
            }
        };

        const processLayer = async (dataArray, layerName, baseZ, isBuilding, curbBottomZ = null) => {
            if(dataArray.length === 0) return;
            hasData = true;
            for (let i = 0; i < dataArray.length; i++) {
                if (i % 20 === 0) {
                    let p = 10 + (i / dataArray.length) * 80;
                    updateProgress(p, `Dựng khối Solid [${layerName}]: ${i}/${dataArray.length}`, true);
                    await yieldCPU(); 
                }

                const item = dataArray[i];
                const geom = item.geometry || item;
                const h = item.height || 0;
                let polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;

                polys.forEach(coords => {
                    let topZ = isBuilding && h > 0 ? baseZ + h : baseZ;
                    writeTriangles(coords, topZ, false);
                    
                    if (isBuilding && h > 0) {
                        writeTriangles(coords, baseZ, true);
                        let poly = turf.rewind(turf.polygon(coords), {reverse: false});
                        poly.geometry.coordinates.forEach(ring => writeWalls(ring, baseZ, topZ));
                    } 
                    else if (curbBottomZ !== null) {
                        let poly = turf.rewind(turf.polygon(coords), {reverse: false});
                        poly.geometry.coordinates.forEach(ring => writeWalls(ring, Math.min(baseZ, curbBottomZ), Math.max(baseZ, curbBottomZ)));
                    }
                });
            }
        };

        if(document.getElementById('showNuoc').checked) await processLayer(geoData.nuoc, "NUOC", -0.5, false, 0.0);
        
        if(document.getElementById('showDat').checked) {
            await processLayer(geoData.o_pho, "O_PHO", 0.0, false, null); 
            await processLayer(geoData.dattrong, "DATTRONG_OSM", 0.05, false, 0.0);
        }
        
        if(document.getElementById('showDuong').checked) await processLayer(geoData.duong, "DUONG", 0.0, false, null); 
        
        if(document.getElementById('showCay').checked) await processLayer(geoData.cayxanh, "CAYXANH", 0.1, false, 0.0); 
        if(document.getElementById('showViahe').checked) await processLayer(geoData.viahe, "VIAHE", 0.15, false, 0.0); 
        if(document.getElementById('showNha').checked) await processLayer(geoData.nha, "NHA", 0.15, true, null); 

        if(!hasData) {
            updateProgress(0, "Bạn chưa chọn Layer nào để xuất!", false);
            return;
        }

        updateProgress(95, "Đang đóng gói file DAE...", true);
        await yieldCPU();

        const daeXML = `<?xml version="1.0" encoding="utf-8"?>
<COLLADA xmlns="http://www.collada.org/2005/11/COLLADASchema" version="1.4.1">
  <asset><unit name="meter" meter="1"/><up_axis>Z_UP</up_axis></asset>
  <library_geometries>
    <geometry id="geom-0" name="CityMesh">
      <mesh>
        <source id="geom-0-positions">
          <float_array id="geom-0-positions-array" count="${positions.length * 3}">${positions.join(' ')}</float_array>
          <technique_common>
            <accessor source="#geom-0-positions-array" count="${positions.length}" stride="3">
              <param name="X" type="float"/><param name="Y" type="float"/><param name="Z" type="float"/>
            </accessor>
          </technique_common>
        </source>
        <vertices id="geom-0-vertices"><input semantic="POSITION" source="#geom-0-positions"/></vertices>
        <triangles count="${indices.length / 3}">
          <input semantic="VERTEX" source="#geom-0-vertices" offset="0"/>
          <p>${indices.join(' ')}</p>
        </triangles>
      </mesh>
    </geometry>
  </library_geometries>
  <library_visual_scenes>
    <visual_scene id="Scene" name="Scene">
      <node id="CityNode" name="CityNode"><instance_geometry url="#geom-0"/></node>
    </visual_scene>
  </library_visual_scenes>
  <scene><instance_visual_scene url="#Scene"/></scene>
</COLLADA>`;

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([daeXML], {type: 'application/collada+xml'}));
        a.download = "NAM_ARCH_3D_PRO.dae"; 
        a.click();
        
        updateProgress(100, "Tải file 3D hoàn tất!", false);
    }

    async function export2DDXF() {
        let hasData = false;
        updateProgress(50, "Đang biên dịch Vector 2D...", true);
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const writeLines = async (dataArray, layerName) => {
            if(dataArray.length === 0) return;
            hasData = true;
            for (let i = 0; i < dataArray.length; i++) {
                if (i % 50 === 0) await yieldCPU();
                const geom = dataArray[i].geometry || dataArray[i];
                let polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
                polys.forEach(coords => {
                    coords.forEach(ring => {
                        dxf += `0\nPOLYLINE\n8\n${layerName}\n66\n1\n70\n1\n`;
                        ring.forEach(pt => { dxf += `0\nVERTEX\n8\n${layerName}\n10\n${((pt[0]-center.lng)*sx).toFixed(3)}\n20\n${((pt[1]-center.lat)*sy).toFixed(3)}\n30\n0\n`; });
                        dxf += "0\nSEQEND\n";
                    });
                });
            }
        };

        if(document.getElementById('showNuoc').checked) await writeLines(geoData.nuoc, "V21_NUOC");
        
        if(document.getElementById('showDat').checked) {
            await writeLines(geoData.o_pho, "V21_O_PHO");
            await writeLines(geoData.dattrong, "V21_DATTRONG_OSM");
        }
        
        if(document.getElementById('showCay').checked) await writeLines(geoData.cayxanh, "V21_CAYXANH");
        if(document.getElementById('showDuong').checked) await writeLines(geoData.duong, "V21_DUONG");
        if(document.getElementById('showViahe').checked) await writeLines(geoData.viahe, "V21_VIAHE");
        if(document.getElementById('showNha').checked) await writeLines(geoData.nha, "V21_NHA");

        if(!hasData) {
            updateProgress(0, "Bạn chưa chọn Layer nào để xuất!", false);
            return;
        }

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
        a.download = "NAM_ARCH_2D_PLAN.dxf"; 
        a.click();
        updateProgress(100, "Tải file 2D CAD hoàn tất!", false);
    }
</script>
</body>
</html>
