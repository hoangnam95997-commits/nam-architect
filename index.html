<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V9 PRO CLEAN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1e272e; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: rgba(255,255,255,0.98); padding: 25px; 
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 280px; 
        }
        button { 
            width: 100%; padding: 14px; background: #2c3e50; color: white; 
            border: none; cursor: pointer; border-radius: 50px; 
            font-weight: bold; font-size: 14px; transition: 0.2s;
        }
        button:hover { background: #1a252f; transform: scale(1.02); }
        
        /* THANH PROGRESS BAR GRADIENT CHUẨN MẪU */
        .progress-container { 
            width: 100%; height: 18px; background: #f0f2f5; 
            border-radius: 50px; margin-top: 15px; display: none; 
            overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .progress-fill { 
            width: 0%; height: 100%; border-radius: 50px;
            background: linear-gradient(90deg, #4facfe 0%, #d4a5ff 100%); 
            transition: width 0.1s linear;
        }
        
        .info { font-size: 11px; color: #576574; margin-top: 12px; line-height: 1.6; }
        #stt { text-align: center; font-weight: 600; margin-top: 8px; font-size: 12px; color: #2ecc71;}
    </style>
</head>
<body>
    <div class="ui">
        <h2 style="margin:0 0 10px; font-size:18px; color:#2c3e50;">NAM CAD PRO v9</h2>
        <button id="btn" onclick="exportUltimate()">XUẤT CAD SẠCH NÉT</button>
        
        <div class="progress-container" id="p-bar">
            <div class="progress-fill" id="p-fill"></div>
        </div>
        
        <div class="info">
            • <b>Đường:</b> Tự động vẽ 2 lề (Double-Line)<br>
            • <b>Nhà:</b> Polyline khép kín nét đỏ<br>
            • <b>Fix:</b> Triệt tiêu lỗi "Press Enter"
        </div>
        <div id="stt"></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

        async function exportUltimate() {
            const stt = document.getElementById('stt');
            const pFill = document.getElementById('p-fill');
            document.getElementById('p-bar').style.display = 'block';
            pFill.style.width = "10%";
            stt.innerText = "Đang quét dữ liệu...";

            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json][bbox:${bbox}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                let dxf = "  0\nSECTION\n  2\nHEADER\n  9\n$ACADVER\n  1\nAC1009\n  0\nENDSEC\n  0\nSECTION\n  2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;

                const ways = data.elements.filter(e => e.type === "way");
                ways.forEach((e, idx) => {
                    const isBuilding = !!e.tags?.building;
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => !!n);
                    if (nodes.length < 2) return;

                    if (isBuilding) {
                        // VẼ NHÀ: POLYLINE R12 KHÉP KÍN
                        dxf += `  0\nPOLYLINE\n  8\nNHA\n 62\n1\n 66\n1\n 70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `  0\nVERTEX\n  8\nNHA\n 10\n${x.toFixed(3)}\n 20\n${y.toFixed(3)}\n`;
                        });
                        dxf += `  0\nSEQEND\n`;
                    } else {
                        // VẼ ĐƯỜNG: THUẬT TOÁN OFFSET 2 LỀ (DOUBLE LINE)
                        let w = 2.5; // Mặc định 5m
                        if (e.tags.highway === 'primary') w = 10;
                        if (e.tags.highway === 'secondary') w = 6;

                        for (let i = 0; i < nodes.length - 1; i++) {
                            let n1 = nodes[i], n2 = nodes[i+1];
                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            let dx = x2 - x1, dy = y2 - y1;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist > 0) {
                                let ox = (-dy / dist) * w, oy = (dx / dist) * w;
                                // Lề trái
                                dxf += `  0\nLINE\n  8\nDUONG\n 62\n7\n 10\n${x1+ox}\n 20\n${y1+oy}\n 11\n${x2+ox}\n 21\n${y2+oy}\n`;
                                // Lề phải
                                dxf += `  0\nLINE\n  8\nDUONG\n 62\n7\n 10\n${x1-ox}\n 20\n${y1-oy}\n 11\n${x2-ox}\n 21\n${y2-oy}\n`;
                            }
                        }
                    }
                    pFill.style.width = (10 + (idx/ways.length)*90) + "%";
                });

                dxf += "  0\nENDSEC\n  0\nEOF\n";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_Architect_v9_Clean.dxf";
                a.click();
                stt.innerText = "XONG! Gõ Z -> E trong CAD";
            } catch (err) { stt.innerText = "Lỗi kết nối GIS!"; }
        }
    </script>
</body>
</html>
