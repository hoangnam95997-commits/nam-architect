<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH V118 • TRUE LIQUID GLASS (CAD/SU EXPORT)</title>
    <style>
        /* ========================================= */
        /* 1. GIAO DIỆN NỀN VÀ BỐ CỤC APP V118       */
        /* ========================================= */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: #0b0f1a;
            /* Giả lập nền bản đồ kiến trúc tối */
            background-image: url('https://w0.peakpx.com/wallpaper/594/545/HD-wallpaper-dark-map-black-map-minimalism-map.jpg');
            background-size: cover; background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .app-panel {
            width: 380px; height: 820px;
            background: rgba(16, 22, 36, 0.92);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; padding: 30px; box-sizing: border-box;
        }

        /* HEADER */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; font-size: 26px; font-weight: 900; margin: 0; letter-spacing: 1.5px; }
        .header h2 { color: #00e5ff; font-size: 11px; font-weight: 800; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }

        /* SECTION CHUNG */
        .ui-section { background: rgba(0, 0, 0, 0.3); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .section-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: #fff; font-size: 14px; font-weight: bold; }

        /* THANH TRƯỢT THU PHÓNG */
        .slider-container { position: relative; height: 30px; display: flex; align-items: center; }
        .slider-track { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; position: relative; }
        .slider-fill { width: 40%; height: 100%; background: #00e5ff; border-radius: 3px; box-shadow: 0 0 15px #00e5ff; }
        .slider-knob { position: absolute; left: 40%; width: 22px; height: 22px; background: #fff; border: 4px solid #00e5ff; border-radius: 50%; box-shadow: 0 0 15px #00e5ff; transform: translateX(-50%); }

        /* QUẢN LÝ LỚP */
        .layer-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .layer-info { display: flex; align-items: center; gap: 12px; color: #cbd5e1; font-size: 14px; font-weight: 600; }
        .dot { width: 12px; height: 12px; border-radius: 4px; }
        .switch { width: 44px; height: 24px; background: #00e5ff; border-radius: 12px; position: relative; }
        .switch::after { content: ''; position: absolute; right: 2px; top: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; }

        /* ========================================= */
        /* 2. CẤU TRÚC 4 NÚT BẤM CHẠY THUẬT TOÁN 3D  */
        /* ========================================= */
        .glass-btn-3d {
            position: relative; width: 100%; height: 65px;
            cursor: pointer; margin-bottom: 15px;
        }
        .btn-row { display: flex; gap: 15px; }
        .glass-btn-3d.small { height: 60px; margin-bottom: 0; }

        .btn-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 13px; font-weight: 800; letter-spacing: 1px;
            pointer-events: none; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .footer { text-align: center; color: rgba(255,255,255,0.2); font-size: 10px; font-weight: bold; letter-spacing: 3px; margin-top: 20px; }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div class="app-panel">
        <div class="header">
            <h1>NAM ARCH</h1>
            <h2>V118 • TRUE LIQUID GLASS</h2>
        </div>

        <div class="ui-section">
            <div class="section-title"><span>Mức Độ Thu Phóng</span><span style="color:#00e5ff">16.0</span></div>
            <div class="slider-container"><div class="slider-track"><div class="slider-fill"></div><div class="slider-knob"></div></div></div>
        </div>

        <div class="ui-section">
            <div class="section-title"><span>Quản Lý Lớp</span><span style="color:#00e5ff; font-size:10px;">● V82 CORE</span></div>
            
            <div class="layer-item">
                <div class="layer-info"><div class="dot" style="background:#ff0055; box-shadow: 0 0 10px #ff0055;"></div> Tòa Nhà</div>
                <div class="switch"></div>
            </div>
            <div class="layer-item">
                <div class="layer-info"><div class="dot" style="background:#8892b0;"></div> Lòng Đường</div>
                <div class="switch"></div>
            </div>
            <div class="layer-item">
                <div class="layer-info"><div class="dot" style="background:#00e5ff; box-shadow: 0 0 10px #00e5ff;"></div> Sông Hồ</div>
                <div class="switch"></div>
            </div>
            <div class="layer-item">
                <div class="layer-info"><div class="dot" style="background:#00ff88; box-shadow: 0 0 10px #00ff88;"></div> Cây Xanh</div>
                <div class="switch"></div>
            </div>
        </div>

        <div class="glass-btn-3d" id="btn-scan">
            <div class="btn-text">⛶ QUÉT ĐỊA HÌNH V82</div>
        </div>

        <div class="glass-btn-3d" id="btn-refresh">
            <div class="btn-text">LÀM MỚI</div>
        </div>

        <div class="btn-row">
            <div class="glass-btn-3d small" id="btn-cad">
                <div class="btn-text">2D CAD</div>
            </div>
            <div class="glass-btn-3d small" id="btn-dae">
                <div class="btn-text">3D DAE</div>
            </div>
        </div>

        <div class="footer">READY FOR ACTION...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // THUẬT TOÁN ĐÚC NÚT KÍNH 3D (Dựa trên bản test thành công)
        function init3DButton(containerId, glowColor) {
            const container = document.getElementById(containerId);
            const w = container.clientWidth, h = container.clientHeight;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(30, w/h, 0.1, 100);
            camera.position.z = 6;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Ánh sáng tạo độ bóng gương
            const light = new THREE.DirectionalLight(0xffffff, 5);
            light.position.set(2, 4, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            // Lõi màu Gradient nằm sau kính (Bí quyết tạo độ trong trẻo)
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grd = ctx.createLinearGradient(0,0,512,0);
            grd.addColorStop(0, glowColor);
            grd.addColorStop(0.5, glowColor);
            grd.addColorStop(1, '#ffffff');
            ctx.fillStyle = grd; ctx.fillRect(0,0,512,128);
            const tex = new THREE.CanvasTexture(canvas);

            // Vật liệu Thủy tinh lỏng (Liquid Glass)
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, transmission: 1, ior: 1.5, 
                thickness: 1.8, roughness: 0.02, metalness: 0,
                clearcoat: 1, map: tex
            });

            const geo = new RoundedBoxGeometry(5.2, 1.8, 0.6, 10, 0.8);
            const mesh = new THREE.Mesh(geo, glassMat);
            scene.add(mesh);

            function animate() {
                requestAnimationFrame(animate);
                // Hiệu ứng thở (xoay nhẹ) để thấy độ bóng
                mesh.rotation.x = Math.sin(Date.now() * 0.001) * 0.05;
                renderer.render(scene, camera);
            }
            animate();

            // Tương tác vật lý khi nhấn
            container.addEventListener('mousedown', () => mesh.scale.set(0.95, 0.95, 0.95));
            container.addEventListener('mouseup', () => mesh.scale.set(1, 1, 1));
        }

        // Kích hoạt 4 nút điều hành
        init3DButton('btn-scan', '#00b4ff');    // Cyan
        init3DButton('btn-refresh', '#e31b64'); // Magenta
        init3DButton('btn-cad', '#e31b64');     // Magenta
        init3DButton('btn-dae', '#e31b64');     // Magenta
    </script>
</body>
</html>
