<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giao Diện Nút Thủy Tinh NAM ARCH</title>
    <style>
        /* Nền tối chuẩn theo giao diện gốc của app bạn */
        body {
            background-color: #0b101e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px; /* Khoảng cách giữa 2 nút */
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* ================================================= */
        /* CẤU TRÚC CHUNG CỦA NÚT THỦY TINH (THE GLASS PILL) */
        /* ================================================= */
        .glass-btn {
            position: relative;
            width: 280px;
            padding: 18px 0;
            border-radius: 50px; /* Nút hình viên thuốc (Pill) */
            font-size: 15px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            
            /* BÍ QUYẾT XUYÊN SÁNG (Bẻ cong nền tối phía sau) */
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            
            /* Viền quang học mỏng bọc ngoài */
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-left-color: rgba(255, 255, 255, 0.3);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* VỆT CẮT BÓNG GƯƠNG (The Polished Gloss Cut) */
        /* Đây là lớp phủ tạo cảm giác mặt kính được mài nhẵn */
        .glass-btn::before {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 50px;
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.35) 0%,   /* Sáng chói ở góc trên */
                rgba(255, 255, 255, 0.05) 45%,  /* Mờ dần */
                transparent 45.2%,              /* CẮT ĐỨT ĐOẠN TẠO MẶT PHẲNG */
                transparent 100%
            );
            pointer-events: none;
        }

        /* ================================================= */
        /* 1. NÚT THUẬT TOÁN CYAN                            */
        /* ================================================= */
        .btn-cyan {
            /* Lõi kính trong suốt nhẹ */
            background: linear-gradient(135deg, rgba(0, 180, 255, 0.2) 0%, rgba(0, 255, 255, 0.05) 100%);
            
            /* TỔNG HỢP VẬT LÝ QUANG HỌC */
            box-shadow: 
                /* Highlight viền sáng mặt trên */
                inset 2px 2px 5px rgba(255, 255, 255, 0.6),
                
                /* VÁCH KÍNH: Đổ bóng đen chìm để tạo cảm giác "nút dày" và sâu */
                inset 10px 10px 20px rgba(0, 0, 0, 0.6),
                inset -10px -10px 20px rgba(0, 0, 0, 0.4),
                
                /* TỤ QUANG ĐÁY: Mép dưới phản xạ toàn phần màu Cyan rực rỡ */
                inset -3px -5px 15px rgba(0, 255, 255, 0.8),
                
                /* BÓNG HẮT (Outer Glow): Ánh sáng tản ra nền tối */
                0 15px 35px rgba(0, 255, 255, 0.25),
                0 5px 15px rgba(0, 0, 0, 0.5); /* Bóng vật lý */
        }

        /* ================================================= */
        /* 2. NÚT THUẬT TOÁN MAGENTA                         */
        /* ================================================= */
        .btn-magenta {
            /* Lõi kính trong suốt nhẹ */
            background: linear-gradient(135deg, rgba(200, 0, 255, 0.2) 0%, rgba(255, 0, 150, 0.05) 100%);
            
            /* TỔNG HỢP VẬT LÝ QUANG HỌC */
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.6),
                
                /* VÁCH KÍNH */
                inset 10px 10px 20px rgba(0, 0, 0, 0.6),
                inset -10px -10px 20px rgba(0, 0, 0, 0.4),
                
                /* TỤ QUANG ĐÁY Magenta rực rỡ */
                inset -3px -5px 15px rgba(255, 0, 150, 0.8),
                
                /* BÓNG HẮT */
                0 15px 35px rgba(255, 0, 150, 0.25),
                0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* HIỆU ỨNG KHI BẤM VÀO */
        .glass-btn:active {
            transform: scale(0.96) translateY(2px);
            /* Sáng rực viền dưới khi bị ép xuống */
            box-shadow: 
                inset 2px 2px 5px rgba(255, 255, 255, 0.6),
                inset 10px 10px 20px rgba(0, 0, 0, 0.6),
                inset -3px -5px 25px rgba(255, 255, 255, 0.6),
                0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-btn btn-cyan">Thuật toán Cyan</div>
    <div class="glass-btn btn-magenta">Thuật toán Magenta</div>

</body>
</html>
