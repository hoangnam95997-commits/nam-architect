<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clear 3D Glass Button</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #81c0eb; 
    margin: 0;
    font-family: sans-serif;
  }

  .glass-button {
    width: 160px;
    height: 160px;
    border-radius: 40px; /* Bo góc vuông vức hơn một chút */
    
    /* 1. Nền GẦN NHƯ TRONG SUỐT HOÀN TOÀN để thấy rõ phía sau */
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
    
    /* 2. Tạo viền bắt sáng (Highlight) cực gắt ở mép trên và mép trái */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-top: 1.5px solid rgba(255, 255, 255, 0.8);
    border-left: 1.5px solid rgba(255, 255, 255, 0.6);
    
    position: relative;
    cursor: pointer;
    outline: none;
    
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0px 1px 3px rgba(0,0,0,0.2);
    
    /* 3. Giảm Blur lại để thuỷ tinh trông TRONG VẮT */
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    
    /* 4. Đổ bóng tinh chỉnh: Tạo độ dày, khối đặc và ánh sáng hắt */
    box-shadow: 
      /* Bóng đổ xuống nền */
      15px 15px 25px rgba(0, 0, 0, 0.15),
      /* Ánh sáng hắt viền ngoài (Glow) */
      -5px -5px 15px rgba(255, 255, 255, 0.1),
      
      /* Viền sáng trắng bên trong (tạo cảm giác khối kính dày) */
      inset 4px 4px 8px rgba(255, 255, 255, 0.6),
      inset 10px 10px 20px rgba(255, 255, 255, 0.15),
      
      /* Viền tối bên trong góc dưới (tạo chiều sâu của khối đặc) */
      inset -5px -5px 15px rgba(0, 0, 0, 0.08),
      
      /* VỆT SÁNG VÀNG/CAM đặc trưng ở góc dưới y hệt ảnh gốc */
      inset -2px -2px 6px rgba(230, 160, 50, 0.4);

    transition: all 0.2s ease;
  }

  /* Hiệu ứng khi bấm vào */
  .glass-button:active {
    transform: scale(0.95);
    box-shadow: 
      5px 5px 15px rgba(0, 0, 0, 0.1),
      inset 2px 2px 5px rgba(255, 255, 255, 0.4),
      inset -2px -2px 5px rgba(0, 0, 0, 0.05);
  }
</style>
</head>
<body>

  <button class="glass-button">Click Me</button>

</body>
</html>
