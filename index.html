<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nam Arch - Simple Export</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body style="margin:0;">
    <div style="position:absolute; top:10px; left:50px; z-index:1000; background:white; padding:10px;">
        <button onclick="export3D()" style="padding:10px; background:green; color:white; cursor:pointer;">BẤM ĐỂ TẢI FILE .OBJ</button>
        <div id="stt">Trạng thái: Sẵn sàng</div>
    </div>
    <div id="map" style="height:100vh;"></div>
    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function export3D() {
            const stt = document.getElementById('stt');
            stt.innerText = "Đang quét... (Vui lòng đợi 5s)";
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
            const query = `[out:json];way["building"](${bbox});out body;>;out skel qt;`;
            
            try {
                const response = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await response.json();
                if (data.elements.length === 0) { stt.innerText = "Lỗi: Vùng này không có nhà!"; return; }
                
                let obj = "g Buildings\n";
                let vIdx = 1;
                data.elements.filter(e => e.type === "way").forEach(e => {
                    let pts = [];
                    e.nodes.forEach(nid => {
                        let n = data.elements.find(node => node.id === nid);
                        if (n) {
                            obj += `v ${(n.lon - map.getCenter().lng)*10000} 0 ${(n.lat - map.getCenter().lat)*10000}\n`;
                            pts.push(vIdx++);
                        }
                    });
                    if (pts.length > 2) obj += "f " + pts.join(" ") + "\n";
                });
                const blob = new Blob([obj], {type: 'text/plain'});
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = "Nam_Architect_3D.obj"; a.click();
                stt.innerText = "THÀNH CÔNG!";
            } catch (e) { stt.innerText = "Lỗi kết nối server!"; }
        }
    </script>
</body>
</html>
