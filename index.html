<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NAM ARCH - V15 FINAL CLEAN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1e272e; }
        #map { height: 100vh; width: 100vw; }
        .ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            background: white; padding: 20px; border-radius: 12px; width: 260px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        button { 
            width: 100%; padding: 12px; background: #00a8ff; color: white; 
            border: none; cursor: pointer; border-radius: 25px; font-weight: bold;
        }
        .progress-container { 
            width: 100%; height: 15px; background: #eee; 
            border-radius: 10px; margin-top: 15px; display: none; overflow: hidden;
        }
        .progress-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); 
        }
        #stt { text-align: center; font-size: 12px; margin-top: 8px; color: #444; }
    </style>
</head>
<body>
    <div class="ui">
        <h3 style="margin:0 0 10px; color:#2f3640;">NAM ARCH v15</h3>
        <button onclick="exportV15()">XUẤT CAD SẠCH (2 NÉT)</button>
        <div class="progress-container" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div id="stt"></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([10.7933, 106.6800], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

        async function exportV15() {
            const stt = document.getElementById('stt');
            const pFill = document.getElementById('p-fill');
            document.getElementById('p-bar').style.display = 'block';
            
            const b = map.getBounds();
            const query = `[out:json][bbox:${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}];(way["building"];way["highway"];);out body;>;out skel qt;`;
            
            try {
                const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query));
                const data = await res.json();
                const nodeMap = new Map();
                data.elements.forEach(el => { if (el.type === 'node') nodeMap.set(el.id, el); });

                let dxf = "0\nSECTION\n2\nENTITIES\n";
                const center = map.getCenter();
                const scale = 111319;
                const ways = data.elements.filter(e => e.type === "way");

                ways.forEach((e, idx) => {
                    const nodes = e.nodes.map(id => nodeMap.get(id)).filter(n => n);
                    // CHỈ VẼ NẾU NẰM TRONG MÀN HÌNH
                    const allInView = nodes.every(n => b.contains([n.lat, n.lon]));
                    if (!allInView || nodes.length < 2) return;

                    const isBuilding = !!e.tags?.building;
                    const w = e.tags.highway === 'primary' ? 6 : 3;

                    if (isBuilding) {
                        dxf += `0\nPOLYLINE\n8\nNHA\n62\n1\n66\n1\n70\n1\n`;
                        nodes.forEach(n => {
                            let x = (n.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y = (n.lat - center.lat) * scale;
                            dxf += `0\nVERTEX\n8\nNHA\n10\n${x.toFixed(2)}\n20\n${y.toFixed(2)}\n`;
                        });
                        dxf += `0\nSEQEND\n`;
                    } else {
                        // VẼ 2 LỀ BẰNG 2 POLYLINE RIÊNG BIỆT (KHÔNG DÙNG LINE RỜI)
                        const lề_trái = [];
                        const lề_phải = [];

                        for (let i = 0; i < nodes.length - 1; i++) {
                            let n1 = nodes[i], n2 = nodes[i+1];
                            let x1 = (n1.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y1 = (n1.lat - center.lat) * scale;
                            let x2 = (n2.lon - center.lng) * scale * Math.cos(center.lat * Math.PI / 180);
                            let y2 = (n2.lat - center.lat) * scale;

                            let dx = x2 - x1, dy = y2 - y1;
                            let len = Math.sqrt(dx*dx + dy*dy);
                            let ox = (-dy / len) * w, oy = (dx / len) * w;

                            if (i === 0) {
                                lề_trái.push({x: x1 + ox, y: y1 + oy});
                                lề_phải.push({x: x1 - ox, y: y1 - oy});
                            }
                            lề_trái.push({x: x2 + ox, y: y2 + oy});
                            lề_phải.push({x: x2 - ox, y: y2 - oy});
                        }

                        // Xuất lề trái
                        dxf += `0\nPOLYLINE\n8\nDUONG\n66\n1\n`;
                        lề_trái.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                        dxf += `0\nSEQEND\n`;
                        // Xuất lề phải
                        dxf += `0\nPOLYLINE\n8\nDUONG\n66\n1\n`;
                        lề_phải.forEach(p => dxf += `0\nVERTEX\n8\nDUONG\n10\n${p.x.toFixed(2)}\n20\n${p.y.toFixed(2)}\n`);
                        dxf += `0\nSEQEND\n`;
                    }
                    pFill.style.width = (idx/ways.length*100) + "%";
                });

                dxf += "0\nENDSEC\n0\nEOF";
                const blob = new Blob([dxf], {type: 'application/dxf'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "Nam_V15_Clean_Final.dxf";
                a.click();
                stt.innerText = "Xong! Bản vẽ đã được lọc sạch.";
            } catch (err) { stt.innerText = "Lỗi kết nối!"; }
        }
    </script>
</body>
</html>
