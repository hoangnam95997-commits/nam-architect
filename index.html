<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thuật Toán Icon Mobile - Sandbox V3</title>
    <style>
        /* Nền sáng để test độ trong vắt và bóng đổ của thuỷ tinh màu */
        body {
            background-color: #f0f4f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            margin: 0;
        }

        /* KHỐI KÍNH (Base Volume) */
        .glass-icon {
            width: 240px;
            height: 240px;
            border-radius: 60px; /* Bo góc kiểu Squircle của iOS */
            position: relative;
            cursor: pointer;
            
            /* Dải màu lõi: Tím -> Hồng -> Cam */
            background: linear-gradient(135deg, #4a148c 0%, #e91e63 50%, #ff5722 100%);
            
            /* LỚP BÓNG TẠO ĐỘ DÀY (Thickness) VÀ TỤ QUANG (Caustics) */
            box-shadow: 
                /* Viền sáng cực gắt ở góc Trên-Trái */
                inset 2px 3px 8px rgba(255, 255, 255, 0.9),
                inset 1px 1px 2px rgba(255, 255, 255, 1),
                
                /* Viền tối ở góc Dưới-Phải tạo chiều sâu cho khối */
                inset -5px -5px 15px rgba(0, 0, 0, 0.5),
                
                /* Viền đọng màu rực rỡ ở đáy (Refraction) */
                inset -2px -8px 20px rgba(255, 200, 0, 0.7),
                
                /* Bóng đen vật lý ghim nút xuống sàn */
                10px 20px 30px rgba(0, 0, 0, 0.2),
                
                /* Ánh sáng xuyên thấu (Caustic Drop) hắt màu đỏ/cam xuống nền trắng */
                5px 25px 40px rgba(233, 30, 99, 0.5);
                
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* LỚP PHỦ MẶT KÍNH BÓNG BẨY (Glossy Overlay - Điểm mấu chốt của bức ảnh) */
        .glass-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            /* Cắt chéo cực sắc lẹm ở vị trí 45% */
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.4) 0%, 
                rgba(255, 255, 255, 0.1) 45%, 
                transparent 45.1%, 
                transparent 100%
            );
            pointer-events: none;
        }
        
        /* VIỀN QUANG HỌC BÊN NGOÀI (Outer Rim Light) */
        .glass-icon::after {
            content: '';
            position: absolute;
            inset: -1.5px; /* Lớn hơn nút một chút để tạo viền */
            border-radius: 62px;
            background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, transparent 50%, rgba(255, 100, 0, 0.6) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
            z-index: -1;
        }

        .glass-icon:active {
            transform: scale(0.95);
            box-shadow: 
                inset 2px 3px 8px rgba(255, 255, 255, 0.9),
                inset -5px -5px 15px rgba(0, 0, 0, 0.6),
                inset -2px -8px 20px rgba(255, 200, 0, 0.8),
                5px 10px 15px rgba(0, 0, 0, 0.2),
                2px 15px 25px rgba(233, 30, 99, 0.5);
        }

    </style>
</head>
<body>

    <div class="glass-icon"></div>

</body>
</html>
