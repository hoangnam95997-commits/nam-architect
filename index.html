<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAM ARCH PRO v53.1 - Standard UI</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <style>
        :root { 
            --primary: #00e5ff; --secondary: #0077ff;
            /* ĐÃ FIX: Tông màu Xám Slate chuẩn App chuyên nghiệp thay vì đen thui */
            --bg-dark: #111827; /* Gray 900 */
            --panel-bg: rgba(31, 41, 55, 0.95); /* Gray 800 */
            --box-bg: rgba(17, 24, 39, 0.6); /* Nền các ô điều khiển */
            --text-main: #f9fafb; --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        .light-mode {
            --primary: #0284c7; --secondary: #0369a1;
            --bg-dark: #f3f4f6; /* Gray 100 */
            --panel-bg: rgba(255, 255, 255, 0.98);
            --box-bg: rgba(243, 244, 246, 0.8);
            --text-main: #111827; --text-muted: #4b5563;
            --border: rgba(0, 0, 0, 0.12);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; transition: 0.3s; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); }
        
        /* SEARCH BAR */
        .search-box {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            display: flex; background: var(--panel-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .search-box input { background: transparent; border: none; padding: 12px 15px; width: 250px; color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box button { background: var(--box-bg); border: none; border-left: 1px solid var(--border); padding: 0 15px; cursor: pointer; color: var(--primary); transition: 0.2s; }
        .search-box button:hover { background: rgba(0, 229, 255, 0.1); }

        /* SIDEBAR */
        .sidebar-container { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; align-items: flex-start; }
        .sidebar {
            width: 350px; background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            max-height: 90vh; overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }

        .toggle-btn {
            background: var(--panel-bg); border: 1px solid var(--border); color: var(--text-main);
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; font-size: 14px; margin-top: 10px;
        }
        .toggle-btn:hover { background: var(--box-bg); transform: scale(1.05); }

        h1 { margin: 0; font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; text-align: center; letter-spacing: 0.5px; }
        .tagline { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; text-align: center; display: block; margin-bottom: 20px; margin-top: 4px;}

        /* BOX ĐIỀU KHIỂN (Sáng sủa hơn) */
        .ctrl-box { background: var(--box-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .val-hl { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;}
        
        /* BẢNG MÀU & CHECKBOX */
        .layer-label { cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; color: var(--text-main); font-size: 12px;}
        .layer-label input[type="checkbox"] { cursor: pointer; accent-color: var(--primary); }
        input[type="color"] { -webkit-appearance: none; border: none; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; background: none; transition: 0.2s; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; }

        /* THANH ZOOM */
        .zoom-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; outline: none; margin-top: 5px; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5);}
        
        /* NÚT BẤM */
        .btn-glow {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 12px;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.25); transition: all 0.3s ease; margin-bottom: 12px; margin-top: 5px;
        }
        .btn-glow:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4); }
        
        .btn-outline {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--box-bg); color: var(--text-main); font-weight: 700; font-size: 11px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        .btn-outline:hover { background: rgba(128,128,128,0.15); border-color: var(--primary); color: var(--primary); }

        /* TIẾN TRÌNH */
        .prog-wrap { height: 6px; background: rgba(128,128,128,0.2); border-radius: 3px; overflow: hidden; margin: 12px 0; }
        #progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
        #stt { font-size: 10px; text-align: center; color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; text-transform: uppercase;}

        /* HUD BOTTOM */
        .hud-bottom { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;
            background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 20px; display: flex; gap: 25px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .hud-item { display: flex; align-items: center; gap: 8px; }
        .hud-val { color: var(--text-main); font-weight: 700; }

        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; z-index: 999; pointer-events: none; opacity: 0.5; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: 0; width: 30px; height: 2px; background: var(--primary); }
        .crosshair::after { content: ''; position: absolute; top: 0; left: 14px; width: 2px; height: 30px; background: var(--primary); }

        .leaflet-interactive { fill-opacity: 0 !important; stroke-width: 1.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm địa điểm..." onkeypress="if(event.key === 'Enter') searchLocation()">
    <button onclick="searchLocation()" title="Tìm kiếm">🔍</button>
</div>

<div class="sidebar-container">
    <div class="sidebar" id="sidebar">
        <h1>NAM ARCH <span>PRO</span></h1>
        <span class="tagline">STANDARD UI v53.1</span>

        <div class="ctrl-box">
            <div class="row"><span>Cấp độ Zoom</span><span class="val-hl" id="z-val">16.0</span></div>
            <input type="range" id="zoomSlider" min="1" max="100" step="0.5" value="16" class="zoom-slider">
        </div>

        <div class="ctrl-box">
            <div class="row" style="border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px;">
                <span style="color: var(--primary); text-transform: uppercase; font-size: 11px;">🎨 Quản lý Layer & Màu sắc</span>
            </div>
            <div class="row">
                <label class="layer-label"><input type="checkbox" id="showNha" checked onchange="toggleLayer('nha')"> 🏢 Tòa Nhà</label>
                <input type="color" id="cNha" value="#ff4757" oninput="updateLiveColors()">
            </div>
            <div class="row">
                <label class="layer-label"><input type="checkbox" id="showDuong" checked onchange="toggleLayer('duong')"> 🛣️ Lòng Đường</label>
                <input type="color" id="cDuong" value="#ffffff" oninput="updateLiveColors()">
            </div>
            <div class="row">
                <label class="layer-label"><input type="checkbox" id="showViahe" checked onchange="toggleLayer('viahe')"> 🚶 Vỉa Hè</label>
                <input type="color" id="cViaHe" value="#f1c40f" oninput="updateLiveColors()">
            </div>
            <div class="row">
                <label class="layer-label"><input type="checkbox" id="showNuoc" checked onchange="toggleLayer('nuoc')"> 💧 Mặt Nước</label>
                <input type="color" id="cNuoc" value="#3498db" oninput="updateLiveColors()">
            </div>
        </div>

        <button class="btn-glow" onclick="startMegaScan()" title="Phím tắt: Space">🚀 BẮT ĐẦU QUÉT (SPACE)</button>

        <div class="ctrl-box">
            <div class="row">
                <span title="Hệ thống tự động nhả luồng CPU để chống treo máy">Trạng thái Core:</span>
                <span id="lib-stt" style="color: var(--text-muted)">ĐANG TẢI...</span>
            </div>
            <div class="prog-wrap"><div id="progress"></div></div>
            <div id="stt">SẴN SÀNG NHẬN LỆNH</div>
        </div>

        <button class="btn-outline" onclick="exportDxfSafe()" title="Phím tắt: Ctrl + E">📥 XUẤT CAD CHUẨN (CTRL + E)</button>
        <button class="btn-outline" style="border-color: var(--text-muted); color: var(--text-muted);" onclick="document.body.classList.toggle('light-mode')">🌓 ĐỔI GIAO DIỆN SÁNG/TỐI</button>
    </div>
    
    <div class="toggle-btn" onclick="toggleSidebar()" title="Ẩn/Hiện Bảng điều khiển (Phím tắt: M)">
        <span id="toggle-icon">◀</span>
    </div>
</div>

<div class="crosshair"></div>
<div class="hud-bottom">
    <div class="hud-item" title="La bàn">🧭 HƯỚNG: <span class="hud-val">BẮC (N)</span></div>
    <div class="hud-item" title="Tọa độ tâm bản đồ">📍 TỌA ĐỘ: <span class="hud-val" id="hud-coord">10.7933, 106.6800</span></div>
    <div class="hud-item" title="Độ cao camera mô phỏng">🚁 CAO ĐỘ: <span class="hud-val" id="hud-alt">610m</span></div>
</div>

<div id="map"></div>

<script>
    // --- KHỞI TẠO HỆ THỐNG ---
    let sidebarOpen = true;
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarOpen = !sidebarOpen;
        sb.classList.toggle('hidden', !sidebarOpen);
        document.getElementById('toggle-icon').innerText = sidebarOpen ? '◀' : '▶';
    }

    // --- HOTKEYS ---
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); startMegaScan(); }
        if (e.ctrlKey && e.code === 'KeyE') { e.preventDefault(); exportDxfSafe(); }
        if (e.code === 'KeyM') { e.preventDefault(); toggleSidebar(); }
    });

    setInterval(() => {
        const el = document.getElementById('lib-stt');
        if (typeof turf !== 'undefined') { el.innerText = "ONLINE (V6.5)"; el.style.color = "#10b981"; }
        else { el.innerText = "OFFLINE"; el.style.color = "#ef4444"; }
    }, 1000);

    // --- BẢN ĐỒ & LƯỚI TỌA ĐỘ ---
    var map = L.map('map', { zoomControl: false, maxZoom: 100, zoomSnap: 0.1 }).setView([10.7933, 106.6800], 16);
    var darkT = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 }).addTo(map);
    var lightT = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', { maxZoom: 100, maxNativeZoom: 19 });
    
    L.GridLayer.Graticule = L.GridLayer.extend({
        createTile: function () {
            var tile = document.createElement('canvas'); tile.width = tile.height = 256;
            var ctx = tile.getContext('2d'); ctx.strokeStyle = 'rgba(128,128,128,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(256, 0); ctx.moveTo(0, 0); ctx.lineTo(0, 256); ctx.stroke(); return tile;
        }
    });
    new L.GridLayer.Graticule({maxZoom: 100}).addTo(map);

    // --- TÌM KIẾM ---
    async function searchLocation() {
        const input = document.getElementById('searchInput');
        const query = input.value.trim();
        if(!query) return;
        input.placeholder = "Đang tìm kiếm...";
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data && data.length > 0) map.flyTo([data[0].lat, data[0].lon], 16, { duration: 2 });
            else alert("Không tìm thấy địa điểm này!");
        } catch(e) { alert("Lỗi kết nối khi tìm kiếm!"); }
        input.placeholder = "Tìm kiếm địa điểm...";
    }

    // --- HUD & ZOOM ---
    const zSlider = document.getElementById('zoomSlider');
    const zVal = document.getElementById('z-val');
    function updateHUD() {
        let z = map.getZoom(); let center = map.getCenter();
        zSlider.value = z; zVal.innerText = z.toFixed(1);
        document.getElementById('hud-coord').innerText = `${center.lat.toFixed(5)}, ${center.lng.toFixed(5)}`;
        let alt = Math.round(40000000 / Math.pow(2, z));
        document.getElementById('hud-alt').innerText = alt >= 1000 ? (alt/1000).toFixed(1) + 'km' : alt + 'm';
    }
    zSlider.addEventListener('input', e => map.setZoom(e.target.value));
    map.on('move', updateHUD); map.on('zoomend', updateHUD); updateHUD();

    // --- LAYER & MÀU SẮC ---
    var geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
    var layers = { nha: L.layerGroup().addTo(map), duong: L.layerGroup().addTo(map), viahe: L.layerGroup().addTo(map), nuoc: L.layerGroup().addTo(map) };

    function toggleLayer(type) {
        const isChecked = document.getElementById('show' + type.charAt(0).toUpperCase() + type.slice(1)).checked;
        if (isChecked) map.addLayer(layers[type]); else map.removeLayer(layers[type]);
    }

    function updateLiveColors() {
        const cN = document.getElementById('cNha').value;
        const cD = document.getElementById('cDuong').value;
        const cV = document.getElementById('cViaHe').value;
        const cW = document.getElementById('cNuoc').value;
        layers.nha.eachLayer(l => l.setStyle({color: cN}));
        layers.duong.eachLayer(l => l.setStyle({color: cD}));
        layers.viahe.eachLayer(l => l.setStyle({color: cV}));
        layers.nuoc.eachLayer(l => l.setStyle({color: cW}));
    }

    // --- THUẬT TOÁN LÕI V50 ---
    const yieldCPU = () => new Promise(r => setTimeout(r, 5));

    async function chunkedUnion(polygons, type) {
        if (!polygons || polygons.length === 0) return null;
        if (polygons.length === 1) return polygons[0];
        let current = [...polygons]; let step = 0;
        while (current.length > 1) {
            let next = [];
            for (let i = 0; i < current.length; i += 2) {
                if (i % 4 === 0) await yieldCPU();
                if (i + 1 < current.length) {
                    try { next.push(turf.union(current[i], current[i+1])); } catch(e) { next.push(current[i]); }
                } else next.push(current[i]);
            }
            current = next; step++;
            document.getElementById('stt').innerText = `TỐI ƯU HÓA ${type}: CẤP ${step}`;
        }
        return current[0];
    }

    async function startMegaScan() {
        if(typeof turf === 'undefined' || !turf.bboxClip) return alert("Hệ thống Core đang tải, đợi chút nhé!");
        
        const b = map.getBounds();
        const sw = b.getSouthWest(), ne = b.getNorthEast();
        const screenBox = [sw.lng, sw.lat, ne.lng, ne.lat];
        
        Object.values(layers).forEach(l => l.clearLayers());
        geoData = { nha: [], duong: [], viahe: [], nuoc: [] };
        
        const cN = document.getElementById('cNha').value;
        const cD = document.getElementById('cDuong').value;
        const cV = document.getElementById('cViaHe').value;
        const cW = document.getElementById('cNuoc').value;

        document.getElementById('progress').style.width = '10%';
        document.getElementById('stt').innerText = "KẾT NỐI VỆ TINH...";

        const q = `[out:json][timeout:50][bbox:${sw.lat},${sw.lng},${ne.lat},${ne.lng}];(way["building"];way["highway"];way["natural"="water"];);out body;>;out skel qt;`;
        
        try {
            const res = await fetch("https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(q));
            const data = await res.json();
            const nodes = new Map();
            data.elements.forEach(e => { if(e.type === 'node') nodes.set(e.id, [e.lon, e.lat]); });

            let rBufs = [], sBufs = [];
            let total = data.elements.filter(e => e.type === "way").length;
            let count = 0;

            for (const e of data.elements) {
                if (e.type !== "way") continue;
                count++;
                if (count % 50 === 0) {
                    document.getElementById('progress').style.width = 10 + (count/total)*40 + '%';
                    document.getElementById('stt').innerText = `XÂY LƯỚI: ${count}/${total}`;
                    await yieldCPU(); 
                }

                const pts = e.nodes.map(id => nodes.get(id)).filter(p => p);
                if (pts.length < 2) continue;

                if (e.tags.building) {
                    const poly = turf.bboxClip(turf.polygon([pts.concat([pts[0]])]), screenBox);
                    geoData.nha.push(poly);
                    L.geoJSON(poly, {color: cN, weight: 1}).addTo(layers.nha);
                } else if (e.tags.natural === 'water') {
                    const poly = turf.bboxClip(turf.polygon([pts.concat([pts[0]])]), screenBox);
                    geoData.nuoc.push(poly);
                    L.geoJSON(poly, {color: cW, weight: 1}).addTo(layers.nuoc);
                } else if (e.tags.highway) {
                    const line = turf.lineString(pts);
                    const w = (e.tags.highway === 'primary' || e.tags.highway === 'secondary') ? 12 : 6;
                    rBufs.push(turf.bboxClip(turf.buffer(line, w/2, {units:'meters', steps: 2}), screenBox));
                    sBufs.push(turf.bboxClip(turf.buffer(line, (w/2)+3.5, {units:'meters', steps: 2}), screenBox));
                }
            }

            document.getElementById('progress').style.width = '60%';
            
            if (rBufs.length > 0) {
                document.getElementById('stt').innerText = "ĐANG TẠO LÒNG ĐƯỜNG...";
                let mR = await chunkedUnion(rBufs, "LÒNG ĐƯỜNG");
                geoData.duong.push(mR);
                L.geoJSON(mR, {color: cD, weight: 1.5}).addTo(layers.duong);

                document.getElementById('progress').style.width = '80%';
                document.getElementById('stt').innerText = "ĐANG TẠO VỈA HÈ...";
                let mS = await chunkedUnion(sBufs, "VỈA HÈ");
                
                try {
                    let viahe = turf.difference(mS, mR);
                    if(viahe) {
                        geoData.viahe.push(viahe);
                        L.geoJSON(viahe, {color: cV, weight: 1}).addTo(layers.viahe);
                    }
                } catch(e) { geoData.viahe.push(mS); }
            }
            
            document.getElementById('progress').style.width = '100%';
            document.getElementById('stt').innerText = "HOÀN TẤT! SẴN SÀNG XUẤT CAD.";
        } catch (err) { alert("Lỗi tải dữ liệu. Hãy thu nhỏ phạm vi một chút hoặc thử lại!"); }
    }

    // --- HÀM XUẤT DXF THEO LAYER ĐÃ CHỌN ---
    function extractRings(geom) {
        let rings = [];
        if (!geom) return rings;
        if (geom.type === 'Feature') return extractRings(geom.geometry);
        if (geom.type === 'FeatureCollection') { geom.features.forEach(f => rings.push(...extractRings(f))); return rings; }
        if (geom.type === 'Polygon') rings.push(...geom.coordinates);
        else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => rings.push(...poly));
        else if (geom.type === 'GeometryCollection') geom.geometries.forEach(g => rings.push(...extractRings(g)));
        return rings;
    }

    async function exportDxfSafe() {
        if(geoData.nha.length === 0 && geoData.duong.length === 0) return alert("Bạn chưa quét dữ liệu nào!");
        
        document.getElementById('stt').innerText = "ĐANG GHI FILE DXF...";
        const center = map.getCenter();
        const sy = 111319.9, sx = sy * Math.cos(center.lat * Math.PI / 180);
        let dxf = "0\nSECTION\n2\nENTITIES\n";

        const writeToDxf = async (geoArray, layerName) => {
            for (let i = 0; i < geoArray.length; i++) {
                if (i % 10 === 0) await yieldCPU();
                const rings = extractRings(geoArray[i]);
                rings.forEach(ring => {
                    if(!ring || ring.length < 2) return;
                    dxf += `0\nPOLYLINE\n8\n${layerName}\n66\n1\n70\n1\n`;
                    ring.forEach(pt => { dxf += `0\nVERTEX\n8\n${layerName}\n10\n${((pt[0]-center.lng)*sx).toFixed(3)}\n20\n${((pt[1]-center.lat)*sy).toFixed(3)}\n`; });
                    dxf += "0\nSEQEND\n";
                });
            }
        };

        if(document.getElementById('showNha').checked) await writeToDxf(geoData.nha, "V21_NHA");
        if(document.getElementById('showDuong').checked) await writeToDxf(geoData.duong, "V21_DUONG");
        if(document.getElementById('showViahe').checked) await writeToDxf(geoData.viahe, "V21_VIAHE");
        if(document.getElementById('showNuoc').checked) await writeToDxf(geoData.nuoc, "V21_NUOC");

        dxf += "0\nENDSEC\n0\nEOF";
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([dxf], {type: 'application/dxf'}));
        a.download = "NAM_ARCH_PRO_V53.dxf"; a.click();
        document.getElementById('stt').innerText = "XUẤT FILE THÀNH CÔNG!";
    }
</script>
</body>
</html>
